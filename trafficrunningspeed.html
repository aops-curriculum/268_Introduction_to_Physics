<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic Running Speed</title>
  <!-- Original AoPS interactive. Faithful 2D replacement for the GlowScript
       "trafficrunningspeed" program: NS automaton with long-term cumulative
       average speed shown after a burn-in of 50 ticks. -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }
    .controls { padding: 8px 12px; font-size: 14px; }
    .ctrl-row { margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    input[type=range] { width: 160px; vertical-align: middle; }
    .btn { padding: 1px 7px; font-size: 13px; cursor: pointer; }
    .stat { margin-top: 4px; font-size: 14px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <div class="ctrl-row">
    <input type="range" id="carSlider" min="1" max="80" step="1" value="10">
    <span id="carLabel">cars: 10</span>
    <button class="btn" id="carPlus">+</button>
    <button class="btn" id="carMinus">−</button>
  </div>
  <div class="ctrl-row">
    <input type="range" id="cellsSlider" min="10" max="200" step="1" value="100">
    <span id="cellsLabel">cells: 100</span>
    <button class="btn" id="cellsPlus">+</button>
    <button class="btn" id="cellsMinus">−</button>
  </div>
  <div class="ctrl-row">
    <input type="range" id="pSlider" min="0" max="1" step="0.01" value="0.10">
    <span id="pLabel">p: 0.10</span>
    <button class="btn" id="pPlus">+</button>
    <button class="btn" id="pMinus">−</button>
  </div>
  <div class="ctrl-row">
    <input type="range" id="speedSlider" min="1" max="20" step="1" value="20">
    <span id="speedLabel">simulation speed: 20</span>
    <button class="btn" id="speedPlus">+</button>
    <button class="btn" id="speedMinus">−</button>
  </div>
  <div class="stat" id="longTermLabel">long term average speed: will show here after running at least 50 time steps</div>
</div>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
<script>
(() => {
  'use strict';

  const SPEED_COLORS = ['#e02424','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6'];
  const MIN_TICKS    = 50;
  const MAXW         = 500;

  const canvas         = document.getElementById('c');
  const ctx            = canvas.getContext('2d');
  const carSlider      = document.getElementById('carSlider');
  const cellsSlider    = document.getElementById('cellsSlider');
  const pSlider        = document.getElementById('pSlider');
  const speedSlider    = document.getElementById('speedSlider');
  const carLabel       = document.getElementById('carLabel');
  const cellsLabel     = document.getElementById('cellsLabel');
  const pLabel         = document.getElementById('pLabel');
  const speedLabel     = document.getElementById('speedLabel');
  const longTermLabel  = document.getElementById('longTermLabel');

  // URL params: ?stats=longterm|live|none  &cars=N &cells=N &p=X &speed=N
  const _qs    = new URLSearchParams(location.search);
  const _stats = _qs.get('stats') || 'longterm';
  const _carP   = _qs.get('cars');   if (_carP   !== null) carSlider.value   = _carP;
  const _cellP  = _qs.get('cells');  if (_cellP  !== null) cellsSlider.value = _cellP;
  const _pP     = _qs.get('p');      if (_pP     !== null) pSlider.value     = _pP;
  const _speedP = _qs.get('speed');  if (_speedP !== null) speedSlider.value  = _speedP;
  if (_stats === 'none') longTermLabel.style.display = 'none';

  let W, H, R, cx, cy, dpr;
  let numCars, numCells, p;
  let cars = [];
  let tickCount = 0, runningSum = 0, runningCount = 0;

  function layout() {
    W = Math.min(window.innerWidth || MAXW, MAXW);
    H = Math.round(W * 0.44);
    R = Math.round(Math.min(W, H) * 0.38);
    cx = W / 2; cy = H / 2;
    dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    document.body.style.width = W + 'px';
  }

  function initSim() {
    numCars  = parseInt(carSlider.value);
    numCells = parseInt(cellsSlider.value);
    p        = parseFloat(pSlider.value);
    cars = [];
    for (let j = 0; j < numCars; j++) {
      cars.push({ cell: Math.floor(j * numCells / numCars), speed: 5 });
    }
    tickCount = 0; runningSum = 0; runningCount = 0;
    carLabel.textContent   = 'cars: ' + numCars;
    cellsLabel.textContent = 'cells: ' + numCells;
    pLabel.textContent     = 'p: ' + p.toFixed(2);
    if (_stats === 'live') {
      longTermLabel.textContent = 'average speed: —';
    } else if (_stats === 'longterm') {
      longTermLabel.textContent = 'long term average speed: will show here after running at least ' + MIN_TICKS + ' time steps';
    }
  }

  function tick() {
    for (const c of cars) if (c.speed < 5) c.speed++;

    const occupied = new Set(cars.map(c => c.cell));
    for (const c of cars) {
      for (let d = 1; d <= c.speed; d++) {
        if (occupied.has((c.cell + d) % numCells)) { c.speed = d - 1; break; }
      }
    }

    for (const c of cars) {
      if (Math.random() < p && c.speed > 0) c.speed--;
    }

    for (const c of cars) {
      c.cell = (c.cell + c.speed) % numCells;
    }

    tickCount++;
    const avg = cars.reduce((s, c) => s + c.speed, 0) / numCars;
    if (_stats === 'live') {
      longTermLabel.textContent = 'average speed: ' + avg.toFixed(2);
    } else if (_stats === 'longterm' && tickCount >= MIN_TICKS) {
      runningSum += avg;
      runningCount++;
      longTermLabel.textContent = 'long term average speed: ' + (runningSum / runningCount).toFixed(2);
    }
  }

  function draw(animT) {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    const cellArc  = 2 * Math.PI / numCells;
    const cellSize = 0.8 * 2 * Math.PI * R / numCells;
    const carR     = Math.max(2.5, cellSize * 0.5);

    ctx.fillStyle = '#cccccc';
    for (let i = 0; i < numCells; i++) {
      const th = cellArc * i;
      ctx.save();
      ctx.translate(cx + R * Math.cos(th), cy + R * Math.sin(th));
      ctx.rotate(th + Math.PI / 2);
      ctx.fillRect(-cellSize / 2, -cellSize / 2, cellSize, cellSize);
      ctx.restore();
    }

    for (const c of cars) {
      const th = 2 * Math.PI * (c.cell + c.speed * animT) / numCells;
      ctx.beginPath();
      ctx.arc(cx + R * Math.cos(th), cy + R * Math.sin(th), carR, 0, 2 * Math.PI);
      ctx.fillStyle = SPEED_COLORS[Math.max(0, Math.min(5, c.speed))];
      ctx.fill();
    }
  }

  let lastTickTime = 0;
  function tickDuration() { return 2000 / parseFloat(speedSlider.value); }

  function loop(now) {
    requestAnimationFrame(loop);
    if (!lastTickTime) lastTickTime = now;
    const td = tickDuration();
    let elapsed = now - lastTickTime;
    while (elapsed >= td) { tick(); lastTickTime += td; elapsed -= td; }
    draw(elapsed / td);
  }

  function reset() { initSim(); lastTickTime = 0; }

  function stepSlider(slider, label, delta, fmt, resetSim) {
    const v = parseFloat(slider.value) + delta;
    slider.value = Math.max(parseFloat(slider.min), Math.min(parseFloat(slider.max), v));
    label.textContent = fmt(parseFloat(slider.value));
    if (resetSim) reset();
  }

  carSlider.addEventListener('input', reset);
  cellsSlider.addEventListener('input', reset);
  pSlider.addEventListener('input', () => { p = parseFloat(pSlider.value); pLabel.textContent = 'p: ' + p.toFixed(2); });
  speedSlider.addEventListener('input', () => { speedLabel.textContent = 'simulation speed: ' + speedSlider.value; });

  document.getElementById('carPlus').onclick    = () => stepSlider(carSlider, carLabel, 1, v => 'cars: ' + Math.round(v), true);
  document.getElementById('carMinus').onclick   = () => stepSlider(carSlider, carLabel, -1, v => 'cars: ' + Math.round(v), true);
  document.getElementById('cellsPlus').onclick  = () => stepSlider(cellsSlider, cellsLabel, 1, v => 'cells: ' + Math.round(v), true);
  document.getElementById('cellsMinus').onclick = () => stepSlider(cellsSlider, cellsLabel, -1, v => 'cells: ' + Math.round(v), true);
  document.getElementById('pPlus').onclick      = () => stepSlider(pSlider, pLabel, 0.01, v => { p = v; return 'p: ' + v.toFixed(2); }, false);
  document.getElementById('pMinus').onclick     = () => stepSlider(pSlider, pLabel, -0.01, v => { p = v; return 'p: ' + v.toFixed(2); }, false);
  document.getElementById('speedPlus').onclick  = () => stepSlider(speedSlider, speedLabel, 1, v => 'simulation speed: ' + Math.round(v), false);
  document.getElementById('speedMinus').onclick = () => stepSlider(speedSlider, speedLabel, -1, v => 'simulation speed: ' + Math.round(v), false);

  window.addEventListener('resize', () => { layout(); });

  layout();
  initSim();
  requestAnimationFrame(loop);
})();
</script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "stats",
        "type": "select",
        "values": [
            "longterm"
        ],
        "default": "longterm",
        "desc": "Statistics display mode"
    },
    {
        "name": "cars",
        "type": "number",
        "min": 1,
        "max": 80,
        "step": 1,
        "default": 22,
        "desc": "Number of cars"
    },
    {
        "name": "cells",
        "type": "number",
        "min": 10,
        "max": 200,
        "step": 5,
        "default": 50,
        "desc": "Number of road cells"
    },
    {
        "name": "p",
        "type": "number",
        "min": 0,
        "max": 1,
        "step": 0.05,
        "default": 0.3,
        "desc": "Brake probability p"
    },
    {
        "name": "speed",
        "type": "number",
        "min": 1,
        "max": 20,
        "step": 1,
        "default": 5,
        "desc": "Max speed (cells/step)"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
