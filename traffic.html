<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Traffic</title>
  <!-- Original AoPS interactive. Faithful 2D replacement for the GlowScript
       "traffic" program: Nagel–Schreckenberg cellular automaton on a ring road.
       Cars colored by speed (red=0, orange=1, yellow=2, green=3, cyan=4, blue=5). -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }
    .controls { padding: 8px 12px; font-size: 14px; }
    .ctrl-row { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    input[type=range] { width: 180px; vertical-align: middle; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <div class="ctrl-row">
    <input type="range" id="carSlider" min="1" max="80" step="1" value="1">
    <span id="carLabel">cars: 1</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="cellsSlider" min="10" max="200" step="1" value="40">
    <span id="cellsLabel">cells: 40</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="pSlider" min="0" max="1" step="0.01" value="0.10">
    <span id="pLabel">p: 0.10</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="speedSlider" min="1" max="20" step="1" value="2">
    <span id="speedLabel">simulation speed: 2</span>
  </div>
</div>
<script>
(function() {
  var BUFFER = 4, H_SCROLLBAR = 18, measuring = false;
  function measure() {
    if (measuring) return 0;
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    measuring = true;
    var hOld = b.style.height, hPri = b.style.getPropertyPriority('height');
    var mOld = b.style.minHeight, mPri = b.style.getPropertyPriority('min-height');
    b.style.setProperty('height', 'auto', 'important');
    b.style.setProperty('min-height', '0', 'important');
    var content = b.scrollHeight || 0;
    if (hOld) b.style.setProperty('height', hOld, hPri); else b.style.removeProperty('height');
    if (mOld) b.style.setProperty('min-height', mOld, mPri); else b.style.removeProperty('min-height');
    measuring = false;
    var hOverflow = h && (h.scrollWidth - h.clientWidth) >= 4;
    return Math.ceil(content) + BUFFER + (hOverflow ? H_SCROLLBAR : 0);
  }
  var last = 0;
  function report() {
    var hgt = measure();
    if (hgt > 0 && Math.abs(hgt - last) >= 2) { last = hgt; window.parent.postMessage({ type: 'resize', height: hgt }, '*'); }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
<script>
(() => {
  'use strict';

  const SPEED_COLORS = ['#e02424','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6'];
  const MAXW = 500;

  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');

  const carSlider   = document.getElementById('carSlider');
  const cellsSlider = document.getElementById('cellsSlider');
  const pSlider     = document.getElementById('pSlider');
  const speedSlider = document.getElementById('speedSlider');
  const carLabel    = document.getElementById('carLabel');
  const cellsLabel  = document.getElementById('cellsLabel');
  const pLabel      = document.getElementById('pLabel');
  const speedLabel  = document.getElementById('speedLabel');

  let W, H, R, cx, cy, dpr;
  let numCars, numCells, p;
  let cars = []; // {cell, speed}

  function layout() {
    W = Math.min(window.innerWidth || MAXW, MAXW);
    H = Math.round(W * 0.44);
    R = Math.round(Math.min(W, H) * 0.38);
    cx = W / 2; cy = H / 2;
    dpr = window.devicePixelRatio || 1;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    document.body.style.width = W + 'px';
  }

  function initSim() {
    numCars  = parseInt(carSlider.value);
    numCells = parseInt(cellsSlider.value);
    p        = parseFloat(pSlider.value);
    cars = [];
    for (let j = 0; j < numCars; j++) {
      cars.push({ cell: Math.floor(j * numCells / numCars), speed: 5 });
    }
    carLabel.textContent   = 'cars: ' + numCars;
    cellsLabel.textContent = 'cells: ' + numCells;
    pLabel.textContent     = 'p: ' + p.toFixed(2);
  }

  function tick() {
    for (const c of cars) if (c.speed < 5) c.speed++;

    const occupied = new Set(cars.map(c => c.cell));
    for (const c of cars) {
      for (let d = 1; d <= c.speed; d++) {
        if (occupied.has((c.cell + d) % numCells)) { c.speed = d - 1; break; }
      }
    }

    for (const c of cars) {
      if (Math.random() < p && c.speed > 0) c.speed--;
    }

    for (const c of cars) {
      c.cell = (c.cell + c.speed) % numCells;
    }
  }

  function draw(animT) {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    const cellArc  = 2 * Math.PI / numCells;
    const cellSize = 0.8 * 2 * Math.PI * R / numCells;
    const carR     = Math.max(2.5, cellSize * 0.5);

    ctx.fillStyle = '#cccccc';
    for (let i = 0; i < numCells; i++) {
      const th = cellArc * i;
      const x  = cx + R * Math.cos(th);
      const y  = cy + R * Math.sin(th);
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(th + Math.PI / 2);
      ctx.fillRect(-cellSize / 2, -cellSize / 2, cellSize, cellSize);
      ctx.restore();
    }

    for (const c of cars) {
      const th = 2 * Math.PI * (c.cell + c.speed * animT) / numCells;
      ctx.beginPath();
      ctx.arc(cx + R * Math.cos(th), cy + R * Math.sin(th), carR, 0, 2 * Math.PI);
      ctx.fillStyle = SPEED_COLORS[Math.max(0, Math.min(5, c.speed))];
      ctx.fill();
    }
  }

  let lastTickTime = 0;

  function tickDuration() { return 2000 / parseFloat(speedSlider.value); }

  function loop(now) {
    requestAnimationFrame(loop);
    if (!lastTickTime) lastTickTime = now;
    const td = tickDuration();
    let elapsed = now - lastTickTime;
    while (elapsed >= td) { tick(); lastTickTime += td; elapsed -= td; }
    draw(elapsed / td);
  }

  function reset() { initSim(); lastTickTime = 0; }

  carSlider.addEventListener('input', reset);
  cellsSlider.addEventListener('input', reset);
  pSlider.addEventListener('input', () => {
    p = parseFloat(pSlider.value);
    pLabel.textContent = 'p: ' + p.toFixed(2);
  });
  speedSlider.addEventListener('input', () => {
    speedLabel.textContent = 'simulation speed: ' + speedSlider.value;
  });
  window.addEventListener('resize', () => { layout(); });

  // URL params: ?cars=N &cells=N &p=0.10 &speed=N
  const _qs = new URLSearchParams(location.search);
  if (_qs.has('cars'))  { carSlider.value   = Math.min(80,  Math.max(1,   parseInt(_qs.get('cars')))); }
  if (_qs.has('cells')) { cellsSlider.value  = Math.min(200, Math.max(10,  parseInt(_qs.get('cells')))); }
  if (_qs.has('p'))     { pSlider.value      = Math.min(1,   Math.max(0,   parseFloat(_qs.get('p')))); }
  if (_qs.has('speed')) { speedSlider.value  = Math.min(20,  Math.max(1,   parseInt(_qs.get('speed')))); }

  layout();
  initSim();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
