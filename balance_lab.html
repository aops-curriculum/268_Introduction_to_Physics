<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Balance Lab</title>
  <!-- Original AoPS interactive. Replaces the third-party "Balancing Act" simulation. -->
<script>
// EigenNode auto-height v2.4
(function() {
  var BUFFER = 4;
  var H_SCROLLBAR = 18;
  var measuring = false;
  function measure() {
    if (measuring) return 0;
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    measuring = true;
    var hOld = b.style.height, hPri = b.style.getPropertyPriority('height');
    var mOld = b.style.minHeight, mPri = b.style.getPropertyPriority('min-height');
    b.style.setProperty('height', 'auto', 'important');
    b.style.setProperty('min-height', '0', 'important');
    var content = b.scrollHeight || 0;
    if (hOld) b.style.setProperty('height', hOld, hPri); else b.style.removeProperty('height');
    if (mOld) b.style.setProperty('min-height', mOld, mPri); else b.style.removeProperty('min-height');
    measuring = false;
    var hOverflow = h && (h.scrollWidth - h.clientWidth) >= 4;
    return Math.ceil(content) + BUFFER + (hOverflow ? H_SCROLLBAR : 0);
  }
  var last = 0;
  function report() {
    var h = measure();
    if (h > 0 && Math.abs(h - last) >= 2) {
      last = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 493.2px; height: 259.2px; overflow: hidden;
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; width: 493.2px; height: 259.2px; touch-action: none; }
  </style>
</head>
<body>
  <canvas id="c" width="548" height="288"></canvas>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 548, H = 288;

    // ── Layout / geometry ────────────────────────────────────
    const S = 120;                       // pixels per meter
    const PX = 274, PY = 166;            // pivot (plank bottom center)
    const HALF = 2.2 * S;                // plank half-length (2.2 m)
    const PT = 29;                       // plank thickness, px
    const BOARD_OFFSET = 38;             // local y of board top (pivot at 0, board hangs below)
    const GROUND = 270;
    const THMAX = 12 * Math.PI / 180;    // max tilt
    const SNAP = 0.25, XMAX = 2;         // snap grid (m), arm length (m)
    const KITP = { x: 194, y: 2, w: 160, h: 66 };
    const RESETBTN = { x: 250, y: 250, w: 48, h: 16 };

    // ── Object kit ───────────────────────────────────────────
    const TYPES = {
      b5:  { kind: 'brick', n: 1, mass: 5,  w: 46, h: 17, label: '5 kg'  },
      b10: { kind: 'brick', n: 2, mass: 10, w: 46, h: 34, label: '10 kg' },
    };
    const KIT_ITEMS = ['b5', 'b10'];

    // ── URL parameters ───────────────────────────────────────
    const Q = new URLSearchParams(location.search);
    const qBool = (name, dflt) => {
      const v = Q.get(name);
      if (v === null) return dflt;
      return !(v === '0' || v === 'false' || v === 'no' || v === 'off');
    };
    let pos0 = (Q.get('position') || 'rulers').toLowerCase();
    if (pos0 !== 'none' && pos0 !== 'rulers' && pos0 !== 'marks') pos0 = 'rulers';
    if (Q.has('rulers')) {
      if (qBool('rulers', true)) pos0 = 'rulers';
      else if (pos0 === 'rulers') pos0 = 'none';
    }
    const init = {
      pos: pos0,
      labels: qBool('labels', true),
      forces: qBool('forces', false),
      level:  qBool('level', false),
      clean: qBool('clean', false),
      placed: [],
    };
    (function parsePlace() {
      const str = Q.get('place');
      if (!str) return;
      const map = { '5': 'b5', '10': 'b10' };
      const used = new Set();
      for (const tok of str.split(',')) {
        const m = tok.trim().match(/^([a-z0-9]+)@(-?\d*\.?\d+)$/i);
        if (!m) continue;
        const t = map[m[1].toLowerCase()];
        if (!t || used.has(t)) continue;          // one of each
        let p = Math.round(parseFloat(m[2]) / SNAP) * SNAP;
        if (!isFinite(p) || p === 0) continue;
        p = Math.max(-XMAX, Math.min(XMAX, p));
        used.add(t);
        init.placed.push({ type: t, pos: p });
      }
    })();

    // ── State ────────────────────────────────────────────────
    let placed = [];
    let theta = 0, omega = 0;
    let hintDone = false;
    let drag = null;
    let snapPos = null;
    let kitRects = [];
    const ui = { labels: true, forces: false, level: false, pos: 'rulers' };

    function reset() {
      placed = init.placed.map(o => ({ type: o.type, pos: o.pos }));
      theta = 0; omega = 0;
      ui.labels = init.labels; ui.forces = init.forces;
      ui.level = init.level;   ui.pos = init.pos;
      hintDone = placed.length > 0;
      drag = null; snapPos = null;
    }
    reset();

    // A brick type is "in use" when it's on the plank or being dragged,
    // so it disappears from the kit until it's returned.
    const isUsed = id => (drag && drag.type === id) || placed.some(o => o.type === id);

    // ── Physics ──────────────────────────────────────────────
    const G = 9.8;
    const I_PLANK = 40;
    const netMoment = () => placed.reduce((n, o) => n + TYPES[o.type].mass * o.pos, 0);
    const inertia   = () => placed.reduce((I, o) => I + TYPES[o.type].mass * o.pos * o.pos, I_PLANK);

    function step(h) {
      const net = netMoment();
      if (net === 0) {
        omega += (-8 * theta - 5.7 * omega) * h;
      } else {
        omega += (G * net * Math.cos(theta) / inertia() - 1.2 * omega) * h;
      }
      theta += omega * h;
      if (theta >  THMAX) { theta =  THMAX; if (omega > 0) omega = omega >  0.12 ? -0.2 * omega : 0; }
      if (theta < -THMAX) { theta = -THMAX; if (omega < 0) omega = omega < -0.12 ? -0.2 * omega : 0; }
    }

    // ── Geometry helpers ─────────────────────────────────────
    const w2 = (rx, ry) => {
      const c = Math.cos(theta), s = Math.sin(theta);
      return [PX + rx * c - ry * s, PY + rx * s + ry * c];
    };
    const p2 = (mx, my) => {
      const c = Math.cos(theta), s = Math.sin(theta);
      const dx = mx - PX, dy = my - PY;
      return [dx * c + dy * s, -dx * s + dy * c];
    };
    function layout() {
      const hh = {}, out = [];
      let si;
      for (const o of placed) {
        const t = TYPES[o.type], k = o.pos.toFixed(2);
        const base = hh[k] ? hh[k].h : 0;
        si = hh[k] ? hh[k].n : 0;
        out.push({ o, t, base, si });
        hh[k] = { h: base + t.h, n: si + 1 };
      }
      return out;
    }
    function rr(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }
    const inRect = (mx, my, r) => mx >= r.x && mx <= r.x + r.w && my >= r.y && my <= r.y + r.h;

    // ── Object art ───────────────────────────────────────────
    function drawBrickStack(n, label) {
      for (let i = 0; i < n; i++) {
        const y0 = -(i + 1) * 17;
        ctx.fillStyle = '#9aa9b8';
        ctx.strokeStyle = '#65788c';
        ctx.lineWidth = 1.2;
        rr(-23, y0, 46, 16, 2);
        ctx.fill(); ctx.stroke();
      }
      if (label) {
        const cy = -(n * 17) / 2 - 0.5;
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const tw = ctx.measureText(label).width;
        const bw = tw + 10, bh = 18;
        // lighter-gray plate behind the label for contrast against the brick
        ctx.fillStyle = 'rgba(228,232,236,0.95)';
        ctx.strokeStyle = 'rgba(80,100,120,0.45)';
        ctx.lineWidth = 1;
        rr(-bw / 2, cy - bh / 2, bw, bh, 3);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#000';
        ctx.fillText(label, 0, cy);
        ctx.textBaseline = 'alphabetic';
      }
    }
    function drawObj(id) {
      const labels = { b5: 'M\u2081', b10: 'M\u2082' };
      drawBrickStack(TYPES[id].n, labels[id]);
    }

    // ── Scene drawing ────────────────────────────────────────
    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
      sky.addColorStop(0, '#cfe9f9');
      sky.addColorStop(1, '#eef8fd');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, GROUND);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      for (const [cx, cy, s] of [[88, 30, 1.0], [400, 18, 0.8]]) {
        ctx.beginPath();
        ctx.ellipse(cx, cy, 34 * s, 13 * s, 0, 0, Math.PI * 2);
        ctx.ellipse(cx + 24 * s, cy + 4 * s, 24 * s, 10 * s, 0, 0, Math.PI * 2);
        ctx.ellipse(cx - 26 * s, cy + 5 * s, 20 * s, 9 * s, 0, 0, Math.PI * 2);
        ctx.fill();
      }
      const g = ctx.createLinearGradient(0, GROUND, 0, H);
      g.addColorStop(0, '#76b96b');
      g.addColorStop(1, '#5aa251');
      ctx.fillStyle = g;
      ctx.fillRect(0, GROUND, W, H - GROUND);
      ctx.strokeStyle = '#4f9347';
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(0, GROUND); ctx.lineTo(W, GROUND); ctx.stroke();
    }
    function drawFulcrum() {
      ctx.beginPath();
      ctx.moveTo(PX, PY);
      ctx.lineTo(PX - 40, GROUND);
      ctx.lineTo(PX + 40, GROUND);
      ctx.closePath();
      ctx.fillStyle = '#6e7a88';
      ctx.fill();
      ctx.strokeStyle = '#4d5763';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
    function drawResetBtn() {
      rr(RESETBTN.x, RESETBTN.y, RESETBTN.w, RESETBTN.h, 4);
      ctx.fillStyle = 'rgba(90,110,130,0.55)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '10px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillText('↺ Reset', RESETBTN.x + RESETBTN.w / 2, RESETBTN.y + 11);
    }
    function drawGauge() {
      const cx = PX, cy = GROUND - 40, r = 19, TAU = Math.PI * 2;
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU);
      ctx.fillStyle = '#fdfdf8'; ctx.fill();
      ctx.strokeStyle = '#4d5763'; ctx.lineWidth = 1.5; ctx.stroke();
      for (const a of [-THMAX, 0, THMAX]) {
        const ux = Math.sin(a), uy = -Math.cos(a);
        ctx.beginPath();
        ctx.moveTo(cx + ux * (r - 1), cy + uy * (r - 1));
        ctx.lineTo(cx + ux * (r - 6), cy + uy * (r - 6));
        ctx.strokeStyle = a === 0 ? '#2f9e44' : '#99a3ad';
        ctx.lineWidth = a === 0 ? 2 : 1.5;
        ctx.stroke();
      }
      const level = Math.abs(theta) < 0.007;
      const ux = Math.sin(theta), uy = -Math.cos(theta);
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + ux * (r - 5), cy + uy * (r - 5));
      ctx.strokeStyle = level ? '#2f9e44' : '#d9534f';
      ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      ctx.stroke();
      ctx.beginPath(); ctx.arc(cx, cy, 2.6, 0, TAU);
      ctx.fillStyle = '#4d5763'; ctx.fill();
    }
    function drawPlank(items) {
      ctx.save();
      ctx.translate(PX, PY);
      ctx.rotate(theta);
      // Support beams from ±0.1 m on board top to pivot
      const beamColor = ui.pos === 'rulers' ? '#c8b87a' : '#9a6e38';
      ctx.lineCap = 'butt';
      for (const bx of [-0.1 * S, 0.1 * S]) {
        ctx.strokeStyle = beamColor;
        ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(bx, BOARD_OFFSET); ctx.lineTo(0, 0); ctx.stroke();
      }
      ctx.lineCap = 'butt';
      // Board
      if (ui.pos === 'rulers') {
        ctx.fillStyle = '#f0e6c2';
        ctx.strokeStyle = '#b1a06b';
      } else {
        ctx.fillStyle = '#c08a4e';
        ctx.strokeStyle = '#8a5e2e';
      }
      ctx.lineWidth = 1.4;
      rr(-HALF, BOARD_OFFSET, 2 * HALF, PT, 3);
      ctx.fill(); ctx.stroke();
      if (ui.pos === 'rulers') {
        // Ruler: ticks every 0.25 m, numbers reading outward, "meters" each side
        ctx.strokeStyle = '#7a6a3a';
        ctx.lineWidth = 1;
        for (let i = -8; i <= 8; i++) {
          const x = i * SNAP * S;
          ctx.beginPath();
          ctx.moveTo(x, BOARD_OFFSET + 1);
          ctx.lineTo(x, BOARD_OFFSET + (i % 4 === 0 ? 8 : 5));
          ctx.stroke();
        }
        ctx.fillStyle = '#5a4c20';
        ctx.font = '8px Segoe UI';
        ctx.textAlign = 'center';
        for (let i = 1; i <= 8; i++) {
          const v = i * SNAP;
          ctx.fillText(String(v), -v * S, BOARD_OFFSET + 17);
          ctx.fillText(String(v),  v * S, BOARD_OFFSET + 17);
        }
        ctx.font = 'italic 8.5px Segoe UI';
        ctx.fillText('meters', -HALF / 2, BOARD_OFFSET + PT - 1.5);
        ctx.fillText('meters',  HALF / 2, BOARD_OFFSET + PT - 1.5);
      } else if (ui.pos === 'marks') {
        ctx.strokeStyle = 'rgba(90,55,20,0.6)';
        for (let i = -8; i <= 8; i++) {
          if (i === 0) continue;
          const x = i * SNAP * S;
          ctx.beginPath();
          ctx.moveTo(x, BOARD_OFFSET + 3);
          ctx.lineTo(x, BOARD_OFFSET + PT - 3);
          ctx.lineWidth = (i % 4 === 0) ? 2.4 : 1.1;
          ctx.stroke();
        }
      } else {
        ctx.strokeStyle = 'rgba(120,80,40,0.35)';
        ctx.lineWidth = 1;
        for (const gy of [BOARD_OFFSET + PT - 17, BOARD_OFFSET + PT - 8]) {
          ctx.beginPath();
          ctx.moveTo(-HALF + 8, gy);
          ctx.lineTo(HALF - 8, gy);
          ctx.stroke();
        }
      }
      // Snap ghost while dragging
      if (drag && snapPos !== null) {
        ctx.fillStyle = 'rgba(60,140,240,0.4)';
        rr(snapPos * S - 5, BOARD_OFFSET - 5, 10, PT + 10, 3);
        ctx.fill();
      }
      // Objects riding the plank
      for (const it of items) {
        ctx.save();
        ctx.translate(it.o.pos * S, BOARD_OFFSET - it.base);
        drawObj(it.o.type);
        ctx.restore();
      }
      ctx.restore();
      // Pivot bolt at fulcrum tip
      ctx.beginPath();
      ctx.arc(PX, PY, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#4d5763';
      ctx.fill();
    }
    function drawForces(items) {
      for (const it of items) {
        const [wx0, wy] = w2(it.o.pos * S, BOARD_OFFSET - it.base);
        const off = it.si === 0 ? 0 : (it.si % 2 ? -1 : 1) * Math.ceil(it.si / 2) * 6;
        const wx = wx0 + off;
        const L = Math.min(16 + it.t.mass * 1.15, 110);
        ctx.strokeStyle = 'rgba(40,90,220,0.85)';
        ctx.fillStyle = 'rgba(40,90,220,0.85)';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(wx, wy + 3);
        ctx.lineTo(wx, wy + 3 + L - 8);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(wx, wy + 3 + L);
        ctx.lineTo(wx - 6, wy + 3 + L - 10);
        ctx.lineTo(wx + 6, wy + 3 + L - 10);
        ctx.closePath();
        ctx.fill();
      }
    }
    function drawMassLabels(items) {
      ctx.font = 'bold 11px Segoe UI';
      ctx.textAlign = 'center';
      for (const it of items) {
        const [wx, wy] = w2(it.o.pos * S, BOARD_OFFSET - it.base - it.t.h);
        const txt = it.t.label;
        const tw = ctx.measureText(txt).width + 10;
        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1;
        rr(wx - tw / 2, wy - 22, tw, 16, 4);
        ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#333';
        ctx.fillText(txt, wx, wy - 10);
      }
    }
    function drawKit() {
      kitRects = [];
      rr(KITP.x, KITP.y, KITP.w, KITP.h, 9);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 1.2; ctx.stroke();
      const cells = [
        [KITP.x + 48, KITP.y + 46],
        [KITP.x + 112, KITP.y + 46],
      ];
      const scale = 1;
      ctx.font = '11px Segoe UI';
      KIT_ITEMS.forEach((id, i) => {
        if (isUsed(id)) return;               // hide a brick once it's placed/dragging
        const [cx, by] = cells[i], t = TYPES[id];
        ctx.save(); ctx.translate(cx, by); ctx.scale(scale, scale); drawObj(id); ctx.restore();
        ctx.fillStyle = '#556';
        ctx.textAlign = 'center';
        ctx.fillText(t.label, cx, by + 13);
        kitRects.push({ x: cx - 25, y: by - t.h * scale - 8, w: 50, h: t.h * scale + 24, type: id });
      });
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();
      drawFulcrum();
      if (ui.level) drawGauge();
      if (!init.clean) {
        drawKit();
        if (!hintDone) {
          ctx.fillStyle = '#93aabb';
          ctx.font = '13px Segoe UI';
          ctx.textAlign = 'center';
          ctx.fillText('Drag bricks onto the plank', W / 2, 84);
        }
      }
      const items = layout();
      drawPlank(items);
      if (ui.forces) drawForces(items);
      if (ui.labels) drawMassLabels(items);
      drawResetBtn();
      if (drag) {
        ctx.save();
        ctx.globalAlpha = 0.9;
        ctx.translate(drag.mx, drag.my + TYPES[drag.type].h / 2);
        drawObj(drag.type);
        ctx.restore();
      }
    }

    // ── Animation loop ───────────────────────────────────────
    let lastTs = null, acc = 0;
    const SUB = 1 / 240;
    function frame(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      acc += dt;
      while (acc > SUB) { step(SUB); acc -= SUB; }
      draw();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ── Interaction ──────────────────────────────────────────
    const cpos = e => {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) / r.width * W, (e.clientY - r.top) / r.height * H];
    };
    const overKit = () => !init.clean && drag && inRect(drag.mx, drag.my, KITP);
    function updateSnap() {
      snapPos = null;
      if (!drag) return;
      if (overKit()) return;                 // hovering the kit → return target, no plank snap
      const [rx, ry] = p2(drag.mx, drag.my);
      if (Math.abs(rx) <= HALF + 30 && ry > -170 && ry < BOARD_OFFSET + PT + 70) {
        let p = Math.round(rx / S / SNAP) * SNAP;
        if (p === 0) p = rx >= 0 ? SNAP : -SNAP;
        snapPos = Math.max(-XMAX, Math.min(XMAX, p));
      }
    }
    function hitPlaced(mx, my) {
      const items = layout();
      const [rx, ry] = p2(mx, my);
      for (let i = items.length - 1; i >= 0; i--) {
        const it = items[i];
        const x0 = it.o.pos * S - it.t.w / 2, y1 = BOARD_OFFSET - it.base, y0 = y1 - it.t.h;
        if (rx >= x0 - 4 && rx <= x0 + it.t.w + 4 && ry >= y0 - 4 && ry <= y1 + 4) return it;
      }
      return null;
    }
    canvas.addEventListener('pointerdown', e => {
      if (drag) return;
      const [mx, my] = cpos(e);
      canvas.setPointerCapture(e.pointerId);
      if (inRect(mx, my, RESETBTN)) { reset(); return; }
      if (!init.clean) {
        for (const r of kitRects) {
          if (inRect(mx, my, r)) {
            drag = { type: r.type, mx, my };
            updateSnap();
            return;
          }
        }
      }
      const it = hitPlaced(mx, my);
      if (it) {
        placed.splice(placed.indexOf(it.o), 1);
        drag = { type: it.o.type, mx, my };
        updateSnap();
      }
    });
    canvas.addEventListener('pointermove', e => {
      const [mx, my] = cpos(e);
      if (drag) {
        drag.mx = mx; drag.my = my;
        updateSnap();
        canvas.style.cursor = 'grabbing';
        return;
      }
      if (inRect(mx, my, RESETBTN)) {
        canvas.style.cursor = 'pointer';
        return;
      }
      let hov = hitPlaced(mx, my) !== null;
      if (!init.clean) {
        hov = hov || kitRects.some(r => inRect(mx, my, r));
      }
      canvas.style.cursor = hov ? 'grab' : 'default';
    });
    function endDrag() {
      if (!drag) return;
      // Dropping over the kit (or anywhere off the plank) returns the brick to the box.
      if (!overKit() && snapPos !== null) {
        placed.push({ type: drag.type, pos: snapPos });
        hintDone = true;
      }
      drag = null;
      snapPos = null;
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);
  })();
  </script>
</body>
</html>
