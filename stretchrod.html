<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stretch Rod</title>
  <!-- Original AoPS interactive. Faithful 2D replacement for the GlowScript
       "stretchrod" program: a bent rod (modelling a DNA segment) showing how
       bending causes compression on the inner strand and tension on the outer strand.
       The slider controls the curvature (kappa). Inner segments turn red
       when compressed; outer segments turn blue when stretched. -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }
    .controls { padding: 8px 12px; font-size: 14px; }
    .ctrl-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] { width: 260px; vertical-align: middle; }
  </style>
</head>
<body>
<div class="controls">
  <div class="ctrl-row">
    <input type="range" id="bendSlider" min="0" max="100" step="1" value="0">
    <span id="bendLabel">bending: 0%</span>
  </div>
</div>
<canvas id="c"></canvas>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
<script>
(() => {
  'use strict';

  const MAXW     = 500;
  const NUM_SEGS = 6; // 7 balls → 6 segments
  const L        = 5; // neutral arc length (scene units)
  const T        = 1; // thickness (inner-to-outer separation)

  const canvas     = document.getElementById('c');
  const ctx        = canvas.getContext('2d');
  const bendSlider = document.getElementById('bendSlider');
  const bendLabel  = document.getElementById('bendLabel');

  let W, H, scale, dpr;
  // origin in canvas coords maps to GlowScript (0, 0)
  let ox, oy;

  function layout() {
    W     = Math.min(window.innerWidth || MAXW, MAXW);
    H     = Math.round(W * 0.5);
    scale = W / 6.5; // ~6 GS units wide
    ox    = W / 2;
    oy    = H * 0.65; // put GS y=0 (bottom of ∪) in lower portion, arms rise above
    dpr   = window.devicePixelRatio || 1;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    document.body.style.width = W + 'px';
  }

  // GlowScript to canvas coords (y flipped)
  function gx(x) { return ox + x * scale; }
  function gy(y) { return oy - y * scale; }

  function clamp01(v) { return Math.max(0, Math.min(1, v)); }

  function springColor(lenRatio) {
    // compressed → red; stretched → blue; rest → gray (#666)
    const cf = Math.pow(lenRatio, -13);
    const r = clamp01(cf * 0.4);
    const b = clamp01((1 / cf) * 0.4);
    const g = clamp01(0.4 / Math.max(cf, 1 / cf));
    return `rgb(${Math.round(r * 255)},${Math.round(g * 255)},${Math.round(b * 255)})`;
  }

  function drawSpringCoil(x1, y1, x2, y2, color) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    if (len < 1) return;
    const ux = dx / len, uy = dy / len;   // unit along spring (pixel space)
    const nx = -uy,      ny =  ux;        // unit perpendicular (left of direction)
    const N_COILS = 8;
    const AMP = Math.max(2, scale * 0.1); // amplitude in pixels
    const STEPS = N_COILS * 16;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    for (let i = 1; i <= STEPS; i++) {
      const t = i / STEPS;
      const s = Math.sin(t * N_COILS * 2 * Math.PI);
      ctx.lineTo(x1 + t * dx + s * AMP * nx, y1 + t * dy + s * AMP * ny);
    }
    ctx.strokeStyle = color;
    ctx.lineWidth = Math.max(1.5, scale * 0.025);
    ctx.lineCap = 'butt';
    ctx.stroke();
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    const pct   = parseFloat(bendSlider.value) / 100;
    // kappa ranges 0.001 (straight) to 0.401 (maximally bent)
    const kappa = 0.001 + pct * 0.4;
    const r0    = 1 / kappa;
    const rIn   = r0 - T / 2;
    const rOut  = r0 + T / 2;
    const theta = L / r0;        // total angle of arc
    const th0   = -theta / 2;   // start angle

    // Center of curvature is at GS (0, r0); the arc midpoint is at GS (0,0).
    const centerX = 0;
    const centerY = r0;

    // Background (DNA segment fill) — slightly wider/taller than the rod
    const rBgIn  = rIn  - T * 0.2;
    const rBgOut = rOut + T * 0.2;
    const BG_SEGS = 60;
    ctx.beginPath();
    for (let k = 0; k <= BG_SEGS; k++) {
      const th = th0 * 1.05 + (k / BG_SEGS) * theta * 1.05;
      const x  = centerX + rBgOut * Math.sin(th);
      const y  = centerY - rBgOut * Math.cos(th);
      if (k === 0) ctx.moveTo(gx(x), gy(y)); else ctx.lineTo(gx(x), gy(y));
    }
    for (let k = BG_SEGS; k >= 0; k--) {
      const th = th0 * 1.05 + (k / BG_SEGS) * theta * 1.05;
      const x  = centerX + rBgIn * Math.sin(th);
      const y  = centerY - rBgIn * Math.cos(th);
      ctx.lineTo(gx(x), gy(y));
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(255, 238, 191, 0.8)';
    ctx.fill();

    // Compute ball positions on inner and outer strands
    // Rest length = center-to-center distance between adjacent balls when straight
    const restLength = L / NUM_SEGS;

    const innerBalls = [];
    const outerBalls = [];
    for (let i = 0; i <= NUM_SEGS; i++) {
      const thBall = th0 + (i / NUM_SEGS) * theta;
      innerBalls.push({
        x: centerX + rIn  * Math.sin(thBall),
        y: centerY - rIn  * Math.cos(thBall),
      });
      outerBalls.push({
        x: centerX + rOut * Math.sin(thBall),
        y: centerY - rOut * Math.cos(thBall),
      });
    }

    const BALL_R = Math.max(2, scale * 0.1);

    // Draw springs as coils between adjacent balls
    for (let j = 0; j < NUM_SEGS; j++) {
      const iA = innerBalls[j], iB = innerBalls[j + 1];
      const oA = outerBalls[j], oB = outerBalls[j + 1];

      const innerLen   = Math.hypot(iB.x - iA.x, iB.y - iA.y);
      const outerLen   = Math.hypot(oB.x - oA.x, oB.y - oA.y);
      const innerRatio = innerLen / restLength;
      const outerRatio = outerLen / restLength;

      drawSpringCoil(gx(iA.x), gy(iA.y), gx(iB.x), gy(iB.y), springColor(innerRatio));
      drawSpringCoil(gx(oA.x), gy(oA.y), gx(oB.x), gy(oB.y), springColor(outerRatio));
    }

    // Draw balls
    ctx.fillStyle = '#d0d0d0';
    for (let i = 0; i <= NUM_SEGS; i++) {
      ctx.beginPath();
      ctx.arc(gx(innerBalls[i].x), gy(innerBalls[i].y), BALL_R, 0, 2 * Math.PI);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(gx(outerBalls[i].x), gy(outerBalls[i].y), BALL_R, 0, 2 * Math.PI);
      ctx.fill();
    }
  }

  bendSlider.addEventListener('input', () => {
    bendLabel.textContent = 'bending: ' + bendSlider.value + '%';
    draw();
  });
  window.addEventListener('resize', () => { layout(); draw(); });

  layout();
  draw();
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
</html>
