<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pendulum Lab</title>
  <!-- Original AoPS interactive. Replaces the third-party "Pendulum Lab" simulation. -->
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 800px; height: 500px; overflow: hidden;
      background: #fbfcfe;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
      display: flex;
    }
    canvas { display: block; touch-action: none; }
    #panel {
      width: 210px; height: 500px;
      background: #eef2f7; border-left: 1px solid #ccd6e0;
      display: flex; flex-direction: column; gap: 6px; padding: 7px 7px;
      font-size: 11px; color: #2c3e50;
    }
    .grp {
      background: #fff; border: 1px solid #d5dee6; border-radius: 8px;
      padding: 5px 8px 6px; display: flex; flex-direction: column; gap: 3px;
    }
    .gt {
      font-size: 9.5px; font-weight: 600; color: #8295a6;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .row { display: flex; align-items: center; gap: 4px; white-space: nowrap; }
    .lab { width: 44px; color: #46586a; }
    .un  { color: #7a8b9a; font-size: 10px; }
    .val { min-width: 44px; font-weight: 600; }
    label { display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }
    input[type=checkbox] { margin: 0; width: 12px; height: 12px; accent-color: #3a78b5; cursor: pointer; }
    input[type=range] { width: 100%; height: 14px; accent-color: #3a78b5; cursor: pointer; }
    input[type=number] {
      width: 54px; font: 600 11px 'Segoe UI', system-ui, sans-serif;
      border: 1px solid #b8c6d2; border-radius: 4px; padding: 1px 3px; color: #2c3e50;
    }
    .pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin: 1px 0 2px; }
    .pbtn {
      font: 600 10.5px 'Segoe UI', system-ui, sans-serif; cursor: pointer;
      border: 1px solid #9fb2c2; border-radius: 5px; background: #f4f8fb;
      color: #2c3e50; padding: 3px 2px;
    }
    .pbtn:hover { background: #e3eef7; }
    .pbtn.on { background: #3a78b5; border-color: #2c5d8f; color: #fff; }
    #gMystery { color: #8a5ab5; font-style: italic; padding: 1px 0 0; }
    .ends { display: flex; justify-content: space-between; font-size: 9.5px; color: #8295a6; }
    #resetBtn {
      margin-top: auto;
      font: 600 12px 'Segoe UI', system-ui, sans-serif; cursor: pointer;
      border: 1px solid #9fb2c2; border-radius: 6px; background: #f4f8fb;
      color: #2c3e50; padding: 5px 8px;
    }
    #resetBtn:hover { background: #e3eef7; }
  </style>
</head>
<body>
  <canvas id="c" width="590" height="500"></canvas>

  <div id="panel">
    <div class="grp" id="grpPendulum">
      <div class="gt">Pendulum</div>
      <div id="lenGroup" style="display:flex;flex-direction:column;gap:3px">
        <div class="row"><span class="lab">Length</span>
          <input type="number" id="lenNum" min="0.10" max="1.00" step="0.01" value="0.70">
          <span class="un">m</span></div>
        <input type="range" id="lenSl" min="0.10" max="1.00" step="0.01" value="0.70">
      </div>
      <div id="massGroup" style="display:flex;flex-direction:column;gap:3px">
        <div class="row"><span class="lab">Mass</span><span class="val" id="massVal">1.00 kg</span></div>
        <input type="range" id="massSl" min="0.1" max="1.5" step="0.05" value="1.0">
      </div>
    </div>

    <div class="grp" id="grpGravity">
      <div class="gt">Gravity</div>
      <div class="pgrid">
        <button class="pbtn" id="pbEarth">Earth</button>
        <button class="pbtn" id="pbMoon">Moon</button>
        <button class="pbtn" id="pbJupiter">Jupiter</button>
        <button class="pbtn" id="pbX">Planet X</button>
      </div>
      <div id="gRows">
        <div class="row"><span class="lab">g</span>
          <input type="number" id="gNum" min="0.1" max="25" step="0.01" value="9.81">
          <span class="un">m/s&sup2;</span></div>
        <input type="range" id="gSl" min="0.1" max="25" step="0.01" value="9.81">
      </div>
      <div id="gMystery" style="display:none">g = ? &nbsp;(unknown)</div>
    </div>

    <div class="grp" id="grpFriction">
      <div class="gt">Friction</div>
      <input type="range" id="fricSl" min="0" max="100" step="1" value="0">
      <div class="ends"><span>None</span><span>Lots</span></div>
    </div>

    <div class="grp" id="grpTools">
      <div class="gt">Tools</div>
      <label><input type="checkbox" id="cbStopwatch"> Stopwatch</label>
      <label><input type="checkbox" id="cbRuler"> Ruler</label>
      <label><input type="checkbox" id="cbTimer"> Period timer</label>
    </div>

    <button id="resetBtn" title="Restore the initial setup">&#8634; Reset all</button>
  </div>

  <script>
  (() => {
    'use strict';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const NOPANEL = ['0', 'false', 'no'].includes((new URLSearchParams(location.search).get('panel') || '').toLowerCase());
    const W = NOPANEL ? 800 : 590, H = 500;
    const SCALE = W / 590;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    // ── Layout constants ─────────────────────────────────────
    const PIV = { x: Math.round(300 * SCALE), y: 70 };
    const PX_PER_M = Math.round(340 * SCALE);
    const PROT_R = Math.round(140 * SCALE);

    // ── Physics constants ────────────────────────────────────
    const H_SUB  = 1 / 240;            // RK4 substep (s of sim time)
    const STEP_DT = 0.02;              // "step" button advance (s of sim time)
    const SLOW_FACTOR = 0.25;          // slow motion rate
    const PLANETS = { earth: 9.81, moon: 1.62, jupiter: 24.8 };
    const FRIC_TO_B = 0.003;           // slider 0-100 -> b (kg/s), v'' damping b/m * w

    // ── URL params ───────────────────────────────────────────
    const Q = new URLSearchParams(location.search);
    const qnum = (k, def, lo, hi) => {
      const v = parseFloat(Q.get(k));
      return isNaN(v) ? def : Math.min(hi, Math.max(lo, v));
    };
    const qflag = k => ['1', 'true', 'yes'].includes((Q.get(k) || '').toLowerCase());
    const GX = qnum('gx', 14.2, 0.1, 25);   // hidden Planet X gravity

    function initialState() {
      let planet = (Q.get('planet') || '').toLowerCase();
      let g;
      if (planet === 'x') { g = GX; }
      else if (Q.has('g')) { planet = 'custom'; g = qnum('g', 9.81, 0.1, 25); }
      else if (planet === 'moon') { g = PLANETS.moon; }
      else if (planet === 'jupiter') { g = PLANETS.jupiter; }
      else { planet = 'earth'; g = PLANETS.earth; }
      return {
        L: qnum('length', qnum('l', 0.70, 0.1, 1.0), 0.1, 1.0),
        m: qnum('mass', 1.0, 0.1, 1.5),
        g, planet,
        friction: qnum('friction', 0, 0, 100),
        slow: qflag('slow'),
        paused: qflag('paused'),
        theta: qnum('angle', 0, -170, 170) * Math.PI / 180,
        omega: 0,
        tools: { stopwatch: qflag('stopwatch') || qflag('swfixed'), ruler: qflag('ruler'), timer: qflag('timer') },
        pos: {                              // tool card top-left corners
          stopwatch: { x: 14, y: 386 },     // lower-left, per the lesson script
          timer:     { x: 14, y: 88 },
          ruler:     { x: 430, y: 64 }
        },
        swatch: { t: 0, running: false }
      };
    }
    const CLEAN = qflag('clean');           // hide hint + playback chrome for captures
    // ── Extra capture / embed options ────────────────────────
    const MARKS = qflag('marks');           // short blue segments at the amplitude turning points
    const arcRaw = Q.get('arc');            // static degree protractor (number = radius, px)
    const STATIC_PROT = qflag('protractor') || (arcRaw !== null && arcRaw !== '');
    const PROT_STATIC_R = (arcRaw !== null && arcRaw !== '' && !isNaN(parseFloat(arcRaw)))
      ? Math.min(240, Math.max(60, parseFloat(arcRaw))) : Math.round(140 * SCALE);
    const NOSLOW = qflag('noslow');         // hide the slow-motion / normal speed radios
    const SWFIXED  = qflag('swfixed');       // stopwatch always on, no checkbox
    const NOSTOP   = qflag('nostop');        // ?nostop=1 → hide "Stop bob" button
    const NOPLAYER = qflag('noplayer');      // ?noplayer=1 → hide pause / step / speed controls
    const NOGRAVITY  = qflag('nogravity');   // hide gravity panel section
    const NOFRICTION = qflag('nofriction');  // hide friction panel section
    const NOMASS     = qflag('nomass');      // hide mass slider in panel
    const NOLENGTH   = qflag('nolength');    // hide length controls in panel
    const NOTOOLS    = qflag('notools');     // hide tools section in panel
    const NORESET    = qflag('noreset');     // hide Reset button
    const NOPAUSE    = qflag('nopause');     // hide pause/play button
    const NOSTEP     = qflag('nostep');      // hide step button
    const NOCLUSTER  = qflag('nocluster');   // hide all bottom canvas controls

    // ── State ────────────────────────────────────────────────
    let S;                 // mutable sim state
    let simAcc = 0;        // substep accumulator
    let hintDismissed = false;
    let ampDeg = 0;        // current oscillation amplitude (deg) — drives the blue marks
    // period timer measurement
    let ptSign = 0, ptT0 = NaN, ptVal = NaN, ptSimT = 0;
    // dragging
    let drag = null;       // {kind:'bob'|'stopwatch'|'timer'|'ruler', dx, dy}
    let hoverKind = null;
    let lastMx = -1, lastMy = -1;

    function resetPeriodTimer() { ptSign = 0; ptT0 = NaN; ptVal = NaN; }

    // ── DOM handles ──────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const lenNum = $('lenNum'), lenSl = $('lenSl');
    const massSl = $('massSl'), massVal = $('massVal');
    const gNum = $('gNum'), gSl = $('gSl'), gRows = $('gRows'), gMystery = $('gMystery');
    const fricSl = $('fricSl');
    const cbStopwatch = $('cbStopwatch'), cbRuler = $('cbRuler'), cbTimer = $('cbTimer');
    const pBtns = { earth: $('pbEarth'), moon: $('pbMoon'), jupiter: $('pbJupiter'), x: $('pbX') };

    function syncUI() {
      lenNum.value = S.L.toFixed(2); lenSl.value = S.L;
      massSl.value = S.m; massVal.textContent = S.m.toFixed(2) + ' kg';
      fricSl.value = S.friction;
      cbStopwatch.checked = S.tools.stopwatch;
      cbRuler.checked = S.tools.ruler;
      cbTimer.checked = S.tools.timer;
      for (const k in pBtns) pBtns[k].classList.toggle('on', S.planet === k);
      if (S.planet === 'x') {
        gRows.style.display = 'none'; gMystery.style.display = 'block';
      } else {
        gRows.style.display = 'block'; gMystery.style.display = 'none';
        gNum.value = S.g.toFixed(2); gSl.value = S.g;
      }
    }

    function applyReset() {
      S = initialState();
      ampDeg = Math.abs(S.theta * 180 / Math.PI);   // marks appear at the load amplitude
      simAcc = 0; ptSimT = 0; drag = null;
      resetPeriodTimer();
      syncUI();
    }
    applyReset();
    if (SWFIXED) {                          // always-on stopwatch: drop the checkbox
      const swLab = cbStopwatch.closest('label');
      if (swLab) swLab.style.display = 'none';
    }
    if (NOPANEL)    document.getElementById('panel').style.display     = 'none';
    if (NOGRAVITY)  $('grpGravity').style.display  = 'none';
    if (NOFRICTION) $('grpFriction').style.display = 'none';
    if (NOTOOLS)    $('grpTools').style.display    = 'none';
    if (NORESET)    $('resetBtn').style.display    = 'none';
    if (NOLENGTH)   $('lenGroup').style.display    = 'none';
    if (NOMASS)     $('massGroup').style.display   = 'none';

    // ── Panel events ─────────────────────────────────────────
    function setLength(v) {
      if (isNaN(v)) { syncUI(); return; }
      S.L = Math.min(1.0, Math.max(0.1, v));
      resetPeriodTimer(); syncUI();
    }
    lenSl.addEventListener('input', () => setLength(parseFloat(lenSl.value)));
    lenNum.addEventListener('change', () => setLength(parseFloat(lenNum.value)));
    massSl.addEventListener('input', () => {
      S.m = parseFloat(massSl.value);
      massVal.textContent = S.m.toFixed(2) + ' kg';
    });
    function setGravity(v) {
      if (isNaN(v)) { syncUI(); return; }
      S.g = Math.min(25, Math.max(0.1, v));
      S.planet = 'custom';
      resetPeriodTimer(); syncUI();
    }
    gSl.addEventListener('input', () => setGravity(parseFloat(gSl.value)));
    gNum.addEventListener('change', () => setGravity(parseFloat(gNum.value)));
    for (const k in pBtns) pBtns[k].addEventListener('click', () => {
      S.planet = k;
      S.g = (k === 'x') ? GX : PLANETS[k];
      resetPeriodTimer(); syncUI();
    });
    fricSl.addEventListener('input', () => { S.friction = parseFloat(fricSl.value); });
    cbStopwatch.addEventListener('change', () => { S.tools.stopwatch = cbStopwatch.checked; });
    cbRuler.addEventListener('change', () => { S.tools.ruler = cbRuler.checked; });
    cbTimer.addEventListener('change', () => {
      S.tools.timer = cbTimer.checked;
      if (cbTimer.checked) resetPeriodTimer();
    });
    $('resetBtn').addEventListener('click', applyReset);

    // ── Physics: full nonlinear pendulum, RK4 ────────────────
    // theta'' = -(g/L) sin(theta) - (b/m) theta'
    function deriv(th, om) {
      return [om, -(S.g / S.L) * Math.sin(th) - (S.friction * FRIC_TO_B / S.m) * om];
    }
    function substep() {
      ptSimT += H_SUB;
      if (S.swatch.running) S.swatch.t += H_SUB;
      if (drag && drag.kind === 'bob') return;   // bob held: dynamics frozen, clocks run
      const h = H_SUB;
      const pth = S.theta;
      const pom = S.omega;
      const k1 = deriv(S.theta, S.omega);
      const k2 = deriv(S.theta + 0.5 * h * k1[0], S.omega + 0.5 * h * k1[1]);
      const k3 = deriv(S.theta + 0.5 * h * k2[0], S.omega + 0.5 * h * k2[1]);
      const k4 = deriv(S.theta + h * k3[0], S.omega + h * k3[1]);
      S.theta += h / 6 * (k1[0] + 2 * k2[0] + 2 * k3[0] + k4[0]);
      S.omega += h / 6 * (k1[1] + 2 * k2[1] + 2 * k3[1] + k4[1]);
      // lowest-point pass: linear-interpolated zero crossing of theta
      if (((pth <= 0 && S.theta > 0) || (pth >= 0 && S.theta < 0)) && Math.abs(S.omega) > 1e-4) {
        const tc = (ptSimT - h) + h * (pth / (pth - S.theta));
        const dir = S.omega > 0 ? 1 : -1;
        if (S.tools.timer) {
          if (ptSign === 0) { ptSign = dir; ptT0 = tc; }
          else if (dir === ptSign) { ptVal = tc - ptT0; ptT0 = tc; }
        }
      }
      // highest-point pass (omega sign flip): refresh the amplitude the marks show,
      // so they track the true turning angle (and decay correctly under friction).
      if (pom * S.omega < 0 && Math.abs(S.theta) > 0.02) {
        ampDeg = Math.abs(S.theta * 180 / Math.PI);
      }
    }
    function advance(dt) {
      simAcc += dt;
      // cap pathological backlogs (tab switch)
      if (simAcc > 0.25) simAcc = 0.25;
      while (simAcc >= H_SUB) { substep(); simAcc -= H_SUB; }
    }
    function stopBob() {
      S.theta = 0; S.omega = 0;
      resetPeriodTimer();
    }

    // ── Geometry helpers ─────────────────────────────────────
    const bobR = () => 12 * Math.cbrt(S.m) + 4;
    function bobXY() {
      const Lpx = S.L * PX_PER_M;
      return { x: PIV.x + Lpx * Math.sin(S.theta), y: PIV.y + Lpx * Math.cos(S.theta) };
    }

    // tool card sizes
    const SW_W = 128, SW_H = 72;       // stopwatch
    const PT_W = 132, PT_H = 58;       // period timer
    const RU_W = 36,  RU_H = 354;      // ruler (100 cm at 3.4 px/cm + margins)

    // on-canvas playback cluster geometry
    const CL = {
      stop:   { x: 124, y: 461, w: 84, h: 27 },
      rNorm:  { cx: 243, cy: 474, r: 7 },
      rSlow:  { cx: 318, cy: 474, r: 7 },
      pause:  { cx: 432, cy: 474, r: 15 },
      step:   { cx: 467, cy: 474, r: 11 }
    };
    // stopwatch sub-buttons (relative to card)
    const SW_BTN_GO  = { x: 8,  y: 42, w: 60, h: 22 };
    const SW_BTN_RST = { x: 74, y: 42, w: 46, h: 22 };

    // ── Drawing ──────────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawMount() {
      // hatched anchor block + bar
      const bx = PIV.x - 85, bw = 170, by = 42, bh = 14;
      ctx.fillStyle = '#9fb0c0';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = '#7c8e9e'; ctx.lineWidth = 1;
      ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);
      // hatching above the bar
      ctx.save();
      ctx.beginPath(); ctx.rect(bx, by - 9, bw, 9); ctx.clip();
      ctx.strokeStyle = '#b6c4d1'; ctx.lineWidth = 1.5;
      for (let x = bx - 10; x < bx + bw + 10; x += 9) {
        ctx.beginPath(); ctx.moveTo(x, by); ctx.lineTo(x + 9, by - 10); ctx.stroke();
      }
      ctx.restore();
      // bracket
      ctx.beginPath();
      ctx.moveTo(PIV.x - 12, by + bh); ctx.lineTo(PIV.x, PIV.y + 3); ctx.lineTo(PIV.x + 12, by + bh);
      ctx.closePath();
      ctx.fillStyle = '#8a99a8'; ctx.fill();
      // pivot pin
      ctx.beginPath(); ctx.arc(PIV.x, PIV.y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#54616d'; ctx.fill();
      ctx.strokeStyle = '#39434c'; ctx.lineWidth = 1; ctx.stroke();
    }

    function drawProtractor() {
      const degNow = S.theta * 180 / Math.PI;
      ctx.save();
      // sector highlight from vertical to current angle
      ctx.beginPath();
      ctx.moveTo(PIV.x, PIV.y);
      ctx.arc(PIV.x, PIV.y, PROT_R, Math.PI / 2, Math.PI / 2 - S.theta, S.theta > 0);
      ctx.closePath();
      ctx.fillStyle = 'rgba(76,141,201,0.13)'; ctx.fill();
      // arc
      ctx.beginPath();
      ctx.arc(PIV.x, PIV.y, PROT_R, Math.PI / 2 - Math.PI / 2, Math.PI / 2 + Math.PI / 2);
      ctx.strokeStyle = 'rgba(60,90,120,0.55)'; ctx.lineWidth = 1.2; ctx.stroke();
      // ticks every 5 deg, labels every 15 deg
      ctx.fillStyle = '#5a7187'; ctx.font = '9px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      for (let a = -90; a <= 90; a += 5) {
        const rad = a * Math.PI / 180;
        const sx = Math.sin(rad), cy = Math.cos(rad);
        const len = (a % 45 === 0) ? 11 : (a % 15 === 0) ? 9 : 5.5;
        ctx.beginPath();
        ctx.moveTo(PIV.x + (PROT_R - len) * sx, PIV.y + (PROT_R - len) * cy);
        ctx.lineTo(PIV.x + PROT_R * sx, PIV.y + PROT_R * cy);
        ctx.strokeStyle = 'rgba(60,90,120,0.55)';
        ctx.lineWidth = (a % 15 === 0) ? 1.3 : 1;
        ctx.stroke();
        if (a % 15 === 0) {
          ctx.fillText(String(Math.abs(a)) + '°',
            PIV.x + (PROT_R + 13) * sx, PIV.y + (PROT_R + 13) * cy);
        }
      }
      // current-angle ray
      ctx.beginPath();
      ctx.moveTo(PIV.x, PIV.y);
      ctx.lineTo(PIV.x + PROT_R * Math.sin(S.theta), PIV.y + PROT_R * Math.cos(S.theta));

    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function(k) { p.delete(k); });
    for (var k in ov) { var v=ov[k]; if(v===null||v==='') p.delete(k); else p.set(k,v); }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }
  function buildCheatUrl(ov) {
    var b = buildCleanUrl(ov);
    return b + (b.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }
  function getEff(d) {
    var r = _cpQ.get(d.name);
    return r !== null ? r : (d['default'] !== undefined ? String(d['default']) : '');
  }
  function isTruthy(v) { return v!=='0'&&v!=='false'&&v!=='no'&&v!=='off'&&v!==''; }

  function makeControl(d) {
    var eff = getEff(d);
    if (d.type === 'toggle') {
      var on = isTruthy(eff), btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:'+(on?'#1b3d1b':'#3d1b1b')+';color:'+(on?'#6dca80':'#e07070')+
        ';border:1px solid '+(on?'#2a7a3a':'#8a2a2a')+';border-radius:3px;padding:3px 10px;'+
        'cursor:pointer;font-size:12px;min-width:70px';
      btn.onclick = function() { var u={}; u[d.name]=on?'0':'1'; location.href=buildCheatUrl(u); };
      return btn;
    }
    if (d.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
        'border-radius:3px;padding:3px 8px;font-size:12px;cursor:pointer';
      d.values.forEach(function(v) {
        var o = document.createElement('option'); o.value=v; o.textContent=v;
        if (eff===String(v)) o.selected=true; sel.appendChild(o);
      });
      sel.onchange = function() { var u={}; u[d.name]=sel.value; location.href=buildCheatUrl(u); };
      return sel;
    }
    var inp = document.createElement('input');
    inp.type = d.type==='number' ? 'number' : 'text'; inp.value = eff;
    if (d.min!==undefined) inp.min=String(d.min);
    if (d.max!==undefined) inp.max=String(d.max);
    if (d.step!==undefined) inp.step=String(d.step);
    inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
      'border-radius:3px;padding:3px 6px;width:'+(d.type==='number'?'90':'220')+'px;font-size:12px';
    inp.onchange = function() { var u={}; u[d.name]=inp.value; location.href=buildCheatUrl(u); };
    return inp;
  }

  function typeLabel(d) {
    if (d.type==='toggle') return '0|1';
    if (d.type==='select') return d.values.join('|');
    if (d.type==='number'&&d.min!==undefined&&d.max!==undefined) return d.min+'–'+d.max;
    return d.type;
  }

  function render() {
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;'+
      'background:rgba(12,18,32,0.97);color:#c8d8e8;'+
      'font-family:"Segoe UI",system-ui,monospace;font-size:13px;'+
      'border-top:2px solid #3a7bd5;z-index:2147483647;max-height:48vh;overflow-y:auto;'+
      'padding:10px 16px 14px;box-sizing:border-box;box-shadow:0 -4px 24px rgba(0,0,0,0.6)';

    var bubble = document.createElement('button');
    bubble.style.cssText = 'position:fixed;bottom:8px;right:12px;'+
      'background:rgba(12,18,32,0.95);color:#7ab8f5;border:1px solid #3a7bd5;'+
      'border-radius:4px;padding:4px 12px;font-size:12px;'+
      'font-family:"Segoe UI",system-ui,monospace;cursor:pointer;'+
      'z-index:2147483647;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.5);user-select:none';
    bubble.textContent = '🔑 Cheat Panel';
    bubble.onclick = function() { bubble.style.display='none'; panel.style.display=''; };
    document.body.appendChild(bubble);

    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-weight:bold;color:#7ab8f5;margin-bottom:8px;'+
      'display:flex;align-items:center;justify-content:space-between';
    var hspan = document.createElement('span');
    hspan.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var btns = document.createElement('div');
    btns.style.cssText = 'display:flex;align-items:center;gap:2px';
    var minbtn = document.createElement('button');
    minbtn.textContent = '−';
    minbtn.title = 'Minimize (restore without reloading)';
    minbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    minbtn.onclick = function() { panel.style.display='none'; bubble.style.display=''; };
    var xbtn = document.createElement('button');
    xbtn.textContent = '×'; xbtn.title = 'Close (reload to restore)';
    xbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    xbtn.onclick = function() { panel.remove(); bubble.remove(); };
    btns.appendChild(minbtn); btns.appendChild(xbtn);
    hdr.appendChild(hspan); hdr.appendChild(btns); panel.appendChild(hdr);

    var tbl = document.createElement('table');
    tbl.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var hrow = tbl.createTHead().insertRow();
    ['Parameter','Type/Values','Control','Description'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;'+
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = tbl.createTBody();
    CHEAT_DEFS.forEach(function(d) {
      var row = tbody.insertRow(), isSet = _cpQ.has(d.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;'+
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;'+
        'color:'+(isSet?'#a8d4ff':'#7fa8d0')+';white-space:nowrap;font-family:monospace';
      nc.textContent = d.name;
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;font-family:monospace';
      tc.textContent = typeLabel(d);
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(d));
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (d.desc||'')+(d['default']!==undefined?' (default: '+d['default']+')':'');
    });
    panel.appendChild(tbl);

    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;'+
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var ulbl = document.createElement('span');
    ulbl.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;'+
      'letter-spacing:.06em;white-space:nowrap;flex-shrink:0';
    ulbl.textContent = 'Embed URL:';
    var ulink = document.createElement('a');
    ulink.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;'+
      'font-family:monospace;text-decoration:none';
    ulink.href = buildCleanUrl({}); ulink.textContent = buildCleanUrl({});
    ulink.onclick = function(e) { e.preventDefault(); location.href=buildCheatUrl({}); };
    var cpybtn = document.createElement('button');
    cpybtn.textContent = 'copy';
    cpybtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;'+
      'border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;'+
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    cpybtn.onclick = function() {
      navigator.clipboard && navigator.clipboard.writeText(buildCleanUrl({}));
      cpybtn.textContent = '✓ copied';
      setTimeout(function() { cpybtn.textContent = 'copy'; }, 1500);
    };
    urlBox.appendChild(ulbl); urlBox.appendChild(ulink); urlBox.appendChild(cpybtn);
    panel.appendChild(urlBox);
    document.body.appendChild(panel);
  }
  render();
})();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
