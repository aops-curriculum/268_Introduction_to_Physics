<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spring Stretch</title>
  <!-- Original AoPS interactive. Replaces the third-party "Masses and Springs: Basics" simulation. -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      position: relative;
      width: 384px; height: 468px; overflow: hidden;
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; touch-action: none; }
    #zoom-bar {
      position: absolute; display: none;
      align-items: center; gap: 4px;
      background: rgba(255,255,255,0.93);
      border: 1px solid rgba(0,0,0,0.14); border-radius: 6px;
      padding: 3px 7px; z-index: 2; pointer-events: auto; white-space: nowrap;
    }
    #zoom-bar label { font-size: 10px; color: #2c3540; }
    #zoom-bar input[type=range] { width: 84px; cursor: pointer; }
    #zoom-val { font: bold 10px 'Segoe UI', sans-serif; color: #2c3540; min-width: 28px; }
    #reset-view {
      padding: 1px 6px; border-radius: 4px; background: #b0b8c4;
      border: 1px solid #8a9aaa; color: #fff;
      font: bold 9px 'Segoe UI', sans-serif; cursor: pointer;
    }
    #reset-view.active { background: #e8762d; border-color: #bf5a18; }
  </style>
</head>
<body>
<canvas id="c" width="384" height="468"></canvas>
<div id="zoom-bar">
  <label for="zoom-slider">Zoom</label>
  <input type="range" id="zoom-slider" min="1" max="4" step="0.01" value="1">
  <span id="zoom-val">1.0×</span>
  <button id="reset-view">Reset View</button>
</div>
<script>
(() => {
  'use strict';

  // ── Design constants (all layout in 400×468 design units) ──────────────
  const W = 384, H = 468;
  const PXCM = 4.2;                 // canvas px per simulated cm
  const ANCHOR_Y = 32;              // springs hang from here (bar bottom)
  const L0 = 50;                    // natural length of each spring, cm
  const FLOOR_Y = 448;              // shelf top
  const G = 9.8;                    // m/s^2
  const K_MIN = 3, K_MAX = 12;      // N/m, "Small".."Large"
  // Default spring constant calibrated so the 100 g cylinder stretches the
  // spring exactly 14.70 cm (the class histogram's modal 14.5–15.0 cm bin):
  // k = mg/x = 0.100 * 9.8 / 0.147 = 6.6667 N/m.
  const K_DEFAULT = 0.100 * G / 0.147;
  const DAMP = 0.14;                // s^-1: light damping, a = g - (k/m)x - DAMP*v
  const DT = 1 / 240;               // fixed physics substep, s
  const SLOW_FACTOR = 0.25;         // "Slow" radio time scale
  const HOOK_H = 8;                 // px between a mass's hook top and body top
  const DETACH_DX = 48;             // px sideways pull that unhooks a mass
  const SNAP_R = 34;                // px hook-snap radius
  const MIN_EXT = -0.42;            // m, max compression (spring >= 8 cm long)

  // ── URL parameter: ?k1=<N/m> (spring constant) ─────────────────────────
  const qs = new URLSearchParams(location.search);
  const parseK = name => {
    const v = parseFloat(qs.get(name));
    return isFinite(v) ? Math.min(K_MAX, Math.max(K_MIN, v)) : K_DEFAULT;
  };
  const K1_INIT = parseK('k1');
  const _zoomMode = qs.get('zoom') === 'true';

  // ── Scene objects ───────────────────────────────────────────────────────
  const springs = [
    { x: 199, k: K1_INIT, ext: 0, v: 0, massIdx: -1 },
  ];

  const massDefs = [
    { m: 0.100, label: '100 g' },
  ];
  const masses = [];
  {
    let xCursor = 184;
    for (const def of massDefs) {
      const r = 14.5 * Math.cbrt(def.m / 0.1);
      const h = 2.1 * r;
      const cx = xCursor + r;
      xCursor = cx + r + 12;
      masses.push({
        m: def.m, label: def.label, colors: def.colors || null,
        r, h, homeCx: cx,
        cx, topY: FLOOR_Y - HOOK_H - h, vy: 0, attached: -1,
      });
    }
  }

  // ── UI state ────────────────────────────────────────────────────────────
  const ruler = { x: 50, y: 54 };
  const RUL_W = 38, RUL_LEN = 90 * PXCM, RUL_H = RUL_LEN + 12;
  let paused = false, hintDone = false;
  let drag = null;

  // ── Control geometry ────────────────────────────────────────────────────
  const RESET = { x: 364, y: 430, r: 15 };

  // ── Helpers ─────────────────────────────────────────────────────────────
  const clamp = (v, a, b) => Math.min(b, Math.max(a, v));
  const dist = (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by);
  const inRect = (mx, my, x, y, w, h) => mx >= x && mx <= x + w && my >= y && my <= y + h;
  const springEndY = s => ANCHOR_Y + (L0 + s.ext * 100) * PXCM;
  const extFromEndY = ey => ((ey - ANCHOR_Y) / PXCM - L0) / 100;
  const floorExt = mass => ((FLOOR_Y - HOOK_H - mass.h - ANCHOR_Y) / PXCM - L0) / 100;
  const eqExt = s => (s.massIdx >= 0 ? masses[s.massIdx].m * G / s.k : 0);

  // ── Zoom / Pan state ────────────────────────────────────────────────────
  const ZOOM_MIN = 1, ZOOM_MAX = 4;
  let zoom = 1, panX = 0, panY = 0;
  function clampPan() {
    panX = clamp(panX, 0, Math.max(0, W * (zoom - 1)));
    panY = clamp(panY, 0, Math.max(0, H * (zoom - 1)));
  }
  function applyZoom(nz, cx, cy) {
    nz = clamp(nz, ZOOM_MIN, ZOOM_MAX);
    const wx = (cx + panX) / zoom, wy = (cy + panY) / zoom;
    panX = wx * nz - cx; panY = wy * nz - cy;
    zoom = nz; clampPan();
  }
  function resetView() { zoom = 1; panX = 0; panY = 0; }

  function rr(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ── Canvas + scale-to-iframe-width ──────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const zoomBar = document.getElementById('zoom-bar');
  if (_zoomMode) { zoomBar.style.display = 'flex'; }
  let scale = 1, dpr = 1;
  function fit() {
    const vw = window.innerWidth || W;
    let s = clamp(vw / W, 0.3, 1.0);
    if (Math.abs(s - 1) < 0.03) s = 1;
    scale = s; dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(W * s * dpr);
    canvas.height = Math.round(H * s * dpr);
    canvas.style.width = (W * s) + 'px';
    canvas.style.height = (H * s) + 'px';
    document.body.style.width = (W * s) + 'px';
    document.body.style.height = (H * s) + 'px';
    if (_zoomMode) { zoomBar.style.top = Math.round(34 * s) + 'px'; zoomBar.style.left = '0px'; }
  }
  window.addEventListener('resize', fit);

  // ── Physics ─────────────────────────────────────────────────────────────
  function step(dt) {
    for (const s of springs) {
      const held = drag && drag.type === 'mass' && s.massIdx >= 0 && drag.i === s.massIdx;
      if (s.massIdx >= 0 && !held) {
        const mass = masses[s.massIdx];
        const a = G - (s.k / mass.m) * s.ext - DAMP * s.v;
        s.v += a * dt;
        s.ext += s.v * dt;
        const fe = floorExt(mass);
        if (s.ext > fe) { s.ext = fe; if (s.v > 0) s.v = 0; }
        if (s.ext < MIN_EXT) { s.ext = MIN_EXT; if (s.v < 0) s.v = 0; }
      } else if (s.massIdx < 0 && s.ext !== 0) {
        s.ext *= Math.exp(-10 * dt);
        if (Math.abs(s.ext) < 2e-4) s.ext = 0;
        s.v = 0;
      }
    }
    for (let i = 0; i < masses.length; i++) {
      const mass = masses[i];
      if (mass.attached >= 0) continue;
      if (drag && drag.type === 'mass' && drag.i === i) continue;
      const floorTop = FLOOR_Y - HOOK_H - mass.h;
      if (mass.topY < floorTop) {
        mass.vy += G * 100 * PXCM * dt;
        mass.topY += mass.vy * dt;
        if (mass.topY >= floorTop) { mass.topY = floorTop; mass.vy = 0; }
      } else { mass.topY = floorTop; mass.vy = 0; }
    }
  }

  function sync() {
    for (let si = 0; si < springs.length; si++) {
      const s = springs[si];
      if (s.massIdx >= 0) {
        const mass = masses[s.massIdx];
        const pull = (drag && drag.type === 'mass' && drag.i === s.massIdx) ? (drag.pull || 0) : 0;
        mass.cx = s.x + pull;
        mass.topY = springEndY(s) - 2;
      }
    }
  }

  function attach(si, mi) {
    const s = springs[si], mass = masses[mi];
    s.massIdx = mi; mass.attached = si;
    s.ext = clamp(extFromEndY(mass.topY + 2), MIN_EXT, floorExt(mass));
    s.v = 0; mass.vy = 0;
    hintDone = true;
  }

  function findSnap(mass) {
    for (let si = 0; si < springs.length; si++) {
      const s = springs[si];
      if (s.massIdx >= 0) continue;
      if (dist(mass.cx, mass.topY + 2, s.x, springEndY(s)) < SNAP_R) return si;
    }
    return -1;
  }

  // ── Reset ───────────────────────────────────────────────────────────────
  function resetAll() {
    drag = null;
    springs[0].k = K1_INIT;
    for (const s of springs) { s.ext = 0; s.v = 0; s.massIdx = -1; }
    for (const mass of masses) {
      mass.cx = mass.homeCx;
      mass.topY = FLOOR_Y - HOOK_H - mass.h;
      mass.vy = 0; mass.attached = -1;
    }
    ruler.x = 50; ruler.y = 54;
    paused = false; hintDone = false;
  }

  // ── Hit testing ─────────────────────────────────────────────────────────
  function massDrawOrder() {
    const plain = [], att = [], drg = [];
    for (let i = 0; i < masses.length; i++) {
      if (drag && drag.type === 'mass' && drag.i === i) drg.push(i);
      else if (masses[i].attached >= 0) att.push(i);
      else plain.push(i);
    }
    return plain.concat(att, drg);
  }
  function massHit(mx, my) {
    const order = massDrawOrder();
    for (let oi = order.length - 1; oi >= 0; oi--) {
      const i = order[oi], mass = masses[i];
      if (inRect(mx, my, mass.cx - mass.r - 3, mass.topY - 3,
                 2 * (mass.r + 3), HOOK_H + mass.h + 6)) return i;
    }
    return -1;
  }

  // ── Pointer events ──────────────────────────────────────────────────────
  const toCanvas = e => {
    const r = canvas.getBoundingClientRect();
    return [(e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height];
  };
  const toLocal = e => {
    const [cx, cy] = toCanvas(e);
    return _zoomMode ? [(cx + panX) / zoom, (cy + panY) / zoom] : [cx, cy];
  };

  canvas.addEventListener('pointerdown', e => {
    if (drag) return;
    const [mx, my] = toLocal(e);
    canvas.setPointerCapture(e.pointerId);

    if (dist(mx, my, RESET.x, RESET.y) <= RESET.r + 3) { resetAll(); return; }
    const mi = massHit(mx, my);
    if (mi >= 0) {
      const mass = masses[mi];
      if (mass.attached >= 0) springs[mass.attached].v = 0;
      mass.vy = 0;
      drag = { type: 'mass', i: mi, dx: mx - mass.cx, dy: my - mass.topY, pull: 0, snap: -1 };
      return;
    }
    if (inRect(mx, my, ruler.x, ruler.y, RUL_W, RUL_H)) {
      drag = { type: 'ruler', dx: mx - ruler.x, dy: my - ruler.y };
      return;
    }
    if (_zoomMode && zoom > 1) {
      const [cx, cy] = toCanvas(e);
      drag = { type: 'pan', startCx: cx, startCy: cy, startPanX: panX, startPanY: panY };
    }
  });

  canvas.addEventListener('pointermove', e => {
    const [mx, my] = toLocal(e);
    if (!drag) { updateCursor(mx, my); return; }
    canvas.style.cursor = 'grabbing';
    if (drag.type === 'pan') {
      const [cx, cy] = toCanvas(e);
      panX = clamp(drag.startPanX + (drag.startCx - cx), 0, Math.max(0, W * (zoom - 1)));
      panY = clamp(drag.startPanY + (drag.startCy - cy), 0, Math.max(0, H * (zoom - 1)));
      return;
    }
    if (drag.type === 'ruler') {
      ruler.x = clamp(mx - drag.dx, -RUL_W + 16, W - 16);
      ruler.y = clamp(my - drag.dy, -RUL_H + 30, H - 30);
      return;
    }
    if (drag.type === 'mass') {
      const mass = masses[drag.i];
      if (mass.attached >= 0) {
        const s = springs[mass.attached];
        const desiredCx = mx - drag.dx;
        if (Math.abs(desiredCx - s.x) > DETACH_DX) {
          s.massIdx = -1; s.v = 0;
          mass.attached = -1;
          mass.cx = clamp(desiredCx, 16, W - 16);
          mass.topY = clamp(my - drag.dy, 6, H - 40);
          drag.pull = 0;
          drag.snap = findSnap(mass);
        } else {
          drag.pull = (desiredCx - s.x) * 0.35;
          s.ext = clamp(extFromEndY((my - drag.dy) + 2), MIN_EXT, floorExt(mass));
          s.v = 0;
        }
      } else {
        mass.cx = clamp(mx - drag.dx, 16, W - 16);
        mass.topY = clamp(my - drag.dy, 6, H - 40);
        const si = findSnap(mass);
        if (si >= 0) {
          attach(si, drag.i);
          drag.pull = 0;
          drag.snap = -1;
        } else {
          drag.snap = si;
        }
      }
    }
  });

  function endDrag() {
    if (!drag) return;
    if (drag.type === 'mass') {
      const mass = masses[drag.i];
      if (mass.attached < 0) {
        const si = findSnap(mass);
        if (si >= 0) attach(si, drag.i);
        else mass.cx = clamp(mass.cx, 16, 366);
      }
    }
    drag = null;
  }
  canvas.addEventListener('pointerup', endDrag);
  canvas.addEventListener('pointercancel', endDrag);

  if (_zoomMode) {
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const [cx, cy] = toCanvas(e);
      applyZoom(zoom * Math.exp(-e.deltaY * 0.001), cx, cy);
    }, { passive: false });
    const _zsl = document.getElementById('zoom-slider');
    const _rvb = document.getElementById('reset-view');
    if (_zsl) _zsl.addEventListener('input', () => applyZoom(parseFloat(_zsl.value), W / 2, H / 2));
    if (_rvb) _rvb.addEventListener('click', resetView);
  }

  function updateCursor(mx, my) {
    let c = 'default';
    if (dist(mx, my, RESET.x, RESET.y) <= RESET.r + 3) c = 'pointer';
    else if (massHit(mx, my) >= 0) c = 'grab';
    else if (inRect(mx, my, ruler.x, ruler.y, RUL_W, RUL_H)) c = 'grab';
    else if (_zoomMode && zoom > 1) c = 'grab';
    canvas.style.cursor = c;
  }

  // ── Drawing ─────────────────────────────────────────────────────────────
  function drawBarAndShelf() {
    let g = ctx.createLinearGradient(0, 14, 0, ANCHOR_Y);
    g.addColorStop(0, '#c89a64'); g.addColorStop(1, '#8a6238');
    ctx.fillStyle = g;
    rr(54, 14, 290, ANCHOR_Y - 14, 3); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = 'rgba(60,40,20,0.6)';
    for (const sx of [64, 334]) {
      ctx.beginPath(); ctx.arc(sx, 23, 2.5, 0, 2 * Math.PI); ctx.fill();
    }
    g = ctx.createLinearGradient(0, FLOOR_Y, 0, FLOOR_Y + 10);
    g.addColorStop(0, '#c89a64'); g.addColorStop(1, '#8a6238');
    ctx.fillStyle = g;
    rr(0, FLOOR_Y, 380, 10, 2); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.stroke();
    ctx.fillStyle = '#8a6238';
    ctx.fillRect(18, FLOOR_Y + 10, 12, 8);
    ctx.fillRect(350, FLOOR_Y + 10, 12, 8);
  }

  function drawSpring(s) {
    const x = s.x, ey = springEndY(s);
    const yA = ANCHOR_Y + 9;
    let yB = ey - 9; if (yB < yA + 6) yB = yA + 6;
    const N = 11, R = 17, steps = 220;
    const coil = () => {
      ctx.beginPath();
      ctx.moveTo(x, ANCHOR_Y);
      ctx.lineTo(x, yA);
      for (let j = 1; j <= steps; j++) {
        const t = j / steps;
        ctx.lineTo(x + R * Math.sin(t * N * 2 * Math.PI), yA + (yB - yA) * t);
      }
      ctx.lineTo(x, ey - 5);
    };
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    coil(); ctx.strokeStyle = '#5f7d9e'; ctx.lineWidth = 3.2; ctx.stroke();
    coil(); ctx.strokeStyle = '#a9c6e4'; ctx.lineWidth = 1.1; ctx.stroke();
    ctx.beginPath(); ctx.arc(x, ey - 2.5, 3.4, 0, 2 * Math.PI);
    ctx.strokeStyle = '#5f7d9e'; ctx.lineWidth = 2; ctx.stroke();
  }

  function drawRuler() {
    const x = ruler.x, y = ruler.y;
    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.18)'; ctx.shadowBlur = 5;
    ctx.shadowOffsetX = 1.5; ctx.shadowOffsetY = 1.5;
    rr(x, y, RUL_W, RUL_H, 3);
    ctx.fillStyle = '#fbf3cf'; ctx.fill();
    ctx.restore();
    rr(x, y, RUL_W, RUL_H, 3);
    ctx.strokeStyle = '#b9a868'; ctx.lineWidth = 1; ctx.stroke();
    const right = x + RUL_W;
    ctx.fillStyle = '#5d5132'; ctx.strokeStyle = '#5d5132'; ctx.textAlign = 'right';
    for (let cm = 0; cm <= 90; cm++) {
      const ty = y + cm * PXCM;
      const len = (cm % 10 === 0) ? 13 : (cm % 5 === 0) ? 9.5 : 6;
      ctx.beginPath(); ctx.moveTo(right, ty); ctx.lineTo(right - len, ty);
      ctx.lineWidth = (cm % 10 === 0) ? 1.2 : 0.7;
      ctx.stroke();
      if (cm % 10 === 0) {
        ctx.font = '8.5px Segoe UI';
        ctx.fillText(String(cm), right - 16, Math.max(ty + 3, y + 8));
      }
    }
    ctx.font = 'italic 8.5px Segoe UI';
    ctx.fillText('cm', right - 16, y + RUL_H - 4);
  }

  function drawMass(mass, dragged) {
    const cx = mass.cx, topY = mass.topY, r = mass.r, h = mass.h;
    const bodyY = topY + HOOK_H;
    ctx.beginPath(); ctx.arc(cx, topY + 3.5, 3.2, 0, 2 * Math.PI);
    ctx.strokeStyle = '#4a4f55'; ctx.lineWidth = 1.8; ctx.stroke();
    ctx.fillStyle = '#4a4f55';
    ctx.fillRect(cx - 1.2, topY + 6.2, 2.4, HOOK_H - 6);
    if (dragged) { ctx.save(); ctx.shadowColor = 'rgba(40,90,160,0.8)'; ctx.shadowBlur = 12; }
    const cols = mass.colors || ['#aab4be', '#6e7882'];
    const g = ctx.createLinearGradient(cx - r, 0, cx + r, 0);
    g.addColorStop(0, cols[1]); g.addColorStop(0.32, cols[0]); g.addColorStop(1, cols[1]);
    ctx.fillStyle = g;
    rr(cx - r, bodyY, 2 * r, h, 3); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 1; ctx.stroke();
    if (dragged) ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    rr(cx - r + 1.5, bodyY + 1, 2 * r - 3, 4, 2); ctx.fill();
    ctx.save();
    ctx.fillStyle = '#fff';
    ctx.font = mass.colors ? 'bold 14px Segoe UI'
      : 'bold ' + clamp(Math.round(r * 0.62), 8, 11) + 'px Segoe UI';
    ctx.textAlign = 'center';
    ctx.shadowColor = 'rgba(0,0,0,0.45)'; ctx.shadowBlur = 2;
    ctx.fillText(mass.label, cx, bodyY + h / 2 + (mass.colors ? 5 : 3.5));
    ctx.restore();
  }

  function drawSnapHighlight() {
    if (!(drag && drag.type === 'mass')) return;
    const mass = masses[drag.i];
    if (mass.attached >= 0) return;
    const si = drag.snap;
    if (si == null || si < 0) return;
    const s = springs[si];
    ctx.save();
    ctx.setLineDash([4, 3]); ctx.strokeStyle = '#efa020'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(s.x, springEndY(s) - 1, 13, 0, 2 * Math.PI); ctx.stroke();
    ctx.restore();
  }

  function drawReset() {
    ctx.beginPath(); ctx.arc(RESET.x, RESET.y, RESET.r, 0, 2 * Math.PI);
    ctx.fillStyle = '#e8762d'; ctx.fill();
    ctx.strokeStyle = '#bf5a18'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 17px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('↺', RESET.x, RESET.y + 6);
  }

  function drawRefLines() {
    ctx.save(); ctx.lineCap = 'butt';
    const uy = ANCHOR_Y + L0 * PXCM;
    ctx.setLineDash([7, 5]); ctx.strokeStyle = '#3a6fd8'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(52, uy); ctx.lineTo(344, uy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#3a6fd8'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'left';
    ctx.fillText('Natural Length', springs[0].x + 22, uy - 3);
    for (const s of springs) {
      if (s.massIdx < 0) continue;
      const ry = ANCHOR_Y + (L0 + eqExt(s) * 100) * PXCM;
      ctx.setLineDash([5, 4]); ctx.strokeStyle = '#2e9e44'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(s.x - 52, ry); ctx.lineTo(s.x + 52, ry); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = '#2e9e44'; ctx.font = '10px Segoe UI'; ctx.textAlign = 'left';
      ctx.fillText('Resting Position', s.x + 22, ry - 3);
    }
    ctx.restore();
  }

  function syncZoomControls() {
    if (!_zoomMode) return;
    const sl = document.getElementById('zoom-slider');
    const vl = document.getElementById('zoom-val');
    const rb = document.getElementById('reset-view');
    if (sl) sl.value = zoom;
    if (vl) vl.textContent = zoom.toFixed(1) + '×';
    if (rb) rb.classList.toggle('active', zoom > 1.001 || panX > 0.5 || panY > 0.5);
  }

  function draw() {
    const s = scale * dpr;
    ctx.setTransform(s, 0, 0, s, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#f5f5f5'; ctx.fillRect(0, 0, W, H);

    if (_zoomMode) {
      ctx.setTransform(s * zoom, 0, 0, s * zoom, -panX * s, -panY * s);
      drawBarAndShelf(); drawRefLines(); drawSpring(springs[0]); drawRuler();
      for (const i of massDrawOrder()) drawMass(masses[i], !!(drag && drag.type === 'mass' && drag.i === i));
      drawSnapHighlight();
      ctx.setTransform(s, 0, 0, s, 0, 0);
    } else {
      drawBarAndShelf(); drawSpring(springs[0]); drawRuler();
      for (const i of massDrawOrder()) drawMass(masses[i], !!(drag && drag.type === 'mass' && drag.i === i));
      drawSnapHighlight();
    }
    drawReset();
    syncZoomControls();
  }

  // ── Main loop ───────────────────────────────────────────────────────────
  let lastTs = null, acc = 0;
  function frame(ts) {
    if (lastTs == null) lastTs = ts;
    const dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;
    if (!paused) {
      acc += dt;
      if (acc > 0.25) acc = 0.25;
      while (acc >= DT) { step(DT); acc -= DT; }
    }
    sync();
    draw();
    requestAnimationFrame(frame);
  }

  // ── Capture hooks ───────────────────────────────────────────────────────
  window.__cap = {
    attach(displaceCm) {
      const s = springs[0], m = masses[0];
      s.massIdx = 0; m.attached = 0;
      const eq = m.m * G / s.k;
      s.ext = eq + (displaceCm || 0) / 100;
      s.v = 0; m.vy = 0; hintDone = true;
      sync();
    },
    settle() { this.attach(0); springs[0].v = 0; },
    ruler(rx, ry) { ruler.x = rx; ruler.y = ry; },
    unstretchedY() { return ANCHOR_Y + L0 * PXCM; },
    PXCM, ANCHOR_Y, L0,
    pause(p) { paused = !!p; },
    setState(t) {
      const s = springs[0], m = masses[0];
      if (s.massIdx < 0) { s.massIdx = 0; m.attached = 0; hintDone = true; }
      paused = true;
      const eq = m.m * G / s.k;
      const w0 = Math.sqrt(s.k / m.m);
      const alpha = DAMP / 2;
      const wd = Math.sqrt(w0 * w0 - alpha * alpha);
      const decay = Math.exp(-alpha * t);
      s.ext = eq * (1 - decay * (Math.cos(wd * t) + (alpha / wd) * Math.sin(wd * t)));
      s.v   = eq * w0 * w0 / wd * decay * Math.sin(wd * t);
      m.vy = 0;
      sync(); draw();
    },
    period() {
      const s = springs[0], m = masses[0];
      const w0 = Math.sqrt(s.k / m.m);
      const alpha = DAMP / 2;
      return 2 * Math.PI / Math.sqrt(w0 * w0 - alpha * alpha);
    },
  };

  resetAll();
  fit();
  requestAnimationFrame(frame);
})();
</script>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
