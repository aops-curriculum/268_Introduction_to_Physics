<!DOCTYPE html>
<!-- Original AoPS interactive. Replaces the third-party "Hooke's Law" simulation. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1">
  <title>Hooke's Law</title>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 800px; overflow: hidden;
      background: #f4f6f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #2a3340;
      user-select: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c" width="800" height="230"></canvas>

  <script>
  (() => {
    'use strict';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 230;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    // ── Geometry (px) ───────────────────────────────────────
    const WALL_X    = 56;     // spring anchor (wall face)
    const AXIS_Y    = 95;     // spring centerline
    const RAIL_Y    = 145;    // gripper rail
    const EQ_X      = 350;    // handle x at zero displacement
    const SCALE     = 230;    // px per metre
    const MAXLEN    = 110;    // arrow px at 100 N
    const GRIP_HALF = 11;     // half-width of gripper body

    const C_SPRING = '#2b6fd6';
    const C_DISP   = '#1d9e54';

    const state = {
      k: 200,
      appliedF: 0,
      x: 0,
      v: 0,
      dragging: false
    };

    const xTarget = () => clampX(state.appliedF / state.k);
    function maxX() { return 100 / state.k; }
    function clampX(x) { const m = maxX(); return Math.max(-m, Math.min(m, x)); }

    // ── URL params ──────────────────────────────────────────
    function applyParams() {
      const p = new URLSearchParams(location.search);
      if (p.has('k')) {
        const k = parseFloat(p.get('k'));
        if (isFinite(k)) state.k = Math.max(100, Math.min(1000, k));
      }
      if (p.has('F') || p.has('f')) {
        const f = parseFloat(p.get('F') || p.get('f'));
        if (isFinite(f)) state.appliedF = Math.max(-100, Math.min(100, f));
      }
      state.appliedF = Math.max(-100, Math.min(100, state.appliedF));
      state.x = xTarget();
      state.v = 0;
    }

    // ── Pointer drag of the gripper ─────────────────────────
    function handleX() { return EQ_X + state.x * SCALE; }
    function cpos(e) {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height];
    }
    let hovering = false;
    function overGripper(mx, my) {
      const hx = handleX();
      return mx > hx - GRIP_HALF - 6 && mx < hx + GRIP_HALF + 6 &&
             my > 74 && my < RAIL_Y + 14;
    }
    canvas.addEventListener('pointerdown', e => {
      const [mx, my] = cpos(e);
      if (overGripper(mx, my)) {
        state.dragging = true;
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor = 'grabbing';
        dragMove(mx);
      }
    });
    canvas.addEventListener('pointermove', e => {
      const [mx, my] = cpos(e);
      if (state.dragging) { dragMove(mx); }
      else {
        hovering = overGripper(mx, my);
        canvas.style.cursor = hovering ? 'grab' : 'default';
      }
    });
    function endDrag(e) {
      if (state.dragging) {
        state.dragging = false;
        canvas.style.cursor = hovering ? 'grab' : 'default';
        if (e && e.pointerId != null && canvas.hasPointerCapture(e.pointerId))
          canvas.releasePointerCapture(e.pointerId);
      }
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    function dragMove(mx) {
      let xm = (mx - EQ_X) / SCALE;
      xm = clampX(xm);
      // Snap to integer newtons so displacement lands exactly on F/k
      const f = Math.max(-100, Math.min(100, Math.round(state.k * xm)));
      state.appliedF = f;
      state.x = f / state.k;
      state.v = 0;
    }

    // ── Physics: critically-damped settle to F/k ────────────
    const OMEGA = 14;
    function step(dt) {
      const tx = xTarget();
      if (state.dragging) { state.x = clampX(state.x); state.v = 0; return; }
      const sub = 4, h = dt / sub;
      for (let i = 0; i < sub; i++) {
        const a = -OMEGA * OMEGA * (state.x - tx) - 2 * OMEGA * state.v;
        state.v += a * h;
        state.x += state.v * h;
      }
      if (Math.abs(state.x - tx) < 1e-5 && Math.abs(state.v) < 1e-4) {
        state.x = tx; state.v = 0;
      }
    }

    // ── Drawing helpers ─────────────────────────────────────
    function arrow(x0, y0, x1, y1, color, width) {
      const ang = Math.atan2(y1 - y0, x1 - x0);
      const head = 10;
      ctx.strokeStyle = color; ctx.fillStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1 - Math.cos(ang) * head * 0.7, y1 - Math.sin(ang) * head * 0.7);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - Math.cos(ang) * head - Math.sin(ang) * head * 0.55,
                 y1 - Math.sin(ang) * head + Math.cos(ang) * head * 0.55);
      ctx.lineTo(x1 - Math.cos(ang) * head + Math.sin(ang) * head * 0.55,
                 y1 - Math.sin(ang) * head - Math.cos(ang) * head * 0.55);
      ctx.closePath(); ctx.fill();
      ctx.lineCap = 'butt';
    }

    function drawWall() {
      const x0 = 32, x1 = WALL_X, y0 = 46, y1 = RAIL_Y + 6;
      const g = ctx.createLinearGradient(x0, 0, x1, 0);
      g.addColorStop(0, '#9aa6b6'); g.addColorStop(1, '#7d8aa0');
      ctx.fillStyle = g;
      ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
      ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5;
      for (let yy = y0 - 18; yy < y1; yy += 9) {
        ctx.beginPath(); ctx.moveTo(x0, yy + 18); ctx.lineTo(x1, yy); ctx.stroke();
      }
      ctx.strokeStyle = '#5f6c7d'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x1, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }

    function drawRail() {
      const g = ctx.createLinearGradient(0, RAIL_Y - 4, 0, RAIL_Y + 6);
      g.addColorStop(0, '#c7cfdb'); g.addColorStop(1, '#a7b2c1');
      ctx.fillStyle = g;
      roundRect(WALL_X, RAIL_Y - 3, 780 - WALL_X, 8, 4); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1;
      roundRect(WALL_X, RAIL_Y - 3, 780 - WALL_X, 8, 4); ctx.stroke();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSpring(hx) {
      const startX = WALL_X;
      const endX = hx - GRIP_HALF;
      const lead = 14;
      const coils = Math.round(8 + (state.k - 100) / 900 * 14);
      const amp = 14;
      ctx.strokeStyle = '#73797f';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(startX, AXIS_Y);
      const bodyStart = startX + lead;
      const bodyEnd = endX - lead;
      const bodyLen = Math.max(8, bodyEnd - bodyStart);
      ctx.lineTo(bodyStart, AXIS_Y);
      const N = Math.max(20, coils * 8);
      for (let i = 0; i <= N; i++) {
        const t = i / N;
        const x = bodyStart + t * bodyLen;
        const y = AXIS_Y - amp * Math.sin(2 * Math.PI * coils * t);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(endX, AXIS_Y);
      ctx.stroke();
    }

    function drawGripper(hx, hot) {
      ctx.fillStyle = '#566273';
      ctx.beginPath(); ctx.arc(hx, RAIL_Y + 1, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#3c4654'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#6b7686';
      ctx.fillRect(hx - 3, AXIS_Y, 6, RAIL_Y - AXIS_Y);
      const by0 = AXIS_Y - 26, bh = 40;
      const g = ctx.createLinearGradient(hx - GRIP_HALF, 0, hx + GRIP_HALF, 0);
      g.addColorStop(0, hot ? '#5f7da6' : '#566273');
      g.addColorStop(1, hot ? '#3f5a80' : '#3c4654');
      ctx.fillStyle = g;
      roundRect(hx - GRIP_HALF, by0, GRIP_HALF * 2, bh, 5); ctx.fill();
      ctx.strokeStyle = '#2c3542'; ctx.lineWidth = 1.5;
      roundRect(hx - GRIP_HALF, by0, GRIP_HALF * 2, bh, 5); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(hx - 5, AXIS_Y - 6 + i * 6);
        ctx.lineTo(hx + 5, AXIS_Y - 6 + i * 6);
        ctx.stroke();
      }
      ctx.fillStyle = '#2c3542';
      ctx.beginPath();
      ctx.moveTo(hx - GRIP_HALF, AXIS_Y - 8);
      ctx.lineTo(hx - GRIP_HALF - 7, AXIS_Y);
      ctx.lineTo(hx - GRIP_HALF, AXIS_Y + 8);
      ctx.closePath(); ctx.fill();
    }

    function label(text, x, y, color, align) {
      ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = align || 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(244,246,249,0.9)';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = color; ctx.fillText(text, x, y);
    }

    // ── Render ──────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);

      const hx = handleX();
      const F = state.k * state.x;
      const dispMag = Math.abs(state.x) * SCALE;
      const dir = state.x >= 0 ? 1 : -1;
      const fLen = Math.min(MAXLEN, Math.abs(F) / 100 * MAXLEN);

      // Equilibrium dashed line
      ctx.save();
      ctx.setLineDash([6, 5]); ctx.strokeStyle = C_DISP; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(EQ_X, 44); ctx.lineTo(EQ_X, 206); ctx.stroke();
      ctx.restore();
      label('equilibrium', EQ_X, 36, C_DISP);

      drawWall();
      drawRail();
      drawSpring(hx);
      drawGripper(hx, hovering || state.dragging);

      // Spring force (blue): opposite to displacement, label moves with arrow
      if (Math.abs(F) > 0.05) {
        const y = RAIL_Y + 26;
        const tipX = hx - dir * fLen;
        arrow(hx, y, tipX, y, C_SPRING, 4);
        label('spring force', (hx + tipX) / 2, y - 16, C_SPRING);
      }

      // Displacement (green): from equilibrium to handle, label moves with arrow
      if (dispMag > 0.5) {
        const y = RAIL_Y + 52;
        const tipX = EQ_X + dir * dispMag;
        arrow(EQ_X, y, tipX, y, C_DISP, 4);
        label('displacement', (EQ_X + tipX) / 2, y - 16, C_DISP);
      }

      // Hint
      ctx.font = '12px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#9aa6b6'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('Drag the handle ↔ to stretch or compress the spring', W / 2, 18);
    }

    // ── Loop ────────────────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs == null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      step(dt);
      draw();
      requestAnimationFrame(frame);
    }

    applyParams();
    requestAnimationFrame(frame);
  })();
  </script>



<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "k",
        "type": "number",
        "min": 1,
        "max": 100,
        "step": 1,
        "default": "",
        "desc": "Spring constant k (N/m)"
    },
    {
        "name": "F",
        "type": "number",
        "min": -500,
        "max": 500,
        "step": 10,
        "default": "",
        "desc": "Applied force F (N)"
    }
];

  var EMBED_KEYS = ['maxscale', 'maxw', 'h', 'maxh', 'cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
</body>
</html>
