<!DOCTYPE html>
<!-- Original AoPS interactive. Replaces the third-party "Hooke's Law" simulation. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1">
  <meta name="eigennode-aspect" content="80/23">
  <title>Hooke's Law</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      position: relative;
      background: #f4f6f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #2a3340;
      user-select: none;
    }
    canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="c" width="800" height="230"></canvas>

  <script>
  (() => {
    'use strict';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 230;
    function fit() {
      const dpr = window.devicePixelRatio || 1;
      const cw = canvas.clientWidth, ch = canvas.clientHeight;
      if (!cw || !ch) return;
      canvas.width = Math.round(cw * dpr);
      canvas.height = Math.round(ch * dpr);
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    }
    new ResizeObserver(fit).observe(canvas);
    fit();

    // ── Geometry (px) ───────────────────────────────────────
    const WALL_X    = 56;     // spring anchor (wall face)
    const AXIS_Y    = 95;     // spring centerline
    const RAIL_Y    = 145;    // gripper rail
    const EQ_X      = 350;    // handle x at zero displacement
    const SCALE     = 230;    // px per metre
    const MAXLEN    = 110;    // arrow px at 100 N
    const GRIP_HALF = 11;     // half-width of gripper body

    const C_SPRING = '#2b6fd6';
    const C_DISP   = '#1d9e54';

    const state = {
      k: 200,
      appliedF: 0,
      x: 0,
      v: 0,
      dragging: false
    };

    const xTarget = () => clampX(state.appliedF / state.k);
    function maxX() { return 100 / state.k; }
    function clampX(x) { const m = maxX(); return Math.max(-m, Math.min(m, x)); }

    // ── URL params ──────────────────────────────────────────
    function applyParams() {
      const p = new URLSearchParams(location.search);
      if (p.has('k')) {
        const k = parseFloat(p.get('k'));
        if (isFinite(k)) state.k = Math.max(100, Math.min(1000, k));
      }
      if (p.has('F') || p.has('f')) {
        const f = parseFloat(p.get('F') || p.get('f'));
        if (isFinite(f)) state.appliedF = Math.max(-100, Math.min(100, f));
      }
      state.appliedF = Math.max(-100, Math.min(100, state.appliedF));
      state.x = xTarget();
      state.v = 0;
    }

    // ── Pointer drag of the gripper ─────────────────────────
    function handleX() { return EQ_X + state.x * SCALE; }
    function cpos(e) {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height];
    }
    let hovering = false;
    function overGripper(mx, my) {
      const hx = handleX();
      return mx > hx - GRIP_HALF - 6 && mx < hx + GRIP_HALF + 6 &&
             my > 74 && my < RAIL_Y + 14;
    }
    canvas.addEventListener('pointerdown', e => {
      const [mx, my] = cpos(e);
      if (overGripper(mx, my)) {
        state.dragging = true;
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor = 'grabbing';
        dragMove(mx);
      }
    });
    canvas.addEventListener('pointermove', e => {
      const [mx, my] = cpos(e);
      if (state.dragging) { dragMove(mx); }
      else {
        hovering = overGripper(mx, my);
        canvas.style.cursor = hovering ? 'grab' : 'default';
      }
    });
    function endDrag(e) {
      if (state.dragging) {
        state.dragging = false;
        canvas.style.cursor = hovering ? 'grab' : 'default';
        if (e && e.pointerId != null && canvas.hasPointerCapture(e.pointerId))
          canvas.releasePointerCapture(e.pointerId);
      }
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    function dragMove(mx) {
      let xm = (mx - EQ_X) / SCALE;
      xm = clampX(xm);
      // Snap to integer newtons so displacement lands exactly on F/k
      const f = Math.max(-100, Math.min(100, Math.round(state.k * xm)));
      state.appliedF = f;
      state.x = f / state.k;
      state.v = 0;
    }

    // ── Physics: critically-damped settle to F/k ────────────
    const OMEGA = 14;
    function step(dt) {
      const tx = xTarget();
      if (state.dragging) { state.x = clampX(state.x); state.v = 0; return; }
      const sub = 4, h = dt / sub;
      for (let i = 0; i < sub; i++) {
        const a = -OMEGA * OMEGA * (state.x - tx) - 2 * OMEGA * state.v;
        state.v += a * h;
        state.x += state.v * h;
      }
      if (Math.abs(state.x - tx) < 1e-5 && Math.abs(state.v) < 1e-4) {
        state.x = tx; state.v = 0;
      }
    }

    // ── Drawing helpers ─────────────────────────────────────
    function arrow(x0, y0, x1, y1, color, width) {
      const ang = Math.atan2(y1 - y0, x1 - x0);
      const head = 10;
      ctx.strokeStyle = color; ctx.fillStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1 - Math.cos(ang) * head * 0.7, y1 - Math.sin(ang) * head * 0.7);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - Math.cos(ang) * head - Math.sin(ang) * head * 0.55,
                 y1 - Math.sin(ang) * head + Math.cos(ang) * head * 0.55);
      ctx.lineTo(x1 - Math.cos(ang) * head + Math.sin(ang) * head * 0.55,
                 y1 - Math.sin(ang) * head - Math.cos(ang) * head * 0.55);
      ctx.closePath(); ctx.fill();
      ctx.lineCap = 'butt';
    }

    function drawWall() {
      const x0 = 32, x1 = WALL_X, y0 = 46, y1 = RAIL_Y + 6;
      const g = ctx.createLinearGradient(x0, 0, x1, 0);
      g.addColorStop(0, '#9aa6b6'); g.addColorStop(1, '#7d8aa0');
      ctx.fillStyle = g;
      ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
      ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5;
      for (let yy = y0 - 18; yy < y1; yy += 9) {
        ctx.beginPath(); ctx.moveTo(x0, yy + 18); ctx.lineTo(x1, yy); ctx.stroke();
      }
      ctx.strokeStyle = '#5f6c7d'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x1, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }

    function drawRail() {
      const g = ctx.createLinearGradient(0, RAIL_Y - 4, 0, RAIL_Y + 6);
      g.addColorStop(0, '#c7cfdb'); g.addColorStop(1, '#a7b2c1');
      ctx.fillStyle = g;
      roundRect(WALL_X, RAIL_Y - 3, 780 - WALL_X, 8, 4); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1;
      roundRect(WALL_X, RAIL_Y - 3, 780 - WALL_X, 8, 4); ctx.stroke();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSpring(hx) {
      const startX = WALL_X;
      const endX = hx - GRIP_HALF;
      const lead = 14;
      const coils = Math.round(8 + (state.k - 100) / 900 * 14);
      const amp = 14;
      ctx.strokeStyle = '#73797f';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(startX, AXIS_Y);
      const bodyStart = startX + lead;
      const bodyEnd = endX - lead;
      const bodyLen = Math.max(8, bodyEnd - bodyStart);
      ctx.lineTo(bodyStart, AXIS_Y);
      const N = Math.max(20, coils * 8);
      for (let i = 0; i <= N; i++) {
        const t = i / N;
        const x = bodyStart + t * bodyLen;
        const y = AXIS_Y - amp * Math.sin(2 * Math.PI * coils * t);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(endX, AXIS_Y);
      ctx.stroke();
    }

    function drawGripper(hx, hot) {
      ctx.fillStyle = '#566273';
      ctx.beginPath(); ctx.arc(hx, RAIL_Y + 1, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#3c4654'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#6b7686';
      ctx.fillRect(hx - 3, AXIS_Y, 6, RAIL_Y - AXIS_Y);
      const by0 = AXIS_Y - 26, bh = 40;
      const g = ctx.createLinearGradient(hx - GRIP_HALF, 0, hx + GRIP_HALF, 0);
      g.addColorStop(0, hot ? '#5f7da6' : '#566273');
      g.addColorStop(1, hot ? '#3f5a80' : '#3c4654');
      ctx.fillStyle = g;
      roundRect(hx - GRIP_HALF, by0, GRIP_HALF * 2, bh, 5); ctx.fill();
      ctx.strokeStyle = '#2c3542'; ctx.lineWidth = 1.5;
      roundRect(hx - GRIP_HALF, by0, GRIP_HALF * 2, bh, 5); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(hx - 5, AXIS_Y - 6 + i * 6);
        ctx.lineTo(hx + 5, AXIS_Y - 6 + i * 6);
        ctx.stroke();
      }
      ctx.fillStyle = '#2c3542';
      ctx.beginPath();
      ctx.moveTo(hx - GRIP_HALF, AXIS_Y - 8);
      ctx.lineTo(hx - GRIP_HALF - 7, AXIS_Y);
      ctx.lineTo(hx - GRIP_HALF, AXIS_Y + 8);
      ctx.closePath(); ctx.fill();
    }

    function label(text, x, y, color, align) {
      ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = align || 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(244,246,249,0.9)';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = color; ctx.fillText(text, x, y);
    }

    // ── Render ──────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);

      const hx = handleX();
      const F = state.k * state.x;
      const dispMag = Math.abs(state.x) * SCALE;
      const dir = state.x >= 0 ? 1 : -1;
      const fLen = Math.min(MAXLEN, Math.abs(F) / 100 * MAXLEN);

      // Equilibrium dashed line
      ctx.save();
      ctx.setLineDash([6, 5]); ctx.strokeStyle = C_DISP; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(EQ_X, 44); ctx.lineTo(EQ_X, 206); ctx.stroke();
      ctx.restore();
      label('equilibrium', EQ_X, 36, C_DISP);

      drawWall();
      drawRail();
      drawSpring(hx);
      drawGripper(hx, hovering || state.dragging);

      // Spring force (blue): opposite to displacement, label moves with arrow
      if (Math.abs(F) > 0.05) {
        const y = RAIL_Y + 26;
        const tipX = hx - dir * fLen;
        arrow(hx, y, tipX, y, C_SPRING, 4);
        label('spring force', (hx + tipX) / 2, y - 16, C_SPRING);
      }

      // Displacement (green): from equilibrium to handle, label moves with arrow
      if (dispMag > 0.5) {
        const y = RAIL_Y + 52;
        const tipX = EQ_X + dir * dispMag;
        arrow(EQ_X, y, tipX, y, C_DISP, 4);
        label('displacement', (EQ_X + tipX) / 2, y - 16, C_DISP);
      }

      // Hint
      ctx.font = '12px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#9aa6b6'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('Drag the handle ↔ to stretch or compress the spring', W / 2, 18);
    }

    // ── Loop ────────────────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs == null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      step(dt);
      draw();
      requestAnimationFrame(frame);
    }

    applyParams();
    requestAnimationFrame(frame);
  })();
  </script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "k",
        "type": "number",
        "min": 1,
        "max": 100,
        "step": 1,
        "default": "",
        "desc": "Spring constant k (N/m)"
    },
    {
        "name": "F",
        "type": "number",
        "min": -500,
        "max": 500,
        "step": 10,
        "default": "",
        "desc": "Applied force F (N)"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];
  function buildCleanUrl(ov) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function(k) { p.delete(k); });
    for (var k in ov) { var v=ov[k]; if(v===null||v==='') p.delete(k); else p.set(k,v); }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }
  function buildCheatUrl(ov) {
    var b = buildCleanUrl(ov);
    return b + (b.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }
  function getEff(d) {
    var r = _cpQ.get(d.name);
    return r !== null ? r : (d['default'] !== undefined ? String(d['default']) : '');
  }
  function isTruthy(v) { return v!=='0'&&v!=='false'&&v!=='no'&&v!=='off'&&v!==''; }

  function makeControl(d) {
    var eff = getEff(d);
    if (d.type === 'toggle') {
      var on = isTruthy(eff), btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:'+(on?'#1b3d1b':'#3d1b1b')+';color:'+(on?'#6dca80':'#e07070')+
        ';border:1px solid '+(on?'#2a7a3a':'#8a2a2a')+';border-radius:3px;padding:3px 10px;'+
        'cursor:pointer;font-size:12px;min-width:70px';
      btn.onclick = function() { var u={}; u[d.name]=on?'0':'1'; location.href=buildCheatUrl(u); };
      return btn;
    }
    if (d.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
        'border-radius:3px;padding:3px 8px;font-size:12px;cursor:pointer';
      d.values.forEach(function(v) {
        var o = document.createElement('option'); o.value=v; o.textContent=v;
        if (eff===String(v)) o.selected=true; sel.appendChild(o);
      });
      sel.onchange = function() { var u={}; u[d.name]=sel.value; location.href=buildCheatUrl(u); };
      return sel;
    }
    var inp = document.createElement('input');
    inp.type = d.type==='number' ? 'number' : 'text'; inp.value = eff;
    if (d.min!==undefined) inp.min=String(d.min);
    if (d.max!==undefined) inp.max=String(d.max);
    if (d.step!==undefined) inp.step=String(d.step);
    inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
      'border-radius:3px;padding:3px 6px;width:'+(d.type==='number'?'90':'220')+'px;font-size:12px';
    inp.onchange = function() { var u={}; u[d.name]=inp.value; location.href=buildCheatUrl(u); };
    return inp;
  }

  function typeLabel(d) {
    if (d.type==='toggle') return '0|1';
    if (d.type==='select') return d.values.join('|');
    if (d.type==='number'&&d.min!==undefined&&d.max!==undefined) return d.min+'–'+d.max;
    return d.type;
  }

  function render() {
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;'+
      'background:rgba(12,18,32,0.97);color:#c8d8e8;'+
      'font-family:"Segoe UI",system-ui,monospace;font-size:13px;'+
      'border-top:2px solid #3a7bd5;z-index:2147483647;max-height:48vh;overflow-y:auto;'+
      'padding:10px 16px 14px;box-sizing:border-box;box-shadow:0 -4px 24px rgba(0,0,0,0.6)';

    var bubble = document.createElement('button');
    bubble.style.cssText = 'position:fixed;bottom:8px;right:12px;'+
      'background:rgba(12,18,32,0.95);color:#7ab8f5;border:1px solid #3a7bd5;'+
      'border-radius:4px;padding:4px 12px;font-size:12px;'+
      'font-family:"Segoe UI",system-ui,monospace;cursor:pointer;'+
      'z-index:2147483647;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.5);user-select:none';
    bubble.textContent = '🔑 Cheat Panel';
    bubble.onclick = function() { bubble.style.display='none'; panel.style.display=''; };
    document.body.appendChild(bubble);

    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-weight:bold;color:#7ab8f5;margin-bottom:8px;'+
      'display:flex;align-items:center;justify-content:space-between';
    var hspan = document.createElement('span');
    hspan.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var btns = document.createElement('div');
    btns.style.cssText = 'display:flex;align-items:center;gap:2px';
    var minbtn = document.createElement('button');
    minbtn.textContent = '−';
    minbtn.title = 'Minimize (restore without reloading)';
    minbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    minbtn.onclick = function() { panel.style.display='none'; bubble.style.display=''; };
    var xbtn = document.createElement('button');
    xbtn.textContent = '×'; xbtn.title = 'Close (reload to restore)';
    xbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    xbtn.onclick = function() { panel.remove(); bubble.remove(); };
    btns.appendChild(minbtn); btns.appendChild(xbtn);
    hdr.appendChild(hspan); hdr.appendChild(btns); panel.appendChild(hdr);

    var tbl = document.createElement('table');
    tbl.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var hrow = tbl.createTHead().insertRow();
    ['Parameter','Type/Values','Control','Description'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;'+
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = tbl.createTBody();
    CHEAT_DEFS.forEach(function(d) {
      var row = tbody.insertRow(), isSet = _cpQ.has(d.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;'+
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;'+
        'color:'+(isSet?'#a8d4ff':'#7fa8d0')+';white-space:nowrap;font-family:monospace';
      nc.textContent = d.name;
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;font-family:monospace';
      tc.textContent = typeLabel(d);
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(d));
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (d.desc||'')+(d['default']!==undefined?' (default: '+d['default']+')':'');
    });
    panel.appendChild(tbl);

    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;'+
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var ulbl = document.createElement('span');
    ulbl.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;'+
      'letter-spacing:.06em;white-space:nowrap;flex-shrink:0';
    ulbl.textContent = 'Embed URL:';
    var ulink = document.createElement('a');
    ulink.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;'+
      'font-family:monospace;text-decoration:none';
    ulink.href = buildCleanUrl({}); ulink.textContent = buildCleanUrl({});
    ulink.onclick = function(e) { e.preventDefault(); location.href=buildCheatUrl({}); };
    var cpybtn = document.createElement('button');
    cpybtn.textContent = 'copy';
    cpybtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;'+
      'border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;'+
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    cpybtn.onclick = function() {
      navigator.clipboard && navigator.clipboard.writeText(buildCleanUrl({}));
      cpybtn.textContent = '✓ copied';
      setTimeout(function() { cpybtn.textContent = 'copy'; }, 1500);
    };
    urlBox.appendChild(ulbl); urlBox.appendChild(ulink); urlBox.appendChild(cpybtn);
    panel.appendChild(urlBox);
    document.body.appendChild(panel);
  }
  render();
})();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
