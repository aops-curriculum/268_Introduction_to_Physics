<!DOCTYPE html>
<!-- Original AoPS interactive. Replaces the third-party "Hooke's Law" simulation. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1">
  <title>Hooke's Law</title>
<script>
// EigenNode auto-height v2.4
(function() {
  // 4px buffer for subpixel rounding + parent's >=3px noise threshold.
  // Extra 18px when horizontal overflow forces a scrollbar (eats vertical
  // space inside the iframe — AoPS classroom embeds in a narrower column
  // than the 600px content, so a horizontal scrollbar appears and steals
  // ~10-17px of height). Without this, the iframe ends up ~11-15px short.
  var BUFFER = 4;
  var H_SCROLLBAR = 18;
  var measuring = false;
  function measure() {
    if (measuring) return 0;
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    measuring = true;
    // Temporarily neutralise body's height/min-height (overriding stylesheet
    // rules with !important) so scrollHeight reflects actual content extent.
    // Without this, patterns like body { height: 100vh } cause scrollHeight
    // to echo the iframe's current viewport — adding BUFFER each cycle
    // ratchets the iframe taller forever. Browser doesn't paint until this
    // synchronous block returns, so no visible flicker.
    var hOld = b.style.height, hPri = b.style.getPropertyPriority('height');
    var mOld = b.style.minHeight, mPri = b.style.getPropertyPriority('min-height');
    b.style.setProperty('height', 'auto', 'important');
    b.style.setProperty('min-height', '0', 'important');
    var content = b.scrollHeight || 0;
    if (hOld) b.style.setProperty('height', hOld, hPri); else b.style.removeProperty('height');
    if (mOld) b.style.setProperty('min-height', mOld, mPri); else b.style.removeProperty('min-height');
    measuring = false;
    // Check the documentElement only — that's the element that owns the
    // iframe's horizontal scrollbar. Body can be narrower than the iframe
    // (e.g. body{width:600px} centered in a 700px iframe) and have its own
    // 1-2px overflow that doesn't actually trigger a scrollbar.
    var hOverflow = h && (h.scrollWidth - h.clientWidth) >= 4;
    return Math.ceil(content) + BUFFER + (hOverflow ? H_SCROLLBAR : 0);
  }
  var last = 0;
  function report() {
    var h = measure();
    if (h > 0 && Math.abs(h - last) >= 2) {
      last = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 800px; overflow: hidden;
      background: #f4f6f9;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #2a3340;
      user-select: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="c" width="800" height="230"></canvas>

  <script>
  (() => {
    'use strict';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 800, H = 230;

    // ── Geometry (px) ───────────────────────────────────────
    const WALL_X    = 56;     // spring anchor (wall face)
    const AXIS_Y    = 95;     // spring centerline
    const RAIL_Y    = 145;    // gripper rail
    const EQ_X      = 350;    // handle x at zero displacement
    const SCALE     = 230;    // px per metre
    const MAXLEN    = 110;    // arrow px at 100 N
    const GRIP_HALF = 11;     // half-width of gripper body

    const C_SPRING = '#2b6fd6';
    const C_DISP   = '#1d9e54';

    const state = {
      k: 200,
      appliedF: 0,
      x: 0,
      v: 0,
      dragging: false
    };

    const xTarget = () => clampX(state.appliedF / state.k);
    function maxX() { return 100 / state.k; }
    function clampX(x) { const m = maxX(); return Math.max(-m, Math.min(m, x)); }

    // ── URL params ──────────────────────────────────────────
    function applyParams() {
      const p = new URLSearchParams(location.search);
      if (p.has('k')) {
        const k = parseFloat(p.get('k'));
        if (isFinite(k)) state.k = Math.max(100, Math.min(1000, k));
      }
      if (p.has('F') || p.has('f')) {
        const f = parseFloat(p.get('F') || p.get('f'));
        if (isFinite(f)) state.appliedF = Math.max(-100, Math.min(100, f));
      }
      state.appliedF = Math.max(-100, Math.min(100, state.appliedF));
      state.x = xTarget();
      state.v = 0;
    }

    // ── Pointer drag of the gripper ─────────────────────────
    function handleX() { return EQ_X + state.x * SCALE; }
    function cpos(e) {
      const r = canvas.getBoundingClientRect();
      return [e.clientX - r.left, e.clientY - r.top];
    }
    let hovering = false;
    function overGripper(mx, my) {
      const hx = handleX();
      return mx > hx - GRIP_HALF - 6 && mx < hx + GRIP_HALF + 6 &&
             my > 74 && my < RAIL_Y + 14;
    }
    canvas.addEventListener('pointerdown', e => {
      const [mx, my] = cpos(e);
      if (overGripper(mx, my)) {
        state.dragging = true;
        canvas.setPointerCapture(e.pointerId);
        canvas.style.cursor = 'grabbing';
        dragMove(mx);
      }
    });
    canvas.addEventListener('pointermove', e => {
      const [mx, my] = cpos(e);
      if (state.dragging) { dragMove(mx); }
      else {
        hovering = overGripper(mx, my);
        canvas.style.cursor = hovering ? 'grab' : 'default';
      }
    });
    function endDrag(e) {
      if (state.dragging) {
        state.dragging = false;
        canvas.style.cursor = hovering ? 'grab' : 'default';
        if (e && e.pointerId != null && canvas.hasPointerCapture(e.pointerId))
          canvas.releasePointerCapture(e.pointerId);
      }
    }
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    function dragMove(mx) {
      let xm = (mx - EQ_X) / SCALE;
      xm = clampX(xm);
      // Snap to integer newtons so displacement lands exactly on F/k
      const f = Math.max(-100, Math.min(100, Math.round(state.k * xm)));
      state.appliedF = f;
      state.x = f / state.k;
      state.v = 0;
    }

    // ── Physics: critically-damped settle to F/k ────────────
    const OMEGA = 14;
    function step(dt) {
      const tx = xTarget();
      if (state.dragging) { state.x = clampX(state.x); state.v = 0; return; }
      const sub = 4, h = dt / sub;
      for (let i = 0; i < sub; i++) {
        const a = -OMEGA * OMEGA * (state.x - tx) - 2 * OMEGA * state.v;
        state.v += a * h;
        state.x += state.v * h;
      }
      if (Math.abs(state.x - tx) < 1e-5 && Math.abs(state.v) < 1e-4) {
        state.x = tx; state.v = 0;
      }
    }

    // ── Drawing helpers ─────────────────────────────────────
    function arrow(x0, y0, x1, y1, color, width) {
      const ang = Math.atan2(y1 - y0, x1 - x0);
      const head = 10;
      ctx.strokeStyle = color; ctx.fillStyle = color;
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1 - Math.cos(ang) * head * 0.7, y1 - Math.sin(ang) * head * 0.7);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x1 - Math.cos(ang) * head - Math.sin(ang) * head * 0.55,
                 y1 - Math.sin(ang) * head + Math.cos(ang) * head * 0.55);
      ctx.lineTo(x1 - Math.cos(ang) * head + Math.sin(ang) * head * 0.55,
                 y1 - Math.sin(ang) * head - Math.cos(ang) * head * 0.55);
      ctx.closePath(); ctx.fill();
      ctx.lineCap = 'butt';
    }

    function drawWall() {
      const x0 = 32, x1 = WALL_X, y0 = 46, y1 = RAIL_Y + 6;
      const g = ctx.createLinearGradient(x0, 0, x1, 0);
      g.addColorStop(0, '#9aa6b6'); g.addColorStop(1, '#7d8aa0');
      ctx.fillStyle = g;
      ctx.fillRect(x0, y0, x1 - x0, y1 - y0);
      ctx.strokeStyle = 'rgba(255,255,255,0.45)'; ctx.lineWidth = 1.5;
      for (let yy = y0 - 18; yy < y1; yy += 9) {
        ctx.beginPath(); ctx.moveTo(x0, yy + 18); ctx.lineTo(x1, yy); ctx.stroke();
      }
      ctx.strokeStyle = '#5f6c7d'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(x1, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }

    function drawRail() {
      const g = ctx.createLinearGradient(0, RAIL_Y - 4, 0, RAIL_Y + 6);
      g.addColorStop(0, '#c7cfdb'); g.addColorStop(1, '#a7b2c1');
      ctx.fillStyle = g;
      roundRect(WALL_X, RAIL_Y - 3, 780 - WALL_X, 8, 4); ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.10)'; ctx.lineWidth = 1;
      roundRect(WALL_X, RAIL_Y - 3, 780 - WALL_X, 8, 4); ctx.stroke();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSpring(hx) {
      const startX = WALL_X;
      const endX = hx - GRIP_HALF;
      const lead = 14;
      const coils = Math.round(8 + (state.k - 100) / 900 * 14);
      const amp = 14;
      ctx.strokeStyle = '#73797f';
      ctx.lineWidth = 3;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(startX, AXIS_Y);
      const bodyStart = startX + lead;
      const bodyEnd = endX - lead;
      const bodyLen = Math.max(8, bodyEnd - bodyStart);
      ctx.lineTo(bodyStart, AXIS_Y);
      const N = Math.max(20, coils * 8);
      for (let i = 0; i <= N; i++) {
        const t = i / N;
        const x = bodyStart + t * bodyLen;
        const y = AXIS_Y - amp * Math.sin(2 * Math.PI * coils * t);
        ctx.lineTo(x, y);
      }
      ctx.lineTo(endX, AXIS_Y);
      ctx.stroke();
    }

    function drawGripper(hx, hot) {
      ctx.fillStyle = '#566273';
      ctx.beginPath(); ctx.arc(hx, RAIL_Y + 1, 6, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#3c4654'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#6b7686';
      ctx.fillRect(hx - 3, AXIS_Y, 6, RAIL_Y - AXIS_Y);
      const by0 = AXIS_Y - 26, bh = 40;
      const g = ctx.createLinearGradient(hx - GRIP_HALF, 0, hx + GRIP_HALF, 0);
      g.addColorStop(0, hot ? '#5f7da6' : '#566273');
      g.addColorStop(1, hot ? '#3f5a80' : '#3c4654');
      ctx.fillStyle = g;
      roundRect(hx - GRIP_HALF, by0, GRIP_HALF * 2, bh, 5); ctx.fill();
      ctx.strokeStyle = '#2c3542'; ctx.lineWidth = 1.5;
      roundRect(hx - GRIP_HALF, by0, GRIP_HALF * 2, bh, 5); ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 1.5;
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.moveTo(hx - 5, AXIS_Y - 6 + i * 6);
        ctx.lineTo(hx + 5, AXIS_Y - 6 + i * 6);
        ctx.stroke();
      }
      ctx.fillStyle = '#2c3542';
      ctx.beginPath();
      ctx.moveTo(hx - GRIP_HALF, AXIS_Y - 8);
      ctx.lineTo(hx - GRIP_HALF - 7, AXIS_Y);
      ctx.lineTo(hx - GRIP_HALF, AXIS_Y + 8);
      ctx.closePath(); ctx.fill();
    }

    function label(text, x, y, color, align) {
      ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
      ctx.textAlign = align || 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(244,246,249,0.9)';
      ctx.strokeText(text, x, y);
      ctx.fillStyle = color; ctx.fillText(text, x, y);
    }

    // ── Render ──────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);

      const hx = handleX();
      const F = state.k * state.x;
      const dispMag = Math.abs(state.x) * SCALE;
      const dir = state.x >= 0 ? 1 : -1;
      const fLen = Math.min(MAXLEN, Math.abs(F) / 100 * MAXLEN);

      // Equilibrium dashed line
      ctx.save();
      ctx.setLineDash([6, 5]); ctx.strokeStyle = C_DISP; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(EQ_X, 44); ctx.lineTo(EQ_X, 206); ctx.stroke();
      ctx.restore();
      label('equilibrium', EQ_X, 36, C_DISP);

      drawWall();
      drawRail();
      drawSpring(hx);
      drawGripper(hx, hovering || state.dragging);

      // Spring force (blue): opposite to displacement, label moves with arrow
      if (Math.abs(F) > 0.05) {
        const y = RAIL_Y + 26;
        const tipX = hx - dir * fLen;
        arrow(hx, y, tipX, y, C_SPRING, 4);
        label('spring force', (hx + tipX) / 2, y - 16, C_SPRING);
      }

      // Displacement (green): from equilibrium to handle, label moves with arrow
      if (dispMag > 0.5) {
        const y = RAIL_Y + 52;
        const tipX = EQ_X + dir * dispMag;
        arrow(EQ_X, y, tipX, y, C_DISP, 4);
        label('displacement', (EQ_X + tipX) / 2, y - 16, C_DISP);
      }

      // Hint
      ctx.font = '12px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#9aa6b6'; ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('Drag the handle ↔ to stretch or compress the spring', W / 2, 18);
    }

    // ── Loop ────────────────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs == null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      step(dt);
      draw();
      requestAnimationFrame(frame);
    }

    applyParams();
    requestAnimationFrame(frame);
  })();
  </script>
</body>
</html>
