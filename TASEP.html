<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TASEP</title>
  <!-- Original AoPS interactive. Faithful 2D replacement for the GlowScript
       "TASEP" program: Totally Asymmetric Simple Exclusion Process (a 1D lattice
       model for molecular motor transport / traffic). Particles enter from the left
       with rate alpha, hop right when the next cell is empty, and exit at rate beta. -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #fff; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }
    .controls { padding: 8px 12px; font-size: 14px; }
    .ctrl-row { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    input[type=range] { width: 180px; vertical-align: middle; }
    .stat { margin-top: 2px; font-size: 14px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <div class="ctrl-row">
    <input type="range" id="cellsSlider" min="10" max="500" step="5" value="20">
    <span id="cellsLabel">cells: 20</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="alphaSlider" min="0" max="1" step="0.02" value="0.20">
    <span id="alphaLabel">α: 0.20</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="betaSlider" min="0" max="1" step="0.02" value="0.30">
    <span id="betaLabel">β: 0.30</span>
  </div>
  <div class="ctrl-row">
    <input type="range" id="speedSlider" min="0" max="1000" step="1" value="81">
    <span id="speedLabel">simulation speed: 2</span>
  </div>
  <div class="stat" id="fluxLabel">long term average flux: will show here after running at least 100 time steps</div>
  <div class="stat" id="filledLabel">fraction of cells filled: —</div>
</div>
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
<script>
(() => {
  'use strict';

  const Q = new URLSearchParams(location.search);
  const num = (k, d) => Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d;
  const avgWindow = Math.max(1, Math.round(num('avg_window', 100)));

  const MAXW = 800;

  const canvas      = document.getElementById('c');
  const ctx         = canvas.getContext('2d');
  const cellsSlider = document.getElementById('cellsSlider');
  const alphaSlider = document.getElementById('alphaSlider');
  const betaSlider  = document.getElementById('betaSlider');
  const speedSlider = document.getElementById('speedSlider');
  const cellsLabel  = document.getElementById('cellsLabel');
  const alphaLabel  = document.getElementById('alphaLabel');
  const betaLabel   = document.getElementById('betaLabel');
  const speedLabel  = document.getElementById('speedLabel');
  const fluxLabel   = document.getElementById('fluxLabel');
  const filledLabel = document.getElementById('filledLabel');

  let W, cellW, cellH, dpr;
  let numCells, alpha, beta;
  let occupied = [];
  let minTimesteps, timesteps, runningFlux, runningFluxCount, filledCount;
  let densityBuf, densityBufSum, densityBufIdx, densityBufCount;

  function layout() {
    W     = Math.min(window.innerWidth || MAXW, MAXW);
    cellW = W / numCells;
    cellH = Math.max(20, Math.min(50, Math.round(cellW)));
    dpr   = window.devicePixelRatio || 1;
    canvas.width  = Math.round(W * dpr);
    canvas.height = Math.round(cellH * dpr);
    canvas.style.width  = W + 'px';
    canvas.style.height = cellH + 'px';
    document.body.style.width = W + 'px';
  }

  function initSim() {
    numCells     = parseInt(cellsSlider.value);
    alpha        = parseFloat(alphaSlider.value);
    beta         = parseFloat(betaSlider.value);
    minTimesteps = numCells * 5;
    timesteps    = 0;
    runningFlux  = 0;
    runningFluxCount = 0;
    filledCount  = 0;
    densityBuf = new Float64Array(avgWindow);
    densityBufSum = 0;
    densityBufIdx = 0;
    densityBufCount = 0;
    occupied     = new Array(numCells).fill(false);
    cellsLabel.textContent = 'cells: ' + numCells;
    alphaLabel.textContent = 'α: ' + alpha.toFixed(2);
    betaLabel.textContent  = 'β: ' + beta.toFixed(2);
    fluxLabel.textContent  = 'long term average flux: will show here after running at least ' + minTimesteps + ' time steps';
    filledLabel.textContent = 'fraction of cells filled: —';
    layout();
  }

  function simStep() {
    for (let k = 0; k < numCells; k++) {
      const loc = Math.floor(Math.random() * (numCells - 1)); // 0 to N-2
      if (occupied[loc] && !occupied[loc + 1]) {
        occupied[loc]     = false;
        occupied[loc + 1] = true;
      }
    }

    if (Math.random() < alpha && !occupied[0]) { occupied[0] = true; filledCount++; }

    let left = false;
    if (Math.random() < beta && occupied[numCells - 1]) {
      occupied[numCells - 1] = false;
      filledCount--;
      left = true;
    }

    // Occupancy only changes on entry (+1) and exit (-1); bulk hops conserve it.
    // So we track filledCount incrementally instead of scanning the array each step.
    timesteps++;
    if (timesteps > minTimesteps) {
      if (left) runningFlux++;
      runningFluxCount++;
    }

    densityBufSum -= densityBuf[densityBufIdx];
    densityBuf[densityBufIdx] = filledCount;
    densityBufSum += filledCount;
    densityBufIdx = (densityBufIdx + 1) % avgWindow;
    if (densityBufCount < avgWindow) densityBufCount++;
  }

  function draw() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, cellH);

    const gap  = Math.max(0, Math.min(1, cellW * 0.1));
    const cInner = cellW - gap;

    for (let i = 0; i < numCells; i++) {
      const x = i * cellW;
      ctx.fillStyle = '#cccccc';
      ctx.fillRect(x + gap / 2, 0, cInner, cellH);

      if (occupied[i]) {
        const r = Math.max(2, cInner * 0.4);
        ctx.beginPath();
        ctx.arc(x + cellW / 2, cellH / 2, r, 0, 2 * Math.PI);
        ctx.fillStyle = '#111111';
        ctx.fill();
      }
    }
  }

  // Logarithmic speed control: the slider position (0..1000) maps exponentially
  // to SPEED_MIN..SPEED_MAX steps/sec, so the low end keeps fine particle-by-particle
  // control while the top end reaches statistics-gathering speeds. The label shows
  // the actual mapped steps/sec, not the raw slider position.
  const SPEED_MIN = 1, SPEED_MAX = 5000;
  function currentSpeed() {
    const t = parseFloat(speedSlider.value) / 1000;
    return Math.max(SPEED_MIN, Math.round(SPEED_MIN * Math.pow(SPEED_MAX / SPEED_MIN, t)));
  }

  let lastStepTime = 0;
  function stepDuration() { return 1000 / currentSpeed(); }

  // Stats are refreshed once per frame, not once per step: the sim may run many
  // steps between frames, and per-step textContent writes were a real bottleneck
  // at high speed. Only the latest state is ever drawn, so intermediate steps are
  // computed but never rendered — i.e. "draw every Nth state" is automatic.
  function updateStats() {
    const avgFilled = densityBufCount > 0 ? densityBufSum / (densityBufCount * numCells) : 0;
    filledLabel.textContent = 'fraction of cells filled: ' + avgFilled.toFixed(3);
    if (runningFluxCount > 0)
      fluxLabel.textContent = 'long term average flux: ' + (runningFlux / runningFluxCount).toFixed(4);
  }

  function loop(now) {
    requestAnimationFrame(loop);
    if (!lastStepTime) lastStepTime = now;
    const sd = stepDuration();
    let elapsed = now - lastStepTime;
    // Recover from long stalls (e.g. a backgrounded tab) instead of trying to
    // replay thousands of skipped steps in one frame.
    if (elapsed > 250) { elapsed = sd; lastStepTime = now - sd; }

    let ran = 0;
    const start = performance.now();
    while (elapsed >= sd) {
      simStep();
      lastStepTime += sd;
      elapsed -= sd;
      ran++;
      // Cap compute at ~8 ms/frame. If the requested speed exceeds what this CPU
      // can deliver, run as many steps as fit and resync to the wall clock rather
      // than freezing or accumulating an unbounded backlog.
      if ((ran & 63) === 0 && performance.now() - start > 8) { lastStepTime = now; break; }
    }
    if (ran) updateStats();
    draw();
  }

  function reset() { initSim(); lastStepTime = 0; }

  // Changing cells, alpha, or beta resets the lattice and the long-term-average
  // accumulator (matches the GlowScript original, which binds all three to reset).
  // initSim() re-reads the slider values and refreshes their labels.
  cellsSlider.addEventListener('input', reset);
  alphaSlider.addEventListener('input', reset);
  betaSlider.addEventListener('input', reset);
  speedSlider.addEventListener('input', () => {
    speedLabel.textContent = 'simulation speed: ' + currentSpeed();
  });
  window.addEventListener('resize', () => { layout(); });

  if (Q.has('cells')) cellsSlider.value = String(num('cells', 20));
  if (Q.has('alpha')) alphaSlider.value = String(num('alpha', 0.20));
  if (Q.has('beta'))  betaSlider.value  = String(num('beta', 0.30));
  if (Q.has('speed')) speedSlider.value = String(num('speed', 81));

  numCells = parseInt(cellsSlider.value);
  layout();
  initSim();
  speedLabel.textContent = 'simulation speed: ' + currentSpeed();
  requestAnimationFrame(loop);
})();
</script><!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {name:'cells',      type:'number', min:10,  max:500,   step:5,    default:20,   desc:'Number of lattice cells'},
    {name:'alpha',      type:'number', min:0,   max:1,     step:0.02, default:0.20, desc:'Entry rate α (probability per timestep)'},
    {name:'beta',       type:'number', min:0,   max:1,     step:0.02, default:0.30, desc:'Exit rate β (probability per timestep)'},
    {name:'speed',      type:'number', min:0,   max:1000,  step:1,    default:81,   desc:'Speed slider position (0–1000, logarithmic)'},
    {name:'avg_window', type:'number', min:1,   max:10000, step:1,    default:100,  desc:'Density average window (number of timesteps)'},
  ];
  var EMBED_KEYS = ['cheat'];
  function buildCleanUrl(ov) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function(k) { p.delete(k); });
    for (var k in ov) { var v=ov[k]; if(v===null||v==='') p.delete(k); else p.set(k,v); }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }
  function buildCheatUrl(ov) {
    var b = buildCleanUrl(ov);
    return b + (b.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }
  function getEff(d) {
    var r = _cpQ.get(d.name);
    return r !== null ? r : (d['default'] !== undefined ? String(d['default']) : '');
  }
  function isTruthy(v) { return v!=='0'&&v!=='false'&&v!=='no'&&v!=='off'&&v!==''; }

  function makeControl(d) {
    var eff = getEff(d);
    if (d.type === 'toggle') {
      var on = isTruthy(eff), btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:'+(on?'#1b3d1b':'#3d1b1b')+';color:'+(on?'#6dca80':'#e07070')+
        ';border:1px solid '+(on?'#2a7a3a':'#8a2a2a')+';border-radius:3px;padding:3px 10px;'+
        'cursor:pointer;font-size:12px;min-width:70px';
      btn.onclick = function() { var u={}; u[d.name]=on?'0':'1'; location.href=buildCheatUrl(u); };
      return btn;
    }
    if (d.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
        'border-radius:3px;padding:3px 8px;font-size:12px;cursor:pointer';
      d.values.forEach(function(v) {
        var o = document.createElement('option'); o.value=v; o.textContent=v;
        if (eff===String(v)) o.selected=true; sel.appendChild(o);
      });
      sel.onchange = function() { var u={}; u[d.name]=sel.value; location.href=buildCheatUrl(u); };
      return sel;
    }
    var inp = document.createElement('input');
    inp.type = d.type==='number' ? 'number' : 'text'; inp.value = eff;
    if (d.min!==undefined) inp.min=String(d.min);
    if (d.max!==undefined) inp.max=String(d.max);
    if (d.step!==undefined) inp.step=String(d.step);
    inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
      'border-radius:3px;padding:3px 6px;width:'+(d.type==='number'?'90':'220')+'px;font-size:12px';
    inp.onchange = function() { var u={}; u[d.name]=inp.value; location.href=buildCheatUrl(u); };
    return inp;
  }

  function typeLabel(d) {
    if (d.type==='toggle') return '0|1';
    if (d.type==='select') return d.values.join('|');
    if (d.type==='number'&&d.min!==undefined&&d.max!==undefined) return d.min+'–'+d.max;
    return d.type;
  }

  function render() {
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;'+
      'background:rgba(12,18,32,0.97);color:#c8d8e8;'+
      'font-family:"Segoe UI",system-ui,monospace;font-size:13px;'+
      'border-top:2px solid #3a7bd5;z-index:2147483647;max-height:48vh;overflow-y:auto;'+
      'padding:10px 16px 14px;box-sizing:border-box;box-shadow:0 -4px 24px rgba(0,0,0,0.6)';

    var bubble = document.createElement('button');
    bubble.style.cssText = 'position:fixed;bottom:8px;right:12px;'+
      'background:rgba(12,18,32,0.95);color:#7ab8f5;border:1px solid #3a7bd5;'+
      'border-radius:4px;padding:4px 12px;font-size:12px;'+
      'font-family:"Segoe UI",system-ui,monospace;cursor:pointer;'+
      'z-index:2147483647;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.5);user-select:none';
    bubble.textContent = '🔑 Cheat Panel';
    bubble.onclick = function() { bubble.style.display='none'; panel.style.display=''; };
    document.body.appendChild(bubble);

    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-weight:bold;color:#7ab8f5;margin-bottom:8px;'+
      'display:flex;align-items:center;justify-content:space-between';
    var hspan = document.createElement('span');
    hspan.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var btns = document.createElement('div');
    btns.style.cssText = 'display:flex;align-items:center;gap:2px';
    var minbtn = document.createElement('button');
    minbtn.textContent = '−';
    minbtn.title = 'Minimize (restore without reloading)';
    minbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    minbtn.onclick = function() { panel.style.display='none'; bubble.style.display=''; };
    var xbtn = document.createElement('button');
    xbtn.textContent = '×'; xbtn.title = 'Close (reload to restore)';
    xbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    xbtn.onclick = function() { panel.remove(); bubble.remove(); };
    btns.appendChild(minbtn); btns.appendChild(xbtn);
    hdr.appendChild(hspan); hdr.appendChild(btns); panel.appendChild(hdr);

    var tbl = document.createElement('table');
    tbl.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var hrow = tbl.createTHead().insertRow();
    ['Parameter','Type/Values','Control','Description'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;'+
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = tbl.createTBody();
    CHEAT_DEFS.forEach(function(d) {
      var row = tbody.insertRow(), isSet = _cpQ.has(d.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;'+
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;'+
        'color:'+(isSet?'#a8d4ff':'#7fa8d0')+';white-space:nowrap;font-family:monospace';
      nc.textContent = d.name;
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;font-family:monospace';
      tc.textContent = typeLabel(d);
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(d));
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (d.desc||'')+(d['default']!==undefined?' (default: '+d['default']+')':'');
    });
    panel.appendChild(tbl);

    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;'+
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var ulbl = document.createElement('span');
    ulbl.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;'+
      'letter-spacing:.06em;white-space:nowrap;flex-shrink:0';
    ulbl.textContent = 'Embed URL:';
    var ulink = document.createElement('a');
    ulink.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;'+
      'font-family:monospace;text-decoration:none';
    ulink.href = buildCleanUrl({}); ulink.textContent = buildCleanUrl({});
    ulink.onclick = function(e) { e.preventDefault(); location.href=buildCheatUrl({}); };
    var cpybtn = document.createElement('button');
    cpybtn.textContent = 'copy';
    cpybtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;'+
      'border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;'+
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    cpybtn.onclick = function() {
      navigator.clipboard && navigator.clipboard.writeText(buildCleanUrl({}));
      cpybtn.textContent = '✓ copied';
      setTimeout(function() { cpybtn.textContent = 'copy'; }, 1500);
    };
    urlBox.appendChild(ulbl); urlBox.appendChild(ulink); urlBox.appendChild(cpybtn);
    panel.appendChild(urlBox);
    document.body.appendChild(panel);
  }
  render();
})();
</script>
</body>
</html>
