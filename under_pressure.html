<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="eigennode-aspect" content="7/5">
  <title>Fluid Pressure</title>
  <!-- Original AoPS interactive. Replaces the third-party "Under Pressure" simulation. -->
  <!--
    URL parameters (all optional):
      &ruler=1|0           show the draggable ruler        (default 0)
      &grid=1|0            show the 0.5 m grid             (default 0)
      &water=0..3          initial water level in m        (default 2.0)
    Fixed: density=1000 kg/m³, g=9.8 m/s², atmosphere on, units kPa.
    Calibration: P = 101.325 kPa + 1000·9.8·depth.
    At 1.0 m depth: 111.1 kPa.
  -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      position: relative;
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    #c {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block; touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 700, H = 500;

    // Size the backing store to the displayed pixel box (crisp at any size);
    // the W×H logical grid is mapped onto it via setTransform. Re-runs on resize.
    function fit() {
      const dpr = window.devicePixelRatio || 1;
      const cw = canvas.clientWidth, ch = canvas.clientHeight;
      if (!cw || !ch) return;
      canvas.width  = Math.round(cw * dpr);
      canvas.height = Math.round(ch * dpr);
      ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    }
    new ResizeObserver(fit).observe(canvas);
    fit();

    // ── Scene geometry ───────────────────────────────────────
    const GROUND_Y = 150;
    const POOL = { l: 80, r: 390, b: 450 };
    const PXM = 100;
    const MAX_DEPTH = 3.0;
    const WALL = 10;
    const SPOUT_X = 124;
    const P_ATM = 101325;
    const FLOW_RATE = 0.6;
    const DRAIN_KNOB_X = 434;
    const DRAIN_PIPE_END = 510;

    // Fixed physics
    const RHO = 1000, G_ACC = 9.8;

    // ── Zoom ─────────────────────────────────────────────────
    const ZOOM_MIN = 1.0, ZOOM_MAX = 4.0, ZOOM_STEP = 0.5;

    // ── URL-parameter defaults ───────────────────────────────
    const Q = new URLSearchParams(location.search);
    const qnum = (k, def, lo, hi) => {
      const v = parseFloat(Q.get(k));
      return isFinite(v) ? Math.min(hi, Math.max(lo, v)) : def;
    };
    const DEF = {
      ruler: Q.get('ruler') === '1',
      grid:  Q.get('grid')  === '1',
      water: qnum('water', 2.0, 0, MAX_DEPTH),
    };

    // ── State ────────────────────────────────────────────────
    const state = {};
    function initState() {
      state.ruler = DEF.ruler;
      state.grid  = DEF.grid;
      state.water = DEF.water;
      state.fill  = false;
      state.drain = false;
      state.gauge = { x: 570, y: 90 };
      state.rul   = { x: 96, y: GROUND_Y };
      state.flowPhase = 0;
      state.zoom  = 1.0;
      state.pan   = { x: 0, y: 0 };
    }

    // ── Coord helpers ─────────────────────────────────────────
    const screenToWorld = (sx, sy) => [sx / state.zoom + state.pan.x, sy / state.zoom + state.pan.y];

    function clampPan() {
      const maxX = W * (1 - 1 / state.zoom);
      const maxY = H * (1 - 1 / state.zoom);
      state.pan.x = Math.max(0, Math.min(maxX, state.pan.x));
      state.pan.y = Math.max(0, Math.min(maxY, state.pan.y));
    }

    function adjustZoom(delta) {
      const newZoom = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX,
        Math.round((state.zoom + delta) * 10) / 10));
      if (newZoom === state.zoom) return;
      const cx = state.pan.x + W / (2 * state.zoom);
      const cy = state.pan.y + H / (2 * state.zoom);
      state.zoom = newZoom;
      state.pan.x = cx - W / (2 * newZoom);
      state.pan.y = cy - H / (2 * newZoom);
      clampPan();
    }

    // ── Physics ──────────────────────────────────────────────
    const surfaceY = () => POOL.b - state.water * PXM;

    function pressurePa() {
      const s = surfaceY();
      const depth = Math.max(0, (state.gauge.y - s) / PXM);
      return P_ATM + RHO * G_ACC * depth;
    }

    const fmtPressure = P => (P / 1000).toFixed(1) + ' kPa';

    const WATER_RGB = [110, 196, 232];
    const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

    // ── Adaptive ruler / grid intervals ───────────────────────
    // Nice intervals in meters, largest first
    const NICE = [1.0, 0.5, 0.2, 0.1, 0.05, 0.02, 0.01, 0.005];

    function getRulerIntervals() {
      const z = state.zoom;
      let minor = NICE[0], label = NICE[0];
      // Smallest nice interval that still gives ≥ 8 px on screen → minor ticks
      for (const n of NICE) if (n * PXM * z >= 8)  minor = n;
      // Smallest nice interval that still gives ≥ 40 px on screen → labeled ticks
      for (const n of NICE) if (n * PXM * z >= 40) label = n;
      if (label < minor) label = minor;
      return { minor, label };
    }

    function getGridInterval() {
      const z = state.zoom;
      let step = NICE[0];
      // Smallest nice interval that still gives ≥ 40 px on screen
      for (const n of NICE) if (n * PXM * z >= 40) step = n;
      return step;
    }

    // ── HUD rects (screen coords, never zoomed) ───────────────
    const RULER_BTN      = { x: 10,  y: 10, w: 55, h: 22 };
    const GRID_BTN       = { x: 10,  y: 37, w: 55, h: 22 };
    const ZOOM_MINUS_BTN = { x: 71,  y: 10, w: 22, h: 22 };
    const ZOOM_LABEL_R   = { x: 93,  y: 10, w: 38, h: 22 };
    const ZOOM_PLUS_BTN  = { x: 131, y: 10, w: 22, h: 22 };

    // Knob rest centers (world coords)
    const FILL_KNOB_CX  = SPOUT_X, FILL_KNOB_CY  = 47;
    const DRAIN_KNOB_CX = DRAIN_KNOB_X, DRAIN_KNOB_CY = 421;
    const KNOB_R = 8;

    // ── Drawing ──────────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSky() {
      const gr = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
      gr.addColorStop(0, '#b8def7');
      gr.addColorStop(1, '#e9f5fd');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, W, GROUND_Y);
    }

    function drawFaucet() {
      ctx.fillStyle = '#aeb8c0';
      ctx.fillRect(0, 62, SPOUT_X + 4, 16);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(0, 64, SPOUT_X + 4, 4);
      ctx.fillStyle = '#9fa9b2';
      ctx.fillRect(SPOUT_X - 13, 62, 26, 34);
      ctx.fillStyle = '#8d97a0';
      ctx.fillRect(SPOUT_X - 9, 96, 18, 6);
      const fky = FILL_KNOB_CY - (state.fill ? 4 : 0);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(FILL_KNOB_CX, 62); ctx.lineTo(FILL_KNOB_CX, fky + KNOB_R); ctx.stroke();
      ctx.beginPath(); ctx.arc(FILL_KNOB_CX, fky, KNOB_R, 0, Math.PI * 2);
      ctx.fillStyle = state.fill ? '#3d6a8a' : '#5f7d99';
      ctx.fill();
      ctx.strokeStyle = '#46627c'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 62.5, SPOUT_X + 12.5, 15);
    }

    function drawGroundAndPool() {
      const gr = ctx.createLinearGradient(0, GROUND_Y, 0, H);
      gr.addColorStop(0, '#b08a64');
      gr.addColorStop(1, '#8a6a4a');
      ctx.fillStyle = gr;
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
      ctx.fillStyle = '#79b35e';
      ctx.fillRect(0, GROUND_Y - 4, POOL.l - WALL, 8);
      ctx.fillRect(POOL.r + WALL, GROUND_Y - 4, W - POOL.r - WALL, 8);
      ctx.fillStyle = '#eef2f2';
      ctx.fillRect(POOL.l, GROUND_Y, POOL.r - POOL.l, POOL.b - GROUND_Y);
    }

    function drawWater() {
      if (state.water <= 0.0005) return;
      const s = surfaceY();
      const gr = ctx.createLinearGradient(0, s, 0, POOL.b);
      gr.addColorStop(0, rgba(WATER_RGB, 0.72));
      gr.addColorStop(1, rgba(WATER_RGB.map(v => Math.round(v * 0.72)), 0.9));
      ctx.fillStyle = gr;
      ctx.fillRect(POOL.l, s, POOL.r - POOL.l, POOL.b - s);
      ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(POOL.l, s); ctx.lineTo(POOL.r, s); ctx.stroke();
    }

    function drawWalls() {
      ctx.fillStyle = '#dfdfd4';
      ctx.fillRect(POOL.l - WALL, GROUND_Y, WALL, POOL.b + WALL - GROUND_Y);
      ctx.fillRect(POOL.r, GROUND_Y, WALL, POOL.b + WALL - GROUND_Y);
      ctx.fillRect(POOL.l - WALL, POOL.b, POOL.r - POOL.l + 2 * WALL, WALL);
      ctx.strokeStyle = '#b4b4a6'; ctx.lineWidth = 1;
      ctx.strokeRect(POOL.l - WALL + 0.5, GROUND_Y + 0.5,
                     POOL.r - POOL.l + 2 * WALL - 1, POOL.b + WALL - GROUND_Y - 1);
      ctx.strokeRect(POOL.l + 0.5, GROUND_Y + 0.5, POOL.r - POOL.l - 1, POOL.b - GROUND_Y - 1);
    }

    function drawDrain() {
      ctx.fillStyle = '#9fa9b2';
      ctx.fillRect(POOL.r, 432, DRAIN_PIPE_END - POOL.r, 18);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(POOL.r, 434, DRAIN_PIPE_END - POOL.r, 4);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 1;
      ctx.strokeRect(POOL.r + 0.5, 432.5, DRAIN_PIPE_END - POOL.r - 1, 17);
      const dky = DRAIN_KNOB_CY + (state.drain ? 4 : 0);
      ctx.beginPath(); ctx.moveTo(DRAIN_KNOB_CX, 432); ctx.lineTo(DRAIN_KNOB_CX, dky - KNOB_R);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.beginPath(); ctx.arc(DRAIN_KNOB_CX, dky, KNOB_R, 0, Math.PI * 2);
      ctx.fillStyle = state.drain ? '#3d6a8a' : '#5f7d99';
      ctx.fill();
      ctx.strokeStyle = '#46627c'; ctx.lineWidth = 1.5; ctx.stroke();
      if (state.drain && state.water > 0.0005) {
        ctx.save();
        ctx.strokeStyle = rgba(WATER_RGB, 0.95); ctx.lineWidth = 8;
        ctx.setLineDash([12, 9]);
        ctx.lineDashOffset = -state.flowPhase;
        ctx.beginPath(); ctx.moveTo(POOL.r + 2, 441); ctx.lineTo(DRAIN_PIPE_END - 2, 441); ctx.stroke();
        ctx.restore();
      }
    }

    function drawFillStream() {
      if (!state.fill || state.water >= MAX_DEPTH - 0.0005) return;
      const s = surfaceY();
      ctx.fillStyle = rgba(WATER_RGB, 0.7);
      ctx.fillRect(SPOUT_X - 6, 102, 12, s - 102);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(SPOUT_X - 2, 102, 2, s - 102);
    }

    function drawGrid() {
      if (!state.grid) return;
      const step = getGridInterval();
      const dp = step >= 0.1 ? 1 : 2;
      const EPS = step * 0.01;
      ctx.font = 'bold 10px Segoe UI';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      let depth = 0;
      while (depth <= MAX_DEPTH + EPS) {
        const y = GROUND_Y + depth * PXM;
        const isWholeMeter = Math.abs(Math.round(depth) - depth) < EPS;
        ctx.strokeStyle = 'rgba(20,70,90,0.45)';
        ctx.lineWidth = isWholeMeter ? 1.6 : 0.8;
        ctx.beginPath(); ctx.moveTo(POOL.l, y + 0.5); ctx.lineTo(POOL.r, y + 0.5); ctx.stroke();
        ctx.strokeStyle = 'rgba(20,70,90,0.7)'; ctx.lineWidth = 1.6;
        ctx.beginPath(); ctx.moveTo(POOL.l - WALL, y + 0.5); ctx.lineTo(POOL.l, y + 0.5); ctx.stroke();
        const label = depth.toFixed(dp) + ' m';
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillText(label, POOL.l - WALL - 4 + 1, y + 1);
        ctx.fillStyle = '#fff7e0';
        ctx.fillText(label, POOL.l - WALL - 4, y);
        depth = Math.round((depth + step) * 1e6) / 1e6;
      }
    }

    function rulerRect() {
      return { x: state.rul.x, y: state.rul.y - 16, w: 34, h: MAX_DEPTH * PXM + 24 };
    }

    function drawRuler() {
      if (!state.ruler) return;
      const rx = state.rul.x, ry = state.rul.y;
      const r = rulerRect();
      ctx.fillStyle = 'rgba(243,228,170,0.94)';
      ctx.strokeStyle = '#a8915a'; ctx.lineWidth = 1;
      roundRect(r.x, r.y, r.w, r.h, 3); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#6b5a2a';
      ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('m', rx + r.w / 2, ry - 9);

      const { minor, label: labelStep } = getRulerIntervals();
      const labelDp = labelStep >= 1 ? 0 : labelStep >= 0.1 ? 1 : 2;
      const EPS = minor * 0.01;

      ctx.strokeStyle = '#5a4a22';
      ctx.textAlign = 'right'; ctx.font = '8.5px Segoe UI';
      let depth = 0;
      while (depth <= MAX_DEPTH + EPS) {
        const y = ry + depth * PXM;
        const isLabel = Math.abs(Math.round(depth / labelStep) * labelStep - depth) < EPS;
        ctx.lineWidth = isLabel ? 1.2 : 0.7;
        const len = isLabel ? 13 : 5;
        ctx.beginPath(); ctx.moveTo(rx, y + 0.5); ctx.lineTo(rx + len, y + 0.5); ctx.stroke();
        if (isLabel) {
          ctx.fillStyle = '#5a4a22';
          const text = depth < EPS ? '0' : depth.toFixed(labelDp);
          ctx.fillText(text, rx + r.w - 3, y + (depth < EPS ? 4 : 0));
        }
        depth = Math.round((depth + minor) * 1e6) / 1e6;
      }
    }

    function gaugeTagRect() {
      const g = state.gauge;
      return { x: g.x - 41, y: g.y - 26 - 26, w: 82, h: 20 };
    }

    function drawGauge() {
      const g = state.gauge, r = 26;
      const P = pressurePa();
      const tag = gaugeTagRect();
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 1;
      ctx.fillStyle = '#ffffff';
      roundRect(tag.x, tag.y, tag.w, tag.h, 4); ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#667788'; ctx.lineWidth = 1.2;
      roundRect(tag.x, tag.y, tag.w, tag.h, 4); ctx.stroke();
      ctx.fillStyle = '#667788';
      ctx.beginPath();
      ctx.moveTo(g.x - 4, tag.y + tag.h);
      ctx.lineTo(g.x + 4, tag.y + tag.h);
      ctx.lineTo(g.x, g.y - r + 2);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#223344';
      ctx.font = '600 11px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(fmtPressure(P), g.x, tag.y + tag.h / 2 + 1);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 1;
      ctx.beginPath(); ctx.arc(g.x, g.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff'; ctx.fill();
      ctx.restore();
      ctx.beginPath(); ctx.arc(g.x, g.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#556677'; ctx.lineWidth = 2.5; ctx.stroke();
      for (let i = 0; i <= 25; i++) {
        const a = (135 + 270 * i / 25) * Math.PI / 180;
        const major = i % 5 === 0;
        const r1 = r - 3, r0 = r1 - (major ? 6 : 3.5);
        ctx.strokeStyle = '#556677'; ctx.lineWidth = major ? 1.4 : 0.7;
        ctx.beginPath();
        ctx.moveTo(g.x + r0 * Math.cos(a), g.y + r0 * Math.sin(a));
        ctx.lineTo(g.x + r1 * Math.cos(a), g.y + r1 * Math.sin(a));
        ctx.stroke();
      }
      ctx.fillStyle = '#8899aa'; ctx.font = '7.5px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Pressure', g.x, g.y + 13);
      const frac = Math.max(0, Math.min(1, (P / 1000) / 250));
      const ang = (135 + 270 * frac) * Math.PI / 180;
      ctx.strokeStyle = '#cc2222'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(g.x - 6 * Math.cos(ang), g.y - 6 * Math.sin(ang));
      ctx.lineTo(g.x + (r - 8) * Math.cos(ang), g.y + (r - 8) * Math.sin(ang));
      ctx.stroke();
      ctx.beginPath(); ctx.arc(g.x, g.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#334455'; ctx.fill();
      ctx.fillStyle = '#bb3333';
      ctx.beginPath();
      ctx.moveTo(g.x - r - 9, g.y - 5); ctx.lineTo(g.x - r - 9, g.y + 5);
      ctx.lineTo(g.x - r - 2, g.y); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(g.x + r + 9, g.y - 5); ctx.lineTo(g.x + r + 9, g.y + 5);
      ctx.lineTo(g.x + r + 2, g.y); ctx.closePath(); ctx.fill();
    }

    function drawHint() {
      ctx.fillStyle = '#7d96ab'; ctx.font = '11px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('Drag the pressure gauge', 490, 18);
    }

    function drawOverlayButtons() {
      function drawBtn(rect, label, active) {
        roundRect(rect.x, rect.y, rect.w, rect.h, 5);
        ctx.fillStyle = active ? '#cfe8fa' : 'rgba(255,255,255,0.9)';
        ctx.fill();
        ctx.strokeStyle = active ? '#7fb3d6' : '#b6c2cc';
        ctx.lineWidth = 1;
        roundRect(rect.x, rect.y, rect.w, rect.h, 5);
        ctx.stroke();
        ctx.fillStyle = '#334455';
        ctx.font = '11px Segoe UI';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);
      }
      drawBtn(RULER_BTN, 'Ruler', state.ruler);
      drawBtn(GRID_BTN,  'Grid',  state.grid);
      drawBtn(ZOOM_MINUS_BTN, '−', false);
      drawBtn(ZOOM_PLUS_BTN,  '+', false);
      // zoom level label (non-interactive)
      roundRect(ZOOM_LABEL_R.x, ZOOM_LABEL_R.y, ZOOM_LABEL_R.w, ZOOM_LABEL_R.h, 5);
      ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();
      ctx.strokeStyle = '#b6c2cc'; ctx.lineWidth = 1;
      roundRect(ZOOM_LABEL_R.x, ZOOM_LABEL_R.y, ZOOM_LABEL_R.w, ZOOM_LABEL_R.h, 5); ctx.stroke();
      ctx.fillStyle = '#334455'; ctx.font = '11px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(state.zoom.toFixed(1) + '×',
        ZOOM_LABEL_R.x + ZOOM_LABEL_R.w / 2, ZOOM_LABEL_R.y + ZOOM_LABEL_R.h / 2);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Scene — drawn under zoom/pan transform
      ctx.save();
      ctx.scale(state.zoom, state.zoom);
      ctx.translate(-state.pan.x, -state.pan.y);
      drawSky();
      drawFaucet();
      drawGroundAndPool();
      drawWater();
      drawWalls();
      drawDrain();
      drawFillStream();
      drawGrid();
      drawRuler();
      drawGauge();
      ctx.restore();

      // HUD — always in screen space
      drawHint();
      drawOverlayButtons();
    }

    // ── Animation loop ───────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (state.fill)  state.water = Math.min(MAX_DEPTH, state.water + FLOW_RATE * dt);
      if (state.drain) {
        state.water = Math.max(0, state.water - FLOW_RATE * dt);
        state.flowPhase = (state.flowPhase + 60 * dt) % 21;
      }
      draw();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ── Pointer interaction ──────────────────────────────────
    const cpos = e => {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) * W / r.width, (e.clientY - r.top) * H / r.height];
    };
    const inRect = (x, y, r) => x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    const overGauge       = (wx, wy) => {
      const g = state.gauge;
      return Math.hypot(wx - g.x, wy - g.y) < 32 || inRect(wx, wy, gaugeTagRect());
    };
    const overRulerWidget = (wx, wy) => state.ruler && inRect(wx, wy, rulerRect());
    const overFillKnob    = (wx, wy) => Math.hypot(wx - FILL_KNOB_CX,  wy - FILL_KNOB_CY)  < KNOB_R + 6;
    const overDrainKnob   = (wx, wy) => Math.hypot(wx - DRAIN_KNOB_CX, wy - DRAIN_KNOB_CY) < KNOB_R + 6;

    let drag = null;

    function clampGauge(x, y) {
      y = Math.max(54, Math.min(POOL.b, y));
      x = (y > GROUND_Y + 4)
        ? Math.max(POOL.l + 14, Math.min(POOL.r - 14, x))
        : Math.max(46, Math.min(W - 46, x));
      return [x, y];
    }

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      const [sx, sy] = cpos(e);
      const [wx, wy] = screenToWorld(sx, sy);

      // HUD toggles — screen coords
      if (inRect(sx, sy, RULER_BTN))      { state.ruler = !state.ruler; return; }
      if (inRect(sx, sy, GRID_BTN))       { state.grid  = !state.grid;  return; }
      if (inRect(sx, sy, ZOOM_MINUS_BTN)) { adjustZoom(-ZOOM_STEP); return; }
      if (inRect(sx, sy, ZOOM_PLUS_BTN))  { adjustZoom(+ZOOM_STEP); return; }

      // Spigot knobs — world coords, hold to run
      if (overFillKnob(wx, wy)) {
        drag = { what: 'fill' }; state.fill = true;
        canvas.setPointerCapture(e.pointerId); return;
      }
      if (overDrainKnob(wx, wy)) {
        drag = { what: 'drain' }; state.drain = true;
        canvas.setPointerCapture(e.pointerId); return;
      }

      // Gauge / ruler drag — world coords
      if (overGauge(wx, wy)) {
        drag = { what: 'gauge', dx: state.gauge.x - wx, dy: state.gauge.y - wy };
      } else if (overRulerWidget(wx, wy)) {
        drag = { what: 'ruler', dx: state.rul.x - wx, dy: state.rul.y - wy };
      } else if (state.zoom > 1) {
        drag = { what: 'pan', lastX: sx, lastY: sy };
      }
      if (drag) canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', e => {
      const [sx, sy] = cpos(e);
      const [wx, wy] = screenToWorld(sx, sy);

      if (drag?.what === 'gauge') {
        [state.gauge.x, state.gauge.y] = clampGauge(wx + drag.dx, wy + drag.dy);
        canvas.style.cursor = 'grabbing';
      } else if (drag?.what === 'ruler') {
        state.rul.x = Math.max(-10, Math.min(W - 40, wx + drag.dx));
        state.rul.y = Math.max(30, Math.min(H - 30, wy + drag.dy));
        canvas.style.cursor = 'grabbing';
      } else if (drag?.what === 'pan') {
        const maxX = W * (1 - 1 / state.zoom);
        const maxY = H * (1 - 1 / state.zoom);
        state.pan.x = Math.max(0, Math.min(maxX, state.pan.x - (sx - drag.lastX) / state.zoom));
        state.pan.y = Math.max(0, Math.min(maxY, state.pan.y - (sy - drag.lastY) / state.zoom));
        drag.lastX = sx; drag.lastY = sy;
        canvas.style.cursor = 'grabbing';
      } else if (!drag) {
        const overHUD  = inRect(sx, sy, RULER_BTN) || inRect(sx, sy, GRID_BTN) ||
                         inRect(sx, sy, ZOOM_MINUS_BTN) || inRect(sx, sy, ZOOM_PLUS_BTN);
        const overKnob = overFillKnob(wx, wy) || overDrainKnob(wx, wy);
        canvas.style.cursor = (overHUD || overKnob) ? 'pointer'
          : (overGauge(wx, wy) || overRulerWidget(wx, wy)) ? 'grab'
          : state.zoom > 1 ? 'grab'
          : 'default';
      }
    });

    const endDrag = () => {
      if (drag?.what === 'fill')  state.fill  = false;
      if (drag?.what === 'drain') state.drain = false;
      drag = null;
    };
    canvas.addEventListener('pointerup',          endDrag);
    canvas.addEventListener('pointercancel',      endDrag);
    canvas.addEventListener('lostpointercapture', endDrag);

    // ── Go ───────────────────────────────────────────────────
    initState();
  })();
  </script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "ruler",
        "type": "toggle",
        "default": 0,
        "desc": "Show ruler"
    },
    {
        "name": "grid",
        "type": "toggle",
        "default": 0,
        "desc": "Show grid"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>

<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
