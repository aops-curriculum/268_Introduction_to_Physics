<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Pressure</title>
  <!-- Original AoPS interactive. Replaces the third-party "Under Pressure" simulation. -->
  <!--
    URL parameters (all optional; defaults match the I2P09 homework setup):
      ?atmosphere=on|off   atmospheric pressure term       (default on)
      &density=600..1500   fluid density in kg/m^3         (default 1000, water)
      &g=1..25             gravitational accel in m/s^2    (default 9.8, Earth)
      &ruler=1|0           show the draggable ruler        (default 0)
      &grid=1|0            show the 0.5 m grid             (default 0)
      &units=metric|atm|english   gauge units              (default metric, kPa)
      &water=0..3          initial water level in m        (default 2.0)
    Calibration: P = (atmosphere ? 101.325 kPa : 0) + rho*g*depth.
    Water/Earth/atmosphere-on at 1.0 m depth reads 111.1 kPa.
  -->
<script>
// EigenNode auto-height v2.4
(function() {
  // 4px buffer for subpixel rounding + parent's >=3px noise threshold.
  // Extra 18px when horizontal overflow forces a scrollbar (eats vertical
  // space inside the iframe — AoPS classroom embeds in a narrower column
  // than the 600px content, so a horizontal scrollbar appears and steals
  // ~10-17px of height). Without this, the iframe ends up ~11-15px short.
  var BUFFER = 4;
  var H_SCROLLBAR = 18;
  var measuring = false;
  function measure() {
    if (measuring) return 0;
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    measuring = true;
    // Temporarily neutralise body's height/min-height (overriding stylesheet
    // rules with !important) so scrollHeight reflects actual content extent.
    // Without this, patterns like body { height: 100vh } cause scrollHeight
    // to echo the iframe's current viewport — adding BUFFER each cycle
    // ratchets the iframe taller forever. Browser doesn't paint until this
    // synchronous block returns, so no visible flicker.
    var hOld = b.style.height, hPri = b.style.getPropertyPriority('height');
    var mOld = b.style.minHeight, mPri = b.style.getPropertyPriority('min-height');
    b.style.setProperty('height', 'auto', 'important');
    b.style.setProperty('min-height', '0', 'important');
    var content = b.scrollHeight || 0;
    if (hOld) b.style.setProperty('height', hOld, hPri); else b.style.removeProperty('height');
    if (mOld) b.style.setProperty('min-height', mOld, mPri); else b.style.removeProperty('min-height');
    measuring = false;
    // Check the documentElement only — that's the element that owns the
    // iframe's horizontal scrollbar. Body can be narrower than the iframe
    // (e.g. body{width:600px} centered in a 700px iframe) and have its own
    // 1-2px overflow that doesn't actually trigger a scrollbar.
    var hOverflow = h && (h.scrollWidth - h.clientWidth) >= 4;
    return Math.ceil(content) + BUFFER + (hOverflow ? H_SCROLLBAR : 0);
  }
  var last = 0;
  function report() {
    var h = measure();
    if (h > 0 && Math.abs(h - last) >= 2) {
      last = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 700px; height: 500px; overflow: hidden;
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      display: flex;
    }
    #c { display: block; touch-action: none; }
    #panel {
      width: 230px; height: 500px; padding: 8px 11px;
      background: #eef1f4; border-left: 1px solid #d4dade;
      font-size: 12px; color: #334; overflow: hidden;
    }
    #panel .title {
      font-size: 13px; font-weight: 600; color: #36506a;
      text-align: center; margin-bottom: 6px;
    }
    .group {
      background: #fff; border: 1px solid #dde3e8; border-radius: 6px;
      padding: 5px 8px 6px; margin-bottom: 6px;
    }
    .group .head { font-weight: 600; font-size: 11.5px; color: #445; }
    .group .head .val { float: right; font-weight: 400; color: #667; font-variant-numeric: tabular-nums; }
    .group label { margin-right: 10px; cursor: pointer; white-space: nowrap; }
    .group input[type=checkbox], .group input[type=radio] { vertical-align: -2px; cursor: pointer; }
    .group input[type=range] { width: 100%; margin: 6px 0 0; cursor: pointer; }
    .stack label { display: block; margin: 1px 0; }
    .ticks { position: relative; height: 15px; margin-top: 1px; }
    .ticks span {
      position: absolute; top: 0; transform: translateX(-50%);
      font-size: 9.5px; color: #678; cursor: pointer; text-align: center; line-height: 1;
    }
    .ticks span::before {
      content: ''; display: block; width: 1px; height: 4px;
      background: #99a5b0; margin: 0 auto 1px;
    }
    .ticks span.edge-r { transform: translateX(-88%); }
    .btnrow { display: flex; gap: 6px; }
    .btnrow button {
      flex: 1; padding: 6px 0; font-size: 12px; font-family: inherit;
      border: 1px solid #b6c2cc; border-radius: 5px; background: #fafcff;
      color: #345; cursor: pointer; touch-action: none;
    }
    .btnrow button.active { background: #cfe8fa; border-color: #7fb3d6; }
    .holdhint { font-size: 9.5px; color: #8b98a4; text-align: center; margin: 2px 0 6px; }
    #btnReset {
      width: 100%; padding: 5px 0; font-size: 12px; font-family: inherit;
      border: 1px solid #b6c2cc; border-radius: 5px; background: #fafcff;
      color: #345; cursor: pointer;
    }
    #btnReset:active { background: #e2ecf4; }
  </style>
</head>
<body>
  <canvas id="c" width="470" height="500"></canvas>
  <div id="panel">
    <div class="title">Fluid Pressure</div>
    <div class="group">
      <label><input type="checkbox" id="ckRuler"> Ruler</label>
      <label><input type="checkbox" id="ckGrid"> Grid</label>
    </div>
    <div class="group">
      <span class="head">Atmosphere&nbsp;&nbsp;</span>
      <label><input type="radio" name="atm" value="on" checked> On</label>
      <label><input type="radio" name="atm" value="off"> Off</label>
    </div>
    <div class="group stack">
      <div class="head">Units</div>
      <label><input type="radio" name="units" value="metric" checked> Metric (kPa)</label>
      <label><input type="radio" name="units" value="atm"> Atmospheres (atm)</label>
      <label><input type="radio" name="units" value="english"> English (psi)</label>
    </div>
    <div class="group">
      <div class="head">Fluid Density <span class="val" id="densVal">1000 kg/m&sup3;</span></div>
      <input type="range" id="slDens" min="600" max="1500" step="10" value="1000">
      <div class="ticks" id="densTicks">
        <span data-v="700"  style="left:11.1%">gasoline</span>
        <span data-v="1000" style="left:44.4%">water</span>
        <span data-v="1420" style="left:91.1%">honey</span>
      </div>
    </div>
    <div class="group">
      <div class="head">Gravity <span class="val" id="gVal">9.8 m/s&sup2;</span></div>
      <input type="range" id="slG" min="1" max="25" step="0.1" value="9.8">
      <div class="ticks" id="gTicks">
        <span data-v="3.7"  style="left:11.25%">Mars</span>
        <span data-v="9.8"  style="left:36.7%">Earth</span>
        <span data-v="24.8" style="left:99.2%" class="edge-r">Jupiter</span>
      </div>
    </div>
    <div class="btnrow">
      <button id="btnFill">Fill &#9650;</button>
      <button id="btnDrain">Drain &#9660;</button>
    </div>
    <div class="holdhint">hold a button to run the faucet</div>
    <button id="btnReset">&#8634; Reset</button>
  </div>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 470, H = 500;

    // ── Scene geometry ───────────────────────────────────────
    const GROUND_Y = 150;                          // pool rim / ground level
    const POOL = { l: 80, r: 390, b: 450 };        // pool interior (px)
    const PXM = 100;                               // pixels per meter
    const MAX_DEPTH = 3.0;                         // pool depth (m)
    const WALL = 10;                               // pool wall thickness (px)
    const SPOUT_X = 124;                           // fill-faucet spout center
    const P_ATM = 101325;                          // Pa (standard atmosphere)
    const FLOW_RATE = 0.6;                         // m of water level per second

    // ── URL-parameter defaults ───────────────────────────────
    const Q = new URLSearchParams(location.search);
    const qnum = (k, def, lo, hi) => {
      const v = parseFloat(Q.get(k));
      return isFinite(v) ? Math.min(hi, Math.max(lo, v)) : def;
    };
    const DEF = {
      atm:   (Q.get('atmosphere') || 'on').toLowerCase() !== 'off',
      dens:  qnum('density', 1000, 600, 1500),
      g:     qnum('g', 9.8, 1, 25),
      ruler: Q.get('ruler') === '1',
      grid:  Q.get('grid') === '1',
      units: (u => u.indexOf('atm') === 0 ? 'atm'
                 : (u === 'english' || u === 'psi') ? 'english' : 'metric'
             )((Q.get('units') || 'metric').toLowerCase()),
      water: qnum('water', 2.0, 0, MAX_DEPTH),
    };

    // ── State ────────────────────────────────────────────────
    const state = {};
    function initState() {
      state.atm = DEF.atm;       state.dens = DEF.dens;
      state.g = DEF.g;           state.ruler = DEF.ruler;
      state.grid = DEF.grid;     state.units = DEF.units;
      state.water = DEF.water;
      state.fill = false;        state.drain = false;
      state.gauge = { x: 414, y: 74 };                  // dial center
      state.rul = { x: 96, y: GROUND_Y };               // ruler left edge, zero mark
      state.flowPhase = 0;                              // drain-pipe dash animation
    }

    // ── Controls ─────────────────────────────────────────────
    const $ = id => document.getElementById(id);
    const ckRuler = $('ckRuler'), ckGrid = $('ckGrid');
    const slDens = $('slDens'), slG = $('slG');
    const densVal = $('densVal'), gVal = $('gVal');
    const btnFill = $('btnFill'), btnDrain = $('btnDrain');

    function syncControls() {
      ckRuler.checked = state.ruler;
      ckGrid.checked = state.grid;
      document.querySelector(`input[name=atm][value=${state.atm ? 'on' : 'off'}]`).checked = true;
      document.querySelector(`input[name=units][value=${state.units}]`).checked = true;
      slDens.value = state.dens;
      slG.value = state.g;
      densVal.innerHTML = Math.round(state.dens) + ' kg/m³';
      gVal.innerHTML = state.g.toFixed(1) + ' m/s²';
    }

    ckRuler.addEventListener('change', () => { state.ruler = ckRuler.checked; });
    ckGrid.addEventListener('change', () => { state.grid = ckGrid.checked; });
    document.querySelectorAll('input[name=atm]').forEach(r =>
      r.addEventListener('change', () => { state.atm = r.value === 'on'; }));
    document.querySelectorAll('input[name=units]').forEach(r =>
      r.addEventListener('change', () => { state.units = r.value; }));
    slDens.addEventListener('input', () => {
      state.dens = slDens.valueAsNumber;
      densVal.innerHTML = Math.round(state.dens) + ' kg/m³';
    });
    slG.addEventListener('input', () => {
      state.g = slG.valueAsNumber;
      gVal.innerHTML = state.g.toFixed(1) + ' m/s²';
    });
    document.querySelectorAll('.ticks span').forEach(sp =>
      sp.addEventListener('click', () => {
        const sl = sp.parentElement.id === 'densTicks' ? slDens : slG;
        sl.value = sp.dataset.v;
        sl.dispatchEvent(new Event('input'));
      }));

    // Hold-to-run faucet buttons
    function holdButton(btn, prop) {
      const on  = e => { e.preventDefault(); state[prop] = true;
                         btn.classList.add('active');
                         if (btn.setPointerCapture) btn.setPointerCapture(e.pointerId); };
      const off = () => { state[prop] = false; btn.classList.remove('active'); };
      btn.addEventListener('pointerdown', on);
      btn.addEventListener('pointerup', off);
      btn.addEventListener('pointercancel', off);
      btn.addEventListener('lostpointercapture', off);
    }
    holdButton(btnFill, 'fill');
    holdButton(btnDrain, 'drain');

    $('btnReset').addEventListener('click', () => { initState(); syncControls(); });

    // ── Physics ──────────────────────────────────────────────
    const surfaceY = () => POOL.b - state.water * PXM;

    function pressurePa() {
      const s = surfaceY();
      const depth = Math.max(0, (state.gauge.y - s) / PXM);   // m below surface
      return (state.atm ? P_ATM : 0) + state.dens * state.g * depth;
    }

    function fmtPressure(P) {
      if (state.units === 'metric')  return (P / 1000).toFixed(1) + ' kPa';
      if (state.units === 'atm')     return (P / P_ATM).toFixed(3) + ' atm';
      return (P * 0.000145037738).toFixed(2) + ' psi';        // english
    }

    // Fluid tint follows density (gasoline amber → water cyan → honey gold)
    function fluidRGB() {
      const stops = [[700, 236, 207, 116], [1000, 110, 196, 232], [1420, 218, 162, 56]];
      const d = state.dens;
      if (d <= stops[0][0]) return stops[0].slice(1);
      if (d >= stops[2][0]) return stops[2].slice(1);
      const [a, b] = d <= 1000 ? [stops[0], stops[1]] : [stops[1], stops[2]];
      const t = (d - a[0]) / (b[0] - a[0]);
      return [0, 1, 2].map(i => Math.round(a[i + 1] + t * (b[i + 1] - a[i + 1])));
    }
    const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

    // ── Drawing ──────────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSky() {
      const gr = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
      gr.addColorStop(0, '#b8def7');
      gr.addColorStop(1, '#e9f5fd');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, W, GROUND_Y);
    }

    function drawFaucet() {
      // horizontal supply pipe from the left edge
      ctx.fillStyle = '#aeb8c0';
      ctx.fillRect(0, 62, SPOUT_X + 4, 16);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(0, 64, SPOUT_X + 4, 4);
      // down-spout
      ctx.fillStyle = '#9fa9b2';
      ctx.fillRect(SPOUT_X - 13, 62, 26, 34);
      ctx.fillStyle = '#8d97a0';
      ctx.fillRect(SPOUT_X - 9, 96, 18, 6);
      // handle
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(86, 62); ctx.lineTo(86, 52); ctx.stroke();
      ctx.beginPath(); ctx.arc(86, 49, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#5f7d99'; ctx.fill();
      ctx.strokeStyle = '#46627c'; ctx.lineWidth = 1; ctx.stroke();
      // pipe outline
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 62.5, SPOUT_X + 12.5, 15);
    }

    function drawGroundAndPool() {
      // dirt
      const gr = ctx.createLinearGradient(0, GROUND_Y, 0, H);
      gr.addColorStop(0, '#b08a64');
      gr.addColorStop(1, '#8a6a4a');
      ctx.fillStyle = gr;
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
      // grass strips outside the pool
      ctx.fillStyle = '#79b35e';
      ctx.fillRect(0, GROUND_Y - 4, POOL.l - WALL, 8);
      ctx.fillRect(POOL.r + WALL, GROUND_Y - 4, W - POOL.r - WALL, 8);
      // pool liner (interior above water)
      ctx.fillStyle = '#eef2f2';
      ctx.fillRect(POOL.l, GROUND_Y, POOL.r - POOL.l, POOL.b - GROUND_Y);
    }

    function drawWater() {
      if (state.water <= 0.0005) return;
      const s = surfaceY();
      const c = fluidRGB();
      const gr = ctx.createLinearGradient(0, s, 0, POOL.b);
      gr.addColorStop(0, rgba(c, 0.72));
      gr.addColorStop(1, rgba(c.map(v => Math.round(v * 0.72)), 0.9));
      ctx.fillStyle = gr;
      ctx.fillRect(POOL.l, s, POOL.r - POOL.l, POOL.b - s);
      // surface line
      ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(POOL.l, s); ctx.lineTo(POOL.r, s); ctx.stroke();
    }

    function drawWalls() {
      ctx.fillStyle = '#dfdfd4';
      ctx.fillRect(POOL.l - WALL, GROUND_Y, WALL, POOL.b + WALL - GROUND_Y);     // left
      ctx.fillRect(POOL.r, GROUND_Y, WALL, POOL.b + WALL - GROUND_Y);            // right
      ctx.fillRect(POOL.l - WALL, POOL.b, POOL.r - POOL.l + 2 * WALL, WALL);     // floor
      ctx.strokeStyle = '#b4b4a6'; ctx.lineWidth = 1;
      ctx.strokeRect(POOL.l - WALL + 0.5, GROUND_Y + 0.5,
                     POOL.r - POOL.l + 2 * WALL - 1, POOL.b + WALL - GROUND_Y - 1);
      ctx.strokeRect(POOL.l + 0.5, GROUND_Y + 0.5, POOL.r - POOL.l - 1, POOL.b - GROUND_Y - 1);
    }

    function drawDrain() {
      // pipe from the bottom of the right wall out to the canvas edge
      ctx.fillStyle = '#9fa9b2';
      ctx.fillRect(POOL.r, 432, W - POOL.r, 18);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(POOL.r, 434, W - POOL.r, 4);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 1;
      ctx.strokeRect(POOL.r + 0.5, 432.5, W - POOL.r - 1, 17);
      // valve wheel
      ctx.beginPath(); ctx.moveTo(434, 432); ctx.lineTo(434, 424);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.beginPath(); ctx.arc(434, 421, 6, 0, Math.PI * 2);
      ctx.fillStyle = '#5f7d99'; ctx.fill();
      ctx.strokeStyle = '#46627c'; ctx.lineWidth = 1; ctx.stroke();
      // animated outflow while draining
      if (state.drain && state.water > 0.0005) {
        ctx.save();
        ctx.strokeStyle = rgba(fluidRGB(), 0.95); ctx.lineWidth = 8;
        ctx.setLineDash([12, 9]);
        ctx.lineDashOffset = -state.flowPhase;
        ctx.beginPath(); ctx.moveTo(POOL.r + 2, 441); ctx.lineTo(W, 441); ctx.stroke();
        ctx.restore();
      }
    }

    function drawFillStream() {
      if (!state.fill || state.water >= MAX_DEPTH - 0.0005) return;
      const s = surfaceY();
      const c = fluidRGB();
      ctx.fillStyle = rgba(c, 0.7);
      ctx.fillRect(SPOUT_X - 6, 102, 12, s - 102);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(SPOUT_X - 2, 102, 2, s - 102);
    }

    function drawGrid() {
      if (!state.grid) return;
      ctx.font = 'bold 10px Segoe UI';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      for (let i = 0; i <= 6; i++) {
        const y = GROUND_Y + i * 0.5 * PXM;
        ctx.strokeStyle = 'rgba(20,70,90,0.45)';
        ctx.lineWidth = (i % 2 === 0) ? 1.6 : 0.8;
        ctx.beginPath(); ctx.moveTo(POOL.l, y + 0.5); ctx.lineTo(POOL.r, y + 0.5); ctx.stroke();
        // tick across the left wall + label on the dirt
        ctx.strokeStyle = 'rgba(20,70,90,0.7)'; ctx.lineWidth = 1.6;
        ctx.beginPath(); ctx.moveTo(POOL.l - WALL, y + 0.5); ctx.lineTo(POOL.l, y + 0.5); ctx.stroke();
        const label = (i * 0.5).toFixed(1) + ' m';
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillText(label, POOL.l - WALL - 4 + 1, y + 1);
        ctx.fillStyle = '#fff7e0';
        ctx.fillText(label, POOL.l - WALL - 4, y);
      }
    }

    function rulerRect() {
      return { x: state.rul.x, y: state.rul.y - 16, w: 34, h: MAX_DEPTH * PXM + 24 };
    }

    function drawRuler() {
      if (!state.ruler) return;
      const rx = state.rul.x, ry = state.rul.y;     // ry = the "0" mark
      const r = rulerRect();
      ctx.fillStyle = 'rgba(243,228,170,0.94)';
      ctx.strokeStyle = '#a8915a'; ctx.lineWidth = 1;
      roundRect(r.x, r.y, r.w, r.h, 3); ctx.fill(); ctx.stroke();
      // unit label
      ctx.fillStyle = '#6b5a2a';
      ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('m', rx + r.w / 2, ry - 9);
      // ticks (0.1 m) + numbers (0.5 m), zero at the top
      ctx.strokeStyle = '#5a4a22';
      ctx.textAlign = 'right'; ctx.font = '8.5px Segoe UI';
      for (let i = 0; i <= 30; i++) {
        const y = ry + i * 0.1 * PXM;
        const len = (i % 10 === 0) ? 13 : (i % 5 === 0) ? 9 : 5;
        ctx.lineWidth = (i % 5 === 0) ? 1.2 : 0.7;
        ctx.beginPath(); ctx.moveTo(rx, y + 0.5); ctx.lineTo(rx + len, y + 0.5); ctx.stroke();
        if (i % 5 === 0) {
          ctx.fillStyle = '#5a4a22';
          ctx.fillText(i === 0 ? '0' : (i / 10).toFixed(1), rx + r.w - 3, y + (i === 0 ? 4 : 0));
        }
      }
    }

    function gaugeTagRect() {
      const g = state.gauge;
      return { x: g.x - 41, y: g.y - 26 - 26, w: 82, h: 20 };
    }

    function drawGauge() {
      const g = state.gauge, r = 26;
      const P = pressurePa();

      // readout tag above the dial
      const tag = gaugeTagRect();
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 1;
      ctx.fillStyle = '#ffffff';
      roundRect(tag.x, tag.y, tag.w, tag.h, 4); ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#667788'; ctx.lineWidth = 1.2;
      roundRect(tag.x, tag.y, tag.w, tag.h, 4); ctx.stroke();
      // stem connecting tag to dial
      ctx.fillStyle = '#667788';
      ctx.beginPath();
      ctx.moveTo(g.x - 4, tag.y + tag.h);
      ctx.lineTo(g.x + 4, tag.y + tag.h);
      ctx.lineTo(g.x, g.y - r + 2);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#223344';
      ctx.font = '600 11px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(fmtPressure(P), g.x, tag.y + tag.h / 2 + 1);

      // dial face
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 1;
      ctx.beginPath(); ctx.arc(g.x, g.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff'; ctx.fill();
      ctx.restore();
      ctx.beginPath(); ctx.arc(g.x, g.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#556677'; ctx.lineWidth = 2.5; ctx.stroke();

      // tick marks: 0..250 kPa over a 270° sweep (135° → 405°)
      for (let i = 0; i <= 25; i++) {
        const a = (135 + 270 * i / 25) * Math.PI / 180;
        const major = i % 5 === 0;
        const r1 = r - 3, r0 = r1 - (major ? 6 : 3.5);
        ctx.strokeStyle = '#556677'; ctx.lineWidth = major ? 1.4 : 0.7;
        ctx.beginPath();
        ctx.moveTo(g.x + r0 * Math.cos(a), g.y + r0 * Math.sin(a));
        ctx.lineTo(g.x + r1 * Math.cos(a), g.y + r1 * Math.sin(a));
        ctx.stroke();
      }
      ctx.fillStyle = '#8899aa'; ctx.font = '7.5px Segoe UI';
      ctx.fillText('Pressure', g.x, g.y + 13);

      // needle
      const frac = Math.max(0, Math.min(1, (P / 1000) / 250));
      const ang = (135 + 270 * frac) * Math.PI / 180;
      ctx.strokeStyle = '#cc2222'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(g.x - 6 * Math.cos(ang), g.y - 6 * Math.sin(ang));
      ctx.lineTo(g.x + (r - 8) * Math.cos(ang), g.y + (r - 8) * Math.sin(ang));
      ctx.stroke();
      ctx.beginPath(); ctx.arc(g.x, g.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#334455'; ctx.fill();

      // side carets marking the measurement height (the dial center)
      ctx.fillStyle = '#bb3333';
      ctx.beginPath();
      ctx.moveTo(g.x - r - 9, g.y - 5); ctx.lineTo(g.x - r - 9, g.y + 5);
      ctx.lineTo(g.x - r - 2, g.y); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(g.x + r + 9, g.y - 5); ctx.lineTo(g.x + r + 9, g.y + 5);
      ctx.lineTo(g.x + r + 2, g.y); ctx.closePath(); ctx.fill();
    }

    function drawHint() {
      ctx.fillStyle = '#7d96ab'; ctx.font = '11px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('Drag the pressure gauge', 282, 18);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawSky();
      drawHint();
      drawFaucet();
      drawGroundAndPool();
      drawWater();
      drawWalls();
      drawDrain();
      drawFillStream();
      drawGrid();
      drawRuler();
      drawGauge();
    }

    // ── Animation loop ───────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (state.fill)  state.water = Math.min(MAX_DEPTH, state.water + FLOW_RATE * dt);
      if (state.drain) {
        state.water = Math.max(0, state.water - FLOW_RATE * dt);
        state.flowPhase = (state.flowPhase + 60 * dt) % 21;
      }
      draw();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ── Pointer interaction (gauge + ruler dragging) ─────────
    const cpos = e => {
      const r = canvas.getBoundingClientRect();
      return [e.clientX - r.left, e.clientY - r.top];
    };
    const inRect = (x, y, r) => x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    const overGauge = (x, y) => {
      const g = state.gauge;
      return Math.hypot(x - g.x, y - g.y) < 32 || inRect(x, y, gaugeTagRect());
    };
    const overRuler = (x, y) => state.ruler && inRect(x, y, rulerRect());

    let drag = null;  // { what: 'gauge'|'ruler', dx, dy }

    function clampGauge(x, y) {
      // dial center may travel through the sky and anywhere in the pool,
      // down to the pool floor (y = POOL.b ⇒ depth exactly 3.0 m)
      y = Math.max(54, Math.min(POOL.b, y));
      x = (y > GROUND_Y + 4)
        ? Math.max(POOL.l + 14, Math.min(POOL.r - 14, x))   // inside the pool
        : Math.max(46, Math.min(W - 46, x));                // in the sky
      return [x, y];
    }

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      const [x, y] = cpos(e);
      if (overGauge(x, y)) {
        drag = { what: 'gauge', dx: state.gauge.x - x, dy: state.gauge.y - y };
      } else if (overRuler(x, y)) {
        drag = { what: 'ruler', dx: state.rul.x - x, dy: state.rul.y - y };
      }
      if (drag) canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', e => {
      const [x, y] = cpos(e);
      if (drag && drag.what === 'gauge') {
        [state.gauge.x, state.gauge.y] = clampGauge(x + drag.dx, y + drag.dy);
        canvas.style.cursor = 'grabbing';
      } else if (drag && drag.what === 'ruler') {
        state.rul.x = Math.max(-10, Math.min(W - 40, x + drag.dx));
        state.rul.y = Math.max(30, Math.min(H - 30, y + drag.dy));
        canvas.style.cursor = 'grabbing';
      } else {
        canvas.style.cursor = (overGauge(x, y) || overRuler(x, y)) ? 'grab' : 'default';
      }
    });

    const endDrag = () => { drag = null; };
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    // ── Go ───────────────────────────────────────────────────
    initState();
    syncControls();
  })();
  </script>
</body>
</html>
