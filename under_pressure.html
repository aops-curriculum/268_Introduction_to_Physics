<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fluid Pressure</title>
  <!-- Original AoPS interactive. Replaces the third-party "Under Pressure" simulation. -->
  <!--
    URL parameters (all optional):
      &ruler=1|0           show the draggable ruler        (default 0)
      &grid=1|0            show the 0.5 m grid             (default 0)
      &water=0..3          initial water level in m        (default 2.0)
    Fixed: density=1000 kg/m³, g=9.8 m/s², atmosphere on, units kPa.
    Calibration: P = 101.325 kPa + 1000·9.8·depth.
    At 1.0 m depth: 111.1 kPa.
  -->
<script>
// EigenNode auto-height v2.4
(function() {
  var BUFFER = 4;
  var H_SCROLLBAR = 18;
  var measuring = false;
  function measure() {
    if (measuring) return 0;
    var b = document.body, h = document.documentElement;
    if (!b) return 0;
    measuring = true;
    var hOld = b.style.height, hPri = b.style.getPropertyPriority('height');
    var mOld = b.style.minHeight, mPri = b.style.getPropertyPriority('min-height');
    b.style.setProperty('height', 'auto', 'important');
    b.style.setProperty('min-height', '0', 'important');
    var content = b.scrollHeight || 0;
    if (hOld) b.style.setProperty('height', hOld, hPri); else b.style.removeProperty('height');
    if (mOld) b.style.setProperty('min-height', mOld, mPri); else b.style.removeProperty('min-height');
    measuring = false;
    var hOverflow = h && (h.scrollWidth - h.clientWidth) >= 4;
    return Math.ceil(content) + BUFFER + (hOverflow ? H_SCROLLBAR : 0);
  }
  var last = 0;
  function report() {
    var h = measure();
    if (h > 0 && Math.abs(h - last) >= 2) {
      last = h;
      window.parent.postMessage({ type: 'resize', height: h }, '*');
    }
  }
  window.addEventListener('load', report);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(report);
  if (window.ResizeObserver && document.body) new ResizeObserver(report).observe(document.body);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 700px; height: 500px; overflow: hidden;
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    #c { display: block; touch-action: none; }
  </style>
</head>
<body>
  <canvas id="c" width="700" height="500"></canvas>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 700, H = 500;

    // ── Scene geometry ───────────────────────────────────────
    const GROUND_Y = 150;
    const POOL = { l: 80, r: 390, b: 450 };
    const PXM = 100;
    const MAX_DEPTH = 3.0;
    const WALL = 10;
    const SPOUT_X = 124;
    const P_ATM = 101325;
    const FLOW_RATE = 0.6;
    const DRAIN_KNOB_X = 434;
    const DRAIN_PIPE_END = 510;

    // Fixed physics
    const RHO = 1000, G_ACC = 9.8;

    // ── URL-parameter defaults ───────────────────────────────
    const Q = new URLSearchParams(location.search);
    const qnum = (k, def, lo, hi) => {
      const v = parseFloat(Q.get(k));
      return isFinite(v) ? Math.min(hi, Math.max(lo, v)) : def;
    };
    const DEF = {
      ruler: Q.get('ruler') === '1',
      grid:  Q.get('grid')  === '1',
      water: qnum('water', 2.0, 0, MAX_DEPTH),
    };

    // ── State ────────────────────────────────────────────────
    const state = {};
    function initState() {
      state.ruler = DEF.ruler;
      state.grid  = DEF.grid;
      state.water = DEF.water;
      state.fill  = false;
      state.drain = false;
      state.gauge = { x: 570, y: 90 };
      state.rul   = { x: 96, y: GROUND_Y };
      state.flowPhase = 0;
    }

    // ── Physics ──────────────────────────────────────────────
    const surfaceY = () => POOL.b - state.water * PXM;

    function pressurePa() {
      const s = surfaceY();
      const depth = Math.max(0, (state.gauge.y - s) / PXM);
      return P_ATM + RHO * G_ACC * depth;
    }

    const fmtPressure = P => (P / 1000).toFixed(1) + ' kPa';

    const WATER_RGB = [110, 196, 232];
    const rgba = (c, a) => `rgba(${c[0]},${c[1]},${c[2]},${a})`;

    // ── Overlay button rects ─────────────────────────────────
    const RULER_BTN = { x: 10, y: 10, w: 55, h: 22 };
    const GRID_BTN  = { x: 10, y: 37, w: 55, h: 22 };

    // Knob rest centers
    const FILL_KNOB_CX  = SPOUT_X, FILL_KNOB_CY  = 47;
    const DRAIN_KNOB_CX = DRAIN_KNOB_X, DRAIN_KNOB_CY = 421;
    const KNOB_R = 8;

    // ── Drawing ──────────────────────────────────────────────
    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function drawSky() {
      const gr = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
      gr.addColorStop(0, '#b8def7');
      gr.addColorStop(1, '#e9f5fd');
      ctx.fillStyle = gr;
      ctx.fillRect(0, 0, W, GROUND_Y);
    }

    function drawFaucet() {
      // horizontal supply pipe
      ctx.fillStyle = '#aeb8c0';
      ctx.fillRect(0, 62, SPOUT_X + 4, 16);
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillRect(0, 64, SPOUT_X + 4, 4);
      // down-spout
      ctx.fillStyle = '#9fa9b2';
      ctx.fillRect(SPOUT_X - 13, 62, 26, 34);
      ctx.fillStyle = '#8d97a0';
      ctx.fillRect(SPOUT_X - 9, 96, 18, 6);
      // valve knob — pulls up when active
      const fky = FILL_KNOB_CY - (state.fill ? 4 : 0);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(FILL_KNOB_CX, 62); ctx.lineTo(FILL_KNOB_CX, fky + KNOB_R); ctx.stroke();
      ctx.beginPath(); ctx.arc(FILL_KNOB_CX, fky, KNOB_R, 0, Math.PI * 2);
      ctx.fillStyle = state.fill ? '#3d6a8a' : '#5f7d99';
      ctx.fill();
      ctx.strokeStyle = '#46627c'; ctx.lineWidth = 1.5; ctx.stroke();
      // pipe outline
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 1;
      ctx.strokeRect(0.5, 62.5, SPOUT_X + 12.5, 15);
    }

    function drawGroundAndPool() {
      const gr = ctx.createLinearGradient(0, GROUND_Y, 0, H);
      gr.addColorStop(0, '#b08a64');
      gr.addColorStop(1, '#8a6a4a');
      ctx.fillStyle = gr;
      ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
      ctx.fillStyle = '#79b35e';
      ctx.fillRect(0, GROUND_Y - 4, POOL.l - WALL, 8);
      ctx.fillRect(POOL.r + WALL, GROUND_Y - 4, W - POOL.r - WALL, 8);
      ctx.fillStyle = '#eef2f2';
      ctx.fillRect(POOL.l, GROUND_Y, POOL.r - POOL.l, POOL.b - GROUND_Y);
    }

    function drawWater() {
      if (state.water <= 0.0005) return;
      const s = surfaceY();
      const gr = ctx.createLinearGradient(0, s, 0, POOL.b);
      gr.addColorStop(0, rgba(WATER_RGB, 0.72));
      gr.addColorStop(1, rgba(WATER_RGB.map(v => Math.round(v * 0.72)), 0.9));
      ctx.fillStyle = gr;
      ctx.fillRect(POOL.l, s, POOL.r - POOL.l, POOL.b - s);
      ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(POOL.l, s); ctx.lineTo(POOL.r, s); ctx.stroke();
    }

    function drawWalls() {
      ctx.fillStyle = '#dfdfd4';
      ctx.fillRect(POOL.l - WALL, GROUND_Y, WALL, POOL.b + WALL - GROUND_Y);
      ctx.fillRect(POOL.r, GROUND_Y, WALL, POOL.b + WALL - GROUND_Y);
      ctx.fillRect(POOL.l - WALL, POOL.b, POOL.r - POOL.l + 2 * WALL, WALL);
      ctx.strokeStyle = '#b4b4a6'; ctx.lineWidth = 1;
      ctx.strokeRect(POOL.l - WALL + 0.5, GROUND_Y + 0.5,
                     POOL.r - POOL.l + 2 * WALL - 1, POOL.b + WALL - GROUND_Y - 1);
      ctx.strokeRect(POOL.l + 0.5, GROUND_Y + 0.5, POOL.r - POOL.l - 1, POOL.b - GROUND_Y - 1);
    }

    function drawDrain() {
      ctx.fillStyle = '#9fa9b2';
      ctx.fillRect(POOL.r, 432, DRAIN_PIPE_END - POOL.r, 18);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(POOL.r, 434, DRAIN_PIPE_END - POOL.r, 4);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 1;
      ctx.strokeRect(POOL.r + 0.5, 432.5, DRAIN_PIPE_END - POOL.r - 1, 17);
      // valve knob — pulls down when active
      const dky = DRAIN_KNOB_CY + (state.drain ? 4 : 0);
      ctx.beginPath(); ctx.moveTo(DRAIN_KNOB_CX, 432); ctx.lineTo(DRAIN_KNOB_CX, dky - KNOB_R);
      ctx.strokeStyle = '#76828c'; ctx.lineWidth = 3; ctx.stroke();
      ctx.beginPath(); ctx.arc(DRAIN_KNOB_CX, dky, KNOB_R, 0, Math.PI * 2);
      ctx.fillStyle = state.drain ? '#3d6a8a' : '#5f7d99';
      ctx.fill();
      ctx.strokeStyle = '#46627c'; ctx.lineWidth = 1.5; ctx.stroke();
      // animated outflow while draining
      if (state.drain && state.water > 0.0005) {
        ctx.save();
        ctx.strokeStyle = rgba(WATER_RGB, 0.95); ctx.lineWidth = 8;
        ctx.setLineDash([12, 9]);
        ctx.lineDashOffset = -state.flowPhase;
        ctx.beginPath(); ctx.moveTo(POOL.r + 2, 441); ctx.lineTo(DRAIN_PIPE_END - 2, 441); ctx.stroke();
        ctx.restore();
      }
    }

    function drawFillStream() {
      if (!state.fill || state.water >= MAX_DEPTH - 0.0005) return;
      const s = surfaceY();
      ctx.fillStyle = rgba(WATER_RGB, 0.7);
      ctx.fillRect(SPOUT_X - 6, 102, 12, s - 102);
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(SPOUT_X - 2, 102, 2, s - 102);
    }

    function drawGrid() {
      if (!state.grid) return;
      ctx.font = 'bold 10px Segoe UI';
      ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      for (let i = 0; i <= 6; i++) {
        const y = GROUND_Y + i * 0.5 * PXM;
        ctx.strokeStyle = 'rgba(20,70,90,0.45)';
        ctx.lineWidth = (i % 2 === 0) ? 1.6 : 0.8;
        ctx.beginPath(); ctx.moveTo(POOL.l, y + 0.5); ctx.lineTo(POOL.r, y + 0.5); ctx.stroke();
        ctx.strokeStyle = 'rgba(20,70,90,0.7)'; ctx.lineWidth = 1.6;
        ctx.beginPath(); ctx.moveTo(POOL.l - WALL, y + 0.5); ctx.lineTo(POOL.l, y + 0.5); ctx.stroke();
        const label = (i * 0.5).toFixed(1) + ' m';
        ctx.fillStyle = 'rgba(0,0,0,0.35)';
        ctx.fillText(label, POOL.l - WALL - 4 + 1, y + 1);
        ctx.fillStyle = '#fff7e0';
        ctx.fillText(label, POOL.l - WALL - 4, y);
      }
    }

    function rulerRect() {
      return { x: state.rul.x, y: state.rul.y - 16, w: 34, h: MAX_DEPTH * PXM + 24 };
    }

    function drawRuler() {
      if (!state.ruler) return;
      const rx = state.rul.x, ry = state.rul.y;
      const r = rulerRect();
      ctx.fillStyle = 'rgba(243,228,170,0.94)';
      ctx.strokeStyle = '#a8915a'; ctx.lineWidth = 1;
      roundRect(r.x, r.y, r.w, r.h, 3); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#6b5a2a';
      ctx.font = 'bold 9px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('m', rx + r.w / 2, ry - 9);
      ctx.strokeStyle = '#5a4a22';
      ctx.textAlign = 'right'; ctx.font = '8.5px Segoe UI';
      for (let i = 0; i <= 30; i++) {
        const y = ry + i * 0.1 * PXM;
        const len = (i % 10 === 0) ? 13 : (i % 5 === 0) ? 9 : 5;
        ctx.lineWidth = (i % 5 === 0) ? 1.2 : 0.7;
        ctx.beginPath(); ctx.moveTo(rx, y + 0.5); ctx.lineTo(rx + len, y + 0.5); ctx.stroke();
        if (i % 5 === 0) {
          ctx.fillStyle = '#5a4a22';
          ctx.fillText(i === 0 ? '0' : (i / 10).toFixed(1), rx + r.w - 3, y + (i === 0 ? 4 : 0));
        }
      }
    }

    function gaugeTagRect() {
      const g = state.gauge;
      return { x: g.x - 41, y: g.y - 26 - 26, w: 82, h: 20 };
    }

    function drawGauge() {
      const g = state.gauge, r = 26;
      const P = pressurePa();
      const tag = gaugeTagRect();
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 1;
      ctx.fillStyle = '#ffffff';
      roundRect(tag.x, tag.y, tag.w, tag.h, 4); ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#667788'; ctx.lineWidth = 1.2;
      roundRect(tag.x, tag.y, tag.w, tag.h, 4); ctx.stroke();
      ctx.fillStyle = '#667788';
      ctx.beginPath();
      ctx.moveTo(g.x - 4, tag.y + tag.h);
      ctx.lineTo(g.x + 4, tag.y + tag.h);
      ctx.lineTo(g.x, g.y - r + 2);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#223344';
      ctx.font = '600 11px Segoe UI'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(fmtPressure(P), g.x, tag.y + tag.h / 2 + 1);
      ctx.save();
      ctx.shadowColor = 'rgba(0,0,0,0.25)'; ctx.shadowBlur = 5; ctx.shadowOffsetY = 1;
      ctx.beginPath(); ctx.arc(g.x, g.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff'; ctx.fill();
      ctx.restore();
      ctx.beginPath(); ctx.arc(g.x, g.y, r, 0, Math.PI * 2);
      ctx.strokeStyle = '#556677'; ctx.lineWidth = 2.5; ctx.stroke();
      for (let i = 0; i <= 25; i++) {
        const a = (135 + 270 * i / 25) * Math.PI / 180;
        const major = i % 5 === 0;
        const r1 = r - 3, r0 = r1 - (major ? 6 : 3.5);
        ctx.strokeStyle = '#556677'; ctx.lineWidth = major ? 1.4 : 0.7;
        ctx.beginPath();
        ctx.moveTo(g.x + r0 * Math.cos(a), g.y + r0 * Math.sin(a));
        ctx.lineTo(g.x + r1 * Math.cos(a), g.y + r1 * Math.sin(a));
        ctx.stroke();
      }
      ctx.fillStyle = '#8899aa'; ctx.font = '7.5px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('Pressure', g.x, g.y + 13);
      const frac = Math.max(0, Math.min(1, (P / 1000) / 250));
      const ang = (135 + 270 * frac) * Math.PI / 180;
      ctx.strokeStyle = '#cc2222'; ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(g.x - 6 * Math.cos(ang), g.y - 6 * Math.sin(ang));
      ctx.lineTo(g.x + (r - 8) * Math.cos(ang), g.y + (r - 8) * Math.sin(ang));
      ctx.stroke();
      ctx.beginPath(); ctx.arc(g.x, g.y, 3, 0, Math.PI * 2);
      ctx.fillStyle = '#334455'; ctx.fill();
      ctx.fillStyle = '#bb3333';
      ctx.beginPath();
      ctx.moveTo(g.x - r - 9, g.y - 5); ctx.lineTo(g.x - r - 9, g.y + 5);
      ctx.lineTo(g.x - r - 2, g.y); ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(g.x + r + 9, g.y - 5); ctx.lineTo(g.x + r + 9, g.y + 5);
      ctx.lineTo(g.x + r + 2, g.y); ctx.closePath(); ctx.fill();
    }

    function drawHint() {
      ctx.fillStyle = '#7d96ab'; ctx.font = '11px Segoe UI';
      ctx.textAlign = 'center'; ctx.textBaseline = 'alphabetic';
      ctx.fillText('Drag the pressure gauge', 490, 18);
    }

    function drawOverlayButtons() {
      function drawBtn(rect, label, active) {
        roundRect(rect.x, rect.y, rect.w, rect.h, 5);
        ctx.fillStyle = active ? '#cfe8fa' : 'rgba(255,255,255,0.9)';
        ctx.fill();
        ctx.strokeStyle = active ? '#7fb3d6' : '#b6c2cc';
        ctx.lineWidth = 1;
        roundRect(rect.x, rect.y, rect.w, rect.h, 5);
        ctx.stroke();
        ctx.fillStyle = '#334455';
        ctx.font = '11px Segoe UI';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, rect.x + rect.w / 2, rect.y + rect.h / 2);
      }
      drawBtn(RULER_BTN, 'Ruler', state.ruler);
      drawBtn(GRID_BTN,  'Grid',  state.grid);
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawSky();
      drawHint();
      drawFaucet();
      drawGroundAndPool();
      drawWater();
      drawWalls();
      drawDrain();
      drawFillStream();
      drawGrid();
      drawRuler();
      drawGauge();
      drawOverlayButtons();
    }

    // ── Animation loop ───────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (state.fill)  state.water = Math.min(MAX_DEPTH, state.water + FLOW_RATE * dt);
      if (state.drain) {
        state.water = Math.max(0, state.water - FLOW_RATE * dt);
        state.flowPhase = (state.flowPhase + 60 * dt) % 21;
      }
      draw();
      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);

    // ── Pointer interaction ──────────────────────────────────
    const cpos = e => {
      const r = canvas.getBoundingClientRect();
      return [e.clientX - r.left, e.clientY - r.top];
    };
    const inRect = (x, y, r) => x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
    const overGauge       = (x, y) => {
      const g = state.gauge;
      return Math.hypot(x - g.x, y - g.y) < 32 || inRect(x, y, gaugeTagRect());
    };
    const overRulerWidget = (x, y) => state.ruler && inRect(x, y, rulerRect());
    const overFillKnob    = (x, y) => Math.hypot(x - FILL_KNOB_CX,  y - FILL_KNOB_CY)  < KNOB_R + 6;
    const overDrainKnob   = (x, y) => Math.hypot(x - DRAIN_KNOB_CX, y - DRAIN_KNOB_CY) < KNOB_R + 6;

    let drag = null;

    function clampGauge(x, y) {
      y = Math.max(54, Math.min(POOL.b, y));
      x = (y > GROUND_Y + 4)
        ? Math.max(POOL.l + 14, Math.min(POOL.r - 14, x))
        : Math.max(46, Math.min(W - 46, x));
      return [x, y];
    }

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      const [x, y] = cpos(e);
      // Overlay button toggles (no capture needed — just a click)
      if (inRect(x, y, RULER_BTN)) { state.ruler = !state.ruler; return; }
      if (inRect(x, y, GRID_BTN))  { state.grid  = !state.grid;  return; }
      // Spigot knobs — hold to run
      if (overFillKnob(x, y)) {
        drag = { what: 'fill' }; state.fill = true;
        canvas.setPointerCapture(e.pointerId); return;
      }
      if (overDrainKnob(x, y)) {
        drag = { what: 'drain' }; state.drain = true;
        canvas.setPointerCapture(e.pointerId); return;
      }
      // Gauge / ruler drag
      if (overGauge(x, y)) {
        drag = { what: 'gauge', dx: state.gauge.x - x, dy: state.gauge.y - y };
      } else if (overRulerWidget(x, y)) {
        drag = { what: 'ruler', dx: state.rul.x - x, dy: state.rul.y - y };
      }
      if (drag) canvas.setPointerCapture(e.pointerId);
    });

    canvas.addEventListener('pointermove', e => {
      const [x, y] = cpos(e);
      if (drag?.what === 'gauge') {
        [state.gauge.x, state.gauge.y] = clampGauge(x + drag.dx, y + drag.dy);
        canvas.style.cursor = 'grabbing';
      } else if (drag?.what === 'ruler') {
        state.rul.x = Math.max(-10, Math.min(W - 40, x + drag.dx));
        state.rul.y = Math.max(30, Math.min(H - 30, y + drag.dy));
        canvas.style.cursor = 'grabbing';
      } else if (!drag) {
        const overBtn  = inRect(x, y, RULER_BTN) || inRect(x, y, GRID_BTN);
        const overKnob = overFillKnob(x, y) || overDrainKnob(x, y);
        canvas.style.cursor = (overBtn || overKnob) ? 'pointer'
          : (overGauge(x, y) || overRulerWidget(x, y)) ? 'grab' : 'default';
      }
    });

    const endDrag = () => {
      if (drag?.what === 'fill')  state.fill  = false;
      if (drag?.what === 'drain') state.drain = false;
      drag = null;
    };
    canvas.addEventListener('pointerup',          endDrag);
    canvas.addEventListener('pointercancel',      endDrag);
    canvas.addEventListener('lostpointercapture', endDrag);

    // ── Go ───────────────────────────────────────────────────
    initState();
  })();
  </script>
</body>
</html>
